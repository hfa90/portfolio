<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Perfil Profissional — ServiçoHub</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@300;400;500;600;700&family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@latest/dist/tabler-icons.min.css">
  <link rel="stylesheet" href="../css/global.css">
  <style>
    body { padding: 0; min-height: 100vh; }

    .profile-page {
      max-width: 900px; margin: 0 auto;
      padding: 32px 20px 60px;
      position: relative; z-index: 1;
    }

    /* Hero */
    .profile-hero {
      background: var(--glass-bg);
      backdrop-filter: var(--glass-blur);
      border: 1px solid var(--glass-border);
      border-radius: var(--radius-xl);
      box-shadow: var(--glass-shadow-lg);
      padding: 36px 40px;
      display: flex; gap: 28px; align-items: flex-start;
      margin-bottom: 24px;
    }
    .hero-right { flex: 1; min-width: 0; }
    .hero-name {
      font-family: var(--font-display); font-size: 1.8rem;
      font-weight: 800; color: var(--text-primary);
    }
    .hero-location { color: var(--text-muted); font-size: 0.9rem; margin-top: 4px; }
    .hero-badges { display: flex; gap: 8px; flex-wrap: wrap; margin-top: 12px; }
    .hero-actions { display: flex; gap: 12px; margin-top: 20px; flex-wrap: wrap; }

    /* Stars display */
    .stars-display { display: flex; gap: 2px; }
    .star { font-size: 18px; color: #e2e8f0; }
    .star.filled { color: #f59e0b; }
    .star.half { color: #f59e0b; opacity: 0.5; }

    /* Stats row */
    .stats-row {
      display: grid; grid-template-columns: repeat(4, 1fr); gap: 14px;
      margin-bottom: 24px;
    }
    .stat-pill {
      background: var(--glass-bg);
      backdrop-filter: var(--glass-blur-sm);
      border: 1px solid var(--glass-border);
      border-radius: var(--radius-lg);
      padding: 18px 16px; text-align: center;
      box-shadow: var(--glass-shadow);
    }
    .stat-pill-value {
      font-family: var(--font-display); font-size: 1.6rem;
      font-weight: 800; color: var(--primary);
    }
    .stat-pill-label { font-size: 0.78rem; color: var(--text-muted); margin-top: 4px; }

    /* Sections */
    .section-card {
      background: var(--glass-bg);
      backdrop-filter: var(--glass-blur-sm);
      border: 1px solid var(--glass-border);
      border-radius: var(--radius-xl);
      padding: 28px 32px;
      box-shadow: var(--glass-shadow);
      margin-bottom: 20px;
    }
    .section-title {
      font-family: var(--font-display); font-size: 1.1rem;
      font-weight: 700; margin-bottom: 18px;
      display: flex; align-items: center; gap: 10px;
    }
    .section-title i { color: var(--primary); font-size: 20px; }

    /* Rating breakdown */
    .rating-breakdown { display: flex; gap: 24px; align-items: center; }
    .rating-big {
      text-align: center; flex-shrink: 0;
      background: rgba(91,124,250,0.06);
      border-radius: var(--radius-lg);
      padding: 20px 28px;
    }
    .rating-number {
      font-family: var(--font-display); font-size: 3rem;
      font-weight: 800; color: var(--primary); line-height: 1;
    }
    .rating-total { font-size: 0.8rem; color: var(--text-muted); margin-top: 6px; }
    .rating-bars { flex: 1; display: flex; flex-direction: column; gap: 8px; }
    .rating-bar-row { display: flex; align-items: center; gap: 10px; font-size: 0.82rem; }
    .rating-bar-row .star-label { width: 24px; text-align: right; color: var(--text-secondary); font-weight: 600; }
    .bar-track { flex: 1; height: 8px; background: rgba(0,0,0,0.06); border-radius: 99px; overflow: hidden; }
    .bar-fill { height: 100%; background: linear-gradient(90deg, #f59e0b, #f97316); border-radius: 99px; transition: width 0.8s cubic-bezier(0.4,0,0.2,1); }
    .bar-count { width: 24px; color: var(--text-muted); font-size: 0.78rem; }

    /* Review cards */
    .reviews-list { display: flex; flex-direction: column; gap: 14px; }
    .review-card {
      padding: 18px 20px;
      background: rgba(255,255,255,0.65);
      border: 1px solid rgba(255,255,255,0.8);
      border-radius: var(--radius-lg);
      display: flex; gap: 14px;
    }
    .review-content { flex: 1; min-width: 0; }
    .review-header { display: flex; align-items: center; justify-content: space-between; gap: 12px; }
    .review-name { font-weight: 700; font-size: 0.92rem; }
    .review-date { font-size: 0.78rem; color: var(--text-muted); }
    .review-comment { font-size: 0.88rem; color: var(--text-secondary); margin-top: 8px; line-height: 1.6; }

    /* Nichos grid */
    .niches-grid { display: flex; flex-wrap: wrap; gap: 8px; }

    /* Back button */
    .back-btn {
      display: inline-flex; align-items: center; gap: 8px;
      color: var(--text-secondary); font-size: 0.9rem; font-weight: 600;
      text-decoration: none; margin-bottom: 20px;
      padding: 8px 14px; border-radius: var(--radius);
      background: var(--glass-bg); border: 1px solid var(--glass-border);
      backdrop-filter: var(--glass-blur-sm);
      transition: var(--transition);
    }
    .back-btn:hover { color: var(--primary); background: rgba(91,124,250,0.08); }

    /* Loading skeleton */
    .skeleton {
      background: linear-gradient(90deg, rgba(255,255,255,0.4) 25%, rgba(255,255,255,0.7) 50%, rgba(255,255,255,0.4) 75%);
      background-size: 200% 100%;
      animation: shimmer 1.4s infinite;
      border-radius: var(--radius);
    }
    @keyframes shimmer { from { background-position: 200% 0; } to { background-position: -200% 0; } }

    @media (max-width: 640px) {
      .profile-hero { flex-direction: column; padding: 24px 20px; }
      .stats-row { grid-template-columns: repeat(2, 1fr); }
      .rating-breakdown { flex-direction: column; }
      .section-card { padding: 20px; }
    }
  </style>
</head>
<body>
  <div class="bg-orb bg-orb-1"></div>
  <div class="bg-orb bg-orb-2"></div>
  <div class="bg-orb bg-orb-3"></div>

  <div class="profile-page">
    <a href="#" class="back-btn" onclick="history.back(); return false;">
      <i class="ti ti-arrow-left"></i> Voltar
    </a>

    <!-- HERO -->
    <div class="profile-hero" id="hero-section">
      <div class="skeleton" style="width:88px;height:88px;border-radius:50%;flex-shrink:0"></div>
      <div class="hero-right">
        <div class="skeleton" style="height:28px;width:260px;margin-bottom:10px"></div>
        <div class="skeleton" style="height:16px;width:180px;margin-bottom:16px"></div>
        <div class="skeleton" style="height:14px;width:100%"></div>
        <div class="skeleton" style="height:14px;width:80%;margin-top:8px"></div>
      </div>
    </div>

    <!-- STATS -->
    <div class="stats-row" id="stats-row">
      <div class="stat-pill"><div class="skeleton" style="height:36px;margin-bottom:6px"></div><div class="skeleton" style="height:12px"></div></div>
      <div class="stat-pill"><div class="skeleton" style="height:36px;margin-bottom:6px"></div><div class="skeleton" style="height:12px"></div></div>
      <div class="stat-pill"><div class="skeleton" style="height:36px;margin-bottom:6px"></div><div class="skeleton" style="height:12px"></div></div>
      <div class="stat-pill"><div class="skeleton" style="height:36px;margin-bottom:6px"></div><div class="skeleton" style="height:12px"></div></div>
    </div>

    <!-- ÁREAS -->
    <div class="section-card" id="niches-section" style="display:none">
      <h3 class="section-title"><i class="ti ti-tags"></i> Áreas de Atuação</h3>
      <div class="niches-grid" id="niches-list"></div>
    </div>

    <!-- AVALIAÇÕES -->
    <div class="section-card" id="reviews-section" style="display:none">
      <h3 class="section-title"><i class="ti ti-star"></i> Avaliações</h3>
      <div class="rating-breakdown" id="rating-breakdown"></div>
      <hr class="divider" style="margin:20px 0">
      <div class="reviews-list" id="reviews-list"></div>
    </div>

    <!-- SEM AVALIAÇÕES -->
    <div class="section-card" id="no-reviews-section" style="display:none">
      <div class="empty-state">
        <i class="ti ti-star-off"></i>
        <h3>Nenhuma avaliação ainda</h3>
        <p>Este profissional ainda não recebeu avaliações de clientes.</p>
      </div>
    </div>
  </div>

  <div id="toast-container"></div>

  <script type="module">
    import { supabase, getCurrentUser } from '../js/supabase.js';
    import { toast, formatCurrency, timeAgo, getInitials, formatDate } from '../js/utils.js';

    // Pega o ID do profissional da URL: ?id=UUID
    const params = new URLSearchParams(window.location.search);
    const professionalId = params.get('id');

    if (!professionalId) {
      document.querySelector('.profile-page').innerHTML =
        '<div class="empty-state" style="padding:80px"><i class="ti ti-user-off"></i><h3>Profissional não encontrado</h3><a href="index.html" class="btn btn-primary" style="margin-top:16px">Voltar ao início</a></div>';
    } else {
      loadProfile();
    }

    async function loadProfile() {
      const { data, error } = await supabase
        .rpc('get_professional_profile', { p_professional_id: professionalId });

      if (error || !data) {
        document.getElementById('hero-section').innerHTML =
          '<div class="empty-state"><i class="ti ti-user-off"></i><h3>Perfil não encontrado</h3></div>';
        return;
      }

      const { profile, niches, reviews } = data;

      // Verifica se o visitante é cliente autenticado (para exibir botão de convidar)
      const { data: { user } } = await supabase.auth.getUser();
      let viewerType = null;
      if (user) {
        const { data: viewer } = await supabase.from('users').select('user_type').eq('id', user.id).single();
        viewerType = viewer?.user_type;
      }

      renderHero(profile, viewerType);
      renderStats(profile);
      renderNiches(niches || []);
      renderReviews(reviews || [], profile);
    }

    function renderStars(rating, size = 18) {
      const full = Math.floor(rating);
      const half = rating % 1 >= 0.5;
      let html = '';
      for (let i = 1; i <= 5; i++) {
        if (i <= full) html += `<i class="ti ti-star-filled star filled" style="font-size:${size}px"></i>`;
        else if (i === full + 1 && half) html += `<i class="ti ti-star-half-filled star half" style="font-size:${size}px"></i>`;
        else html += `<i class="ti ti-star star" style="font-size:${size}px"></i>`;
      }
      return `<div class="stars-display">${html}</div>`;
    }

    function renderHero(profile, viewerType) {
      const name = profile.company_name || profile.name || '—';
      const initials = getInitials(name);
      const colors = ['#5b7cfa','#a78bfa','#34d399','#f87171','#fbbf24'];
      const color = colors[name.charCodeAt(0) % colors.length];
      const rating = parseFloat(profile.avg_rating) || 0;

      document.getElementById('hero-section').innerHTML = `
        <div class="avatar avatar-xl" style="background:${color};flex-shrink:0">${initials}</div>
        <div class="hero-right">
          <div class="hero-name">${name}</div>
          ${profile.city ? `<div class="hero-location"><i class="ti ti-map-pin" style="font-size:14px"></i> ${profile.city}${profile.state ? ', ' + profile.state : ''}</div>` : ''}
          <div class="hero-badges" style="margin-top:12px">
            <span class="badge ${profile.is_available ? 'badge-success' : 'badge-gray'}">
              <i class="ti ti-circle-filled" style="font-size:8px"></i>
              ${profile.is_available ? 'Disponível' : 'Indisponível'}
            </span>
            ${profile.min_price ? `<span class="badge badge-primary">A partir de ${formatCurrency(profile.min_price)}</span>` : ''}
            ${rating > 0 ? `<span class="badge badge-warning" style="gap:5px">${renderStars(rating, 13)} ${rating.toFixed(1)}</span>` : ''}
          </div>
          ${profile.description ? `<p style="margin-top:16px;font-size:0.92rem;color:var(--text-secondary);line-height:1.7">${profile.description}</p>` : ''}
          <div class="hero-actions">
            ${profile.whatsapp && viewerType === 'client' ? `
              <a href="https://wa.me/55${profile.whatsapp}" target="_blank" class="btn btn-primary">
                <i class="ti ti-brand-whatsapp"></i> Contato via WhatsApp
              </a>` : ''}
            ${viewerType === 'client' ? `
              <button class="btn btn-secondary" onclick="history.back()">
                <i class="ti ti-send"></i> Voltar e Convidar
              </button>` : ''}
          </div>
        </div>
      `;
    }

    function renderStats(profile) {
      document.getElementById('stats-row').innerHTML = `
        <div class="stat-pill">
          <div class="stat-pill-value">${profile.total_completed || 0}</div>
          <div class="stat-pill-label">Serviços concluídos</div>
        </div>
        <div class="stat-pill">
          <div class="stat-pill-value">${profile.total_reviews || 0}</div>
          <div class="stat-pill-label">Avaliações recebidas</div>
        </div>
        <div class="stat-pill">
          <div class="stat-pill-value">${parseFloat(profile.avg_rating || 0).toFixed(1)}</div>
          <div class="stat-pill-label">Nota média</div>
        </div>
        <div class="stat-pill">
          <div class="stat-pill-value">${profile.total_accepted || 0}</div>
          <div class="stat-pill-label">Trabalhos aceitos</div>
        </div>
      `;
    }

    function renderNiches(niches) {
      const sec = document.getElementById('niches-section');
      if (!niches.length) { sec.style.display = 'none'; return; }
      sec.style.display = 'block';
      const container = document.getElementById('niches-list');
      const byCategory = niches.reduce((acc, n) => {
        if (!acc[n.category]) acc[n.category] = [];
        acc[n.category].push(n.name);
        return acc;
      }, {});
      container.innerHTML = Object.entries(byCategory).map(([cat, items]) => `
        <div style="width:100%;margin-bottom:6px">
          <div style="font-size:0.75rem;font-weight:700;color:var(--text-muted);text-transform:uppercase;letter-spacing:0.06em;margin-bottom:6px">${cat}</div>
          <div style="display:flex;flex-wrap:wrap;gap:6px">
            ${items.map(n => `<span class="chip active" style="cursor:default">${n}</span>`).join('')}
          </div>
        </div>
      `).join('');
    }

    function renderReviews(reviews, profile) {
      const sec = document.getElementById('reviews-section');
      const noSec = document.getElementById('no-reviews-section');

      if (!reviews.length) {
        sec.style.display = 'none';
        noSec.style.display = 'block';
        return;
      }

      sec.style.display = 'block';
      noSec.style.display = 'none';

      const total = parseInt(profile.total_reviews) || 0;
      const avg = parseFloat(profile.avg_rating) || 0;
      const bars = [5,4,3,2,1].map(star => {
        const count = parseInt(profile[`stars_${star}`]) || 0;
        const pct = total > 0 ? Math.round((count / total) * 100) : 0;
        return `
          <div class="rating-bar-row">
            <span class="star-label">${star}</span>
            <i class="ti ti-star-filled" style="color:#f59e0b;font-size:13px"></i>
            <div class="bar-track"><div class="bar-fill" style="width:${pct}%"></div></div>
            <span class="bar-count">${count}</span>
          </div>`;
      }).join('');

      document.getElementById('rating-breakdown').innerHTML = `
        <div class="rating-big">
          <div class="rating-number">${avg.toFixed(1)}</div>
          ${renderStars(avg, 20)}
          <div class="rating-total">${total} avaliação${total !== 1 ? 'ões' : ''}</div>
        </div>
        <div class="rating-bars">${bars}</div>
      `;

      // Anima as barras após renderizar
      setTimeout(() => {
        document.querySelectorAll('.bar-fill').forEach(b => {
          const w = b.style.width;
          b.style.width = '0';
          requestAnimationFrame(() => { b.style.width = w; });
        });
      }, 100);

      const list = document.getElementById('reviews-list');
      list.innerHTML = reviews.map(r => {
        const colors = ['#5b7cfa','#a78bfa','#34d399','#f87171'];
        const c = colors[(r.client_name || '').charCodeAt(0) % colors.length];
        return `
          <div class="review-card">
            <div class="avatar avatar-sm" style="background:${c};flex-shrink:0">${getInitials(r.client_name || '?')}</div>
            <div class="review-content">
              <div class="review-header">
                <span class="review-name">${r.client_name || 'Cliente'}</span>
                <span class="review-date">${timeAgo(r.created_at)}</span>
              </div>
              ${renderStars(r.rating, 15)}
              ${r.comment ? `<p class="review-comment">${r.comment}</p>` : ''}
            </div>
          </div>`;
      }).join('');
    }
  </script>
</body>
</html>
