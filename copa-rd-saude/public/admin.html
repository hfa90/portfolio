<!doctype html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
<title>Painel · Copa RD Saúde CD-AM</title>
<link rel="manifest" href="manifest.json" />
<meta name="theme-color" content="#101419" />
<link rel="apple-touch-icon" href="icons/apple-touch-icon.png" />
<link rel="icon" href="icons/favicon-32.png" />
<link rel="stylesheet" href="css/style.css" />
</head>
<body>
<header class="topbar">
  <div class="container topbar-inner">
    <a class="brand" href="index.html"><span class="brand-mark">RD</span><span class="brand-text">Copa CD-AM<small>Painel</small></span></a>
    <button class="nav-toggle" data-nav-toggle aria-label="Abrir menu">☰</button>
    <nav class="nav-links" data-nav>
      <a href="index.html">Início</a>
      <a href="chaveamento.html">Chaveamento</a>
      <button id="btn-sair" class="nav-button">Sair</button>
    </nav>
  </div>
</header>

<main class="section admin-shell">
  <div class="container">
    <div class="section-head">
      <div>
        <span class="eyebrow">Administração</span>
        <h1>Painel do organizador</h1>
      </div>
      <span class="mode-pill" id="modo"></span>
    </div>

    <div class="stats-grid" id="stats"></div>

    <div class="tabs" role="tablist">
      <button class="active" data-tab="inscricoes" type="button">Inscrições</button>
      <button data-tab="chaves" type="button">Chaveamento</button>
    </div>

    <section id="tab-inscricoes">
      <div class="toolbar">
        <select id="filtro-modalidade"><option value="">Todas as modalidades</option></select>
        <select id="filtro-status">
          <option value="">Todos os status</option>
          <option value="aguardando_pagamento">Aguardando pagamento</option>
          <option value="em_analise">Em análise</option>
          <option value="confirmada">Confirmada</option>
          <option value="rejeitada">Rejeitada</option>
        </select>
        <button class="btn btn-secondary" id="btn-atualizar" type="button">Atualizar</button>
      </div>
      <div class="table-shell">
        <table class="admin-table">
          <thead>
            <tr>
              <th>Atleta</th>
              <th>Modalidade</th>
              <th>Status</th>
              <th>Comprovante</th>
              <th>Ações</th>
            </tr>
          </thead>
          <tbody id="tbody"></tbody>
        </table>
      </div>
    </section>

    <section id="tab-chaves" class="hidden">
      <div class="segmented" id="modalidades-admin"></div>
      <div class="bracket-admin" id="bracket-admin"></div>
    </section>
  </div>
</main>

<dialog id="modal-comprovante" class="modal">
  <button class="modal-close" value="cancel" formmethod="dialog">×</button>
  <div id="modal-body"></div>
</dialog>

<script type="module">
  import {
    adminLogado,
    apagarChave,
    buscarChaveCompleta,
    gerarChave,
    listarInscricoes,
    listarModalidades,
    modoDados,
    registrarResultado,
    revisarPagamento,
    sairAdmin,
  } from "./js/appData.js";

  document.querySelector("[data-nav-toggle]").addEventListener("click", () => {
    document.querySelector("[data-nav]").classList.toggle("aberto");
  });

  if (!(await adminLogado())) location.href = "admin-login.html";

  const badges = {
    aguardando_pagamento: ["Aguardando", "badge-wait"],
    em_analise: ["Em análise", "badge-info"],
    confirmada: ["Confirmada", "badge-ok"],
    rejeitada: ["Rejeitada", "badge-danger"],
    cancelada: ["Cancelada", "badge-danger"],
  };

  let modalidades = await listarModalidades();
  let modalidadeChave = modalidades[0]?.id || "";

  const tbody = document.getElementById("tbody");
  const filtroModalidade = document.getElementById("filtro-modalidade");
  const filtroStatus = document.getElementById("filtro-status");
  const bracketAdmin = document.getElementById("bracket-admin");

  document.getElementById("modo").textContent = modoDados() === "supabase" ? "Supabase" : "Modo local";

  function badge(status) {
    const [texto, classe] = badges[status] || badges.aguardando_pagamento;
    return `<span class="badge ${classe}">${texto}</span>`;
  }

  function escapeHtml(texto = "") {
    return texto.replace(/[&<>"']/g, (c) => ({ "&": "&amp;", "<": "&lt;", ">": "&gt;", '"': "&quot;", "'": "&#039;" }[c]));
  }

  function renderStats(lista) {
    const total = lista.length;
    const analise = lista.filter((i) => i.status === "em_analise").length;
    const confirmadas = lista.filter((i) => i.status === "confirmada").length;
    const pendentes = lista.filter((i) => i.status === "aguardando_pagamento").length;
    document.getElementById("stats").innerHTML = [
      ["Total", total],
      ["Para revisar", analise],
      ["Confirmadas", confirmadas],
      ["Pendentes", pendentes],
    ].map(([rotulo, valor]) => `<article><span>${rotulo}</span><strong>${valor}</strong></article>`).join("");
  }

  async function carregarInscricoes() {
    tbody.innerHTML = `<tr><td colspan="5">Carregando...</td></tr>`;
    const lista = await listarInscricoes({
      modalidadeId: filtroModalidade.value,
      status: filtroStatus.value,
    });
    renderStats(await listarInscricoes());

    if (!lista.length) {
      tbody.innerHTML = `<tr><td colspan="5">Nenhuma inscrição encontrada.</td></tr>`;
      return;
    }

    tbody.innerHTML = lista.map((i) => {
      const pagamento = i.pagamentos || {};
      const podeAprovar = pagamento.id && pagamento.comprovante_url && pagamento.status !== "aprovado";
      return `
        <tr data-inscricao="${i.id}" data-pagamento="${pagamento.id || ""}">
          <td>
            <strong>${escapeHtml(i.atletas?.nome_completo || "")}</strong>
            <small>${escapeHtml(i.atletas?.email || "")} · ${escapeHtml(i.atletas?.whatsapp || "")}</small>
            <small>${escapeHtml(i.atletas?.loja_filial || "Sem setor informado")}</small>
          </td>
          <td>${escapeHtml(i.modalidades?.nome || "")}</td>
          <td>${badge(i.status)}</td>
          <td>
            ${pagamento.comprovante_url ? `<button class="text-button ver-comprovante" type="button">Ver comprovante</button>` : `<span class="muted">Não enviado</span>`}
          </td>
          <td>
            <div class="action-row">
              <button class="btn btn-primary aprovar" type="button" ${podeAprovar ? "" : "disabled"}>Aprovar</button>
              <button class="btn btn-secondary rejeitar" type="button" ${pagamento.id ? "" : "disabled"}>Rejeitar</button>
            </div>
          </td>
        </tr>`;
    }).join("");

    tbody.querySelectorAll(".aprovar").forEach((btn) => btn.addEventListener("click", async (event) => {
      event.target.disabled = true;
      await revisarPagamento(event.target.closest("tr").dataset.pagamento, "aprovado");
      await carregarInscricoes();
      await carregarChaveAdmin();
    }));

    tbody.querySelectorAll(".rejeitar").forEach((btn) => btn.addEventListener("click", async (event) => {
      const motivo = prompt("Motivo da rejeição (opcional):") || "";
      event.target.disabled = true;
      await revisarPagamento(event.target.closest("tr").dataset.pagamento, "rejeitado", motivo);
      await carregarInscricoes();
    }));

    tbody.querySelectorAll(".ver-comprovante").forEach((btn) => btn.addEventListener("click", async (event) => {
      const id = event.target.closest("tr").dataset.inscricao;
      const item = lista.find((i) => i.id === id);
      const pg = item.pagamentos || {};
      const body = document.getElementById("modal-body");
      body.innerHTML = pg.comprovante_preview
        ? `<img class="modal-image" src="${pg.comprovante_preview}" alt="Comprovante" />`
        : `<h2>Comprovante</h2><p>${escapeHtml(pg.comprovante_nome || pg.comprovante_url || "Arquivo enviado")}</p>`;
      document.getElementById("modal-comprovante").showModal();
    }));
  }

  function renderModalidades() {
    filtroModalidade.innerHTML = `<option value="">Todas as modalidades</option>` + modalidades.map((m) => `<option value="${m.id}">${m.nome}</option>`).join("");
    document.getElementById("modalidades-admin").innerHTML = modalidades.map((m) => `
      <button type="button" class="${m.id === modalidadeChave ? "active" : ""}" data-id="${m.id}">
        <span>${m.icone || "CP"}</span>${m.nome}
      </button>
    `).join("");
    document.querySelectorAll("#modalidades-admin button").forEach((btn) => {
      btn.addEventListener("click", async () => {
        modalidadeChave = btn.dataset.id;
        renderModalidades();
        await carregarChaveAdmin();
      });
    });
  }

  async function carregarChaveAdmin() {
    const modalidade = modalidades.find((m) => m.id === modalidadeChave);
    if (!modalidade) return;
    const inscricoes = await listarInscricoes({ modalidadeId: modalidade.id });
    const confirmadas = inscricoes.filter((i) => i.status === "confirmada");
    const resultado = await buscarChaveCompleta(modalidade.id);

    if (!resultado) {
      bracketAdmin.innerHTML = `
        <div class="empty-state">
          <h2>${modalidade.nome}</h2>
          <p>${confirmadas.length} inscrição(ões) confirmada(s). São necessárias pelo menos 2.</p>
          <button class="btn btn-primary" id="btn-gerar-chave" ${confirmadas.length < 2 ? "disabled" : ""} type="button">Sortear chaveamento</button>
        </div>`;
      document.getElementById("btn-gerar-chave")?.addEventListener("click", async () => {
        try {
          await gerarChave(modalidade.id);
          await carregarChaveAdmin();
        } catch (e) {
          alert(e.message || "Erro ao gerar chave.");
        }
      });
      return;
    }

    const { chave, partidas } = resultado;
    const prontas = partidas.filter((p) => p.status === "pronta");
    bracketAdmin.innerHTML = `
      <div class="admin-bracket-head">
        <div>
          <h2>${modalidade.nome}</h2>
          <p>Tamanho ${chave.tamanho} · ${partidas.length} partidas · ${badge(chave.status)}</p>
        </div>
        <div class="action-row">
          <a class="btn btn-secondary" href="chaveamento.html?modalidade=${modalidade.slug}" target="_blank">Ver público</a>
          <button class="btn btn-danger" id="btn-apagar" type="button">Apagar chave</button>
        </div>
      </div>
      <div class="ready-list">
        ${prontas.length ? prontas.map((p) => `
          <article class="match-editor" data-partida="${p.id}">
            <span>${p.fase === "WB" ? "Vencedores" : p.fase === "LB" ? "Repescagem" : "Final"} · Rodada ${p.rodada}</span>
            <div class="score-inputs">
              <strong>${escapeHtml(p.atleta1_nome || "A definir")}</strong>
              <input class="placar1" type="number" min="0" inputmode="numeric" placeholder="0" />
              <b>x</b>
              <input class="placar2" type="number" min="0" inputmode="numeric" placeholder="0" />
              <strong>${escapeHtml(p.atleta2_nome || "A definir")}</strong>
            </div>
            <button class="btn btn-primary salvar-placar" type="button">Salvar resultado</button>
          </article>
        `).join("") : `<div class="note">Nenhuma partida pronta agora. Confira se os resultados anteriores já foram lançados.</div>`}
      </div>`;

    document.getElementById("btn-apagar").addEventListener("click", async () => {
      if (!confirm("Apagar toda a chave desta modalidade?")) return;
      await apagarChave(chave.id);
      await carregarChaveAdmin();
    });

    bracketAdmin.querySelectorAll(".salvar-placar").forEach((btn) => {
      btn.addEventListener("click", async (event) => {
        const card = event.target.closest(".match-editor");
        const p1 = Number(card.querySelector(".placar1").value);
        const p2 = Number(card.querySelector(".placar2").value);
        if (!Number.isFinite(p1) || !Number.isFinite(p2) || p1 === p2) {
          alert("Informe um placar válido, sem empate.");
          return;
        }
        event.target.disabled = true;
        try {
          await registrarResultado(card.dataset.partida, p1, p2);
          await carregarChaveAdmin();
        } catch (e) {
          alert(e.message || "Erro ao salvar resultado.");
          event.target.disabled = false;
        }
      });
    });
  }

  document.querySelectorAll(".tabs button").forEach((tab) => {
    tab.addEventListener("click", async () => {
      document.querySelectorAll(".tabs button").forEach((t) => t.classList.remove("active"));
      tab.classList.add("active");
      document.getElementById("tab-inscricoes").classList.toggle("hidden", tab.dataset.tab !== "inscricoes");
      document.getElementById("tab-chaves").classList.toggle("hidden", tab.dataset.tab !== "chaves");
      if (tab.dataset.tab === "chaves") await carregarChaveAdmin();
    });
  });

  document.getElementById("btn-sair").addEventListener("click", async () => {
    await sairAdmin();
    location.href = "admin-login.html";
  });

  document.querySelector(".modal-close").addEventListener("click", () => document.getElementById("modal-comprovante").close());
  filtroModalidade.addEventListener("change", carregarInscricoes);
  filtroStatus.addEventListener("change", carregarInscricoes);
  document.getElementById("btn-atualizar").addEventListener("click", carregarInscricoes);

  renderModalidades();
  await carregarInscricoes();
</script>
</body>
</html>
