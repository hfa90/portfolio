<!doctype html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
<title>Pagamento Pix · Copa RD Saúde CD-AM</title>
<link rel="manifest" href="manifest.json" />
<meta name="theme-color" content="#101419" />
<link rel="apple-touch-icon" href="icons/apple-touch-icon.png" />
<link rel="icon" href="icons/favicon-32.png" />
<link rel="stylesheet" href="css/style.css" />
<script defer src="https://cdn.jsdelivr.net/npm/qrcode@1.5.3/build/qrcode.min.js"></script>
</head>
<body>
<header class="topbar">
  <div class="container topbar-inner">
    <a class="brand" href="index.html"><span class="brand-mark">RD</span><span class="brand-text">Copa CD-AM<small>Torneio interno</small></span></a>
    <button class="nav-toggle" data-nav-toggle aria-label="Abrir menu">☰</button>
    <nav class="nav-links" data-nav>
      <a href="index.html">Início</a>
      <a href="inscricao.html">Inscrição</a>
      <a href="chaveamento.html">Chaveamento</a>
      <a href="admin.html">Admin</a>
    </nav>
  </div>
</header>

<main class="section">
  <div class="container payment-layout">
    <section class="panel payment-panel" id="conteudo">
      <div class="loading">Carregando pagamento...</div>
    </section>

    <aside class="side-panel payment-help">
      <span class="eyebrow">Pix</span>
      <h1>Confirme sua vaga</h1>
      <p>Copie o código Pix, pague no seu banco e anexe o comprovante. O organizador aprova no painel administrativo.</p>
      <div class="status-list">
        <span>Copia e cola</span>
        <span>Comprovante</span>
        <span>WhatsApp</span>
      </div>
    </aside>
  </div>
</main>

<footer class="footer"><div class="container">Copa RD Saúde CD-AM</div></footer>

<script type="module">
  import { WHATSAPP_NUMERO } from "./js/config.js";
  import { anexarComprovante, buscarInscricao, marcarWhatsapp } from "./js/appData.js";

  document.querySelector("[data-nav-toggle]").addEventListener("click", () => {
    document.querySelector("[data-nav]").classList.toggle("aberto");
  });

  const inscricaoId = new URLSearchParams(location.search).get("inscricao");
  const conteudo = document.getElementById("conteudo");

  const badges = {
    aguardando_pagamento: ["Aguardando pagamento", "badge-wait"],
    em_analise: ["Comprovante em análise", "badge-info"],
    confirmada: ["Inscrição confirmada", "badge-ok"],
    rejeitada: ["Comprovante rejeitado", "badge-danger"],
    cancelada: ["Cancelada", "badge-danger"],
  };

  function dinheiro(valor) {
    return Number(valor || 0).toLocaleString("pt-BR", { style: "currency", currency: "BRL" });
  }

  function badge(status) {
    const [texto, classe] = badges[status] || badges.aguardando_pagamento;
    return `<span class="badge ${classe}">${texto}</span>`;
  }

  function textoWhatsapp(inscricao) {
    const pagamento = inscricao.pagamentos;
    return `Olá! Segue a confirmação da minha inscrição na Copa RD Saúde CD-AM.\n\nNome: ${inscricao.atletas.nome_completo}\nModalidade: ${inscricao.modalidades.nome}\nValor: ${dinheiro(pagamento.valor)}\nCódigo Pix: ${pagamento.txid}\n\nComprovante em anexo.`;
  }

  function lerPreview(arquivo) {
    return new Promise((resolve) => {
      if (!arquivo || !arquivo.type.startsWith("image/") || arquivo.size > 2_500_000) return resolve("");
      const reader = new FileReader();
      reader.onload = () => resolve(reader.result);
      reader.onerror = () => resolve("");
      reader.readAsDataURL(arquivo);
    });
  }

  async function render() {
    const inscricao = await buscarInscricao(inscricaoId);
    if (!inscricao) {
      conteudo.innerHTML = `
        <div class="empty-state">
          <h2>Inscrição não encontrada</h2>
          <p>O link pode estar incorreto ou a inscrição foi removida.</p>
          <a class="btn btn-primary" href="inscricao.html">Fazer inscrição</a>
        </div>`;
      return;
    }

    const pagamento = inscricao.pagamentos;
    const aprovado = inscricao.status === "confirmada";
    const whatsapp = `https://wa.me/${WHATSAPP_NUMERO}?text=${encodeURIComponent(textoWhatsapp(inscricao))}`;

    conteudo.innerHTML = `
      <div class="payment-head">
        <div>
          <span class="eyebrow">${inscricao.modalidades.nome}</span>
          <h2>${inscricao.atletas.nome_completo}</h2>
        </div>
        ${badge(inscricao.status)}
      </div>

      ${aprovado ? `
        <div class="success-block">
          <strong>Pagamento aprovado.</strong>
          <p>Sua inscrição já está liberada para o sorteio da chave.</p>
          <a class="btn btn-primary" href="chaveamento.html?modalidade=${inscricao.modalidades.slug}">Ver chaveamento</a>
        </div>
      ` : `
        <div class="amount-box">
          <span>Valor da inscrição</span>
          <strong>${dinheiro(pagamento.valor)}</strong>
        </div>

        <div class="pix-area">
          <canvas id="qr-canvas" width="220" height="220" aria-label="QR Code Pix"></canvas>
          <div>
            <label class="mini-label">Pix copia e cola</label>
            <div class="copy-box" id="pix-texto">${pagamento.pix_copia_e_cola}</div>
            <button class="btn btn-secondary btn-wide" id="btn-copiar" type="button">Copiar código Pix</button>
          </div>
        </div>

        <div class="upload-card">
          <input id="arquivo" type="file" accept="image/*,application/pdf" hidden />
          <button class="upload-button" type="button" id="btn-arquivo">
            <strong>Anexar comprovante</strong>
            <span id="arquivo-label">${pagamento.comprovante_nome || pagamento.comprovante_url || "Imagem ou PDF do pagamento"}</span>
          </button>
          <div id="preview"></div>
        </div>

        <a class="btn btn-whatsapp btn-wide" id="btn-whatsapp" href="${whatsapp}" target="_blank" rel="noopener">Confirmar pelo WhatsApp</a>
      `}
    `;

    const preview = document.getElementById("preview");
    if (pagamento.comprovante_preview) {
      preview.innerHTML = `<img class="receipt-preview" src="${pagamento.comprovante_preview}" alt="Comprovante anexado" />`;
    } else if (pagamento.comprovante_url) {
      preview.innerHTML = `<div class="note">Comprovante anexado: ${pagamento.comprovante_nome || pagamento.comprovante_url}</div>`;
    }

    if (!aprovado) {
      const desenharQr = () => {
        if (window.QRCode?.toCanvas) {
          window.QRCode.toCanvas(document.getElementById("qr-canvas"), pagamento.pix_copia_e_cola, { width: 220, margin: 1 });
        } else {
          const canvas = document.getElementById("qr-canvas");
          const ctx = canvas.getContext("2d");
          ctx.fillStyle = "#ffffff";
          ctx.fillRect(0, 0, 220, 220);
          ctx.fillStyle = "#101419";
          ctx.font = "700 18px Arial";
          ctx.fillText("PIX", 90, 100);
          ctx.font = "12px Arial";
          ctx.fillText("Use o copia e cola", 58, 122);
        }
      };
      setTimeout(desenharQr, 150);

      document.getElementById("btn-copiar").addEventListener("click", async () => {
        await navigator.clipboard.writeText(pagamento.pix_copia_e_cola);
        const btn = document.getElementById("btn-copiar");
        btn.textContent = "Código copiado";
        setTimeout(() => (btn.textContent = "Copiar código Pix"), 1800);
      });

      document.getElementById("btn-arquivo").addEventListener("click", () => document.getElementById("arquivo").click());
      document.getElementById("arquivo").addEventListener("change", async (event) => {
        const arquivo = event.target.files[0];
        if (!arquivo) return;
        document.getElementById("arquivo-label").textContent = "Enviando comprovante...";
        try {
          const previewData = await lerPreview(arquivo);
          await anexarComprovante(inscricao.id, arquivo, previewData);
          await render();
        } catch (e) {
          console.error(e);
          document.getElementById("arquivo-label").textContent = e.message || "Erro ao anexar.";
        }
      });

      document.getElementById("btn-whatsapp").addEventListener("click", () => marcarWhatsapp(inscricao.id));
    }
  }

  render();
</script>
</body>
</html>
