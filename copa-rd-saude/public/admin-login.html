<!doctype html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
<title>Admin · Copa RD Saúde CD-AM</title>
<link rel="manifest" href="manifest.json" />
<meta name="theme-color" content="#101419" />
<link rel="apple-touch-icon" href="icons/apple-touch-icon.png" />
<link rel="icon" href="icons/favicon-32.png" />
<link rel="stylesheet" href="css/style.css" />
</head>
<body>
<header class="topbar">
  <div class="container topbar-inner">
    <a class="brand" href="index.html"><span class="brand-mark">RD</span><span class="brand-text">Copa CD-AM<small>Torneio interno</small></span></a>
    <nav class="nav-links"><a href="index.html">Início</a></nav>
  </div>
</header>

<main class="section">
  <div class="container auth-layout">
    <section class="panel auth-panel">
      <span class="eyebrow">Acesso do organizador</span>
      <h1>Entrar no painel</h1>
      <p class="muted" id="modo-texto">No modo local, qualquer e-mail com senha de 3+ caracteres entra para teste.</p>

      <form id="form-login" class="form">
        <div class="field">
          <label for="email">E-mail</label>
          <input id="email" type="email" required autocomplete="email" placeholder="organizador@empresa.com.br" />
        </div>
        <div class="field">
          <label for="senha">Senha</label>
          <input id="senha" type="password" required autocomplete="current-password" placeholder="Sua senha" />
        </div>
        <div id="alerta" class="alert hidden"></div>
        <button id="btn-login" class="btn btn-primary btn-wide" type="submit">Entrar</button>
      </form>
    </section>
  </div>
</main>

<script type="module">
  import { adminLogado, entrarAdmin, modoDados } from "./js/appData.js";

  if (await adminLogado()) location.href = "admin.html";
  if (modoDados() === "supabase") {
    document.getElementById("modo-texto").textContent = "Use o usuário criado no Supabase Authentication e liberado na tabela auth_admins.";
  }

  document.getElementById("form-login").addEventListener("submit", async (event) => {
    event.preventDefault();
    const alerta = document.getElementById("alerta");
    const btn = document.getElementById("btn-login");
    alerta.className = "alert hidden";
    btn.disabled = true;
    btn.textContent = "Entrando...";
    try {
      await entrarAdmin(document.getElementById("email").value.trim(), document.getElementById("senha").value);
      location.href = "admin.html";
    } catch (e) {
      alerta.textContent = "Não foi possível entrar. Confira e-mail e senha.";
      alerta.className = "alert alert-error";
      btn.disabled = false;
      btn.textContent = "Entrar";
    }
  });
</script>
</body>
</html>
