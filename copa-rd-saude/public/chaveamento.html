<!doctype html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
<title>Chaveamento · Copa RD Saúde CD-AM</title>
<link rel="manifest" href="manifest.json" />
<meta name="theme-color" content="#101419" />
<link rel="apple-touch-icon" href="icons/apple-touch-icon.png" />
<link rel="icon" href="icons/favicon-32.png" />
<link rel="stylesheet" href="css/style.css" />
</head>
<body>
<header class="topbar">
  <div class="container topbar-inner">
    <a class="brand" href="index.html"><span class="brand-mark">RD</span><span class="brand-text">Copa CD-AM<small>Chaves</small></span></a>
    <button class="nav-toggle" data-nav-toggle aria-label="Abrir menu">☰</button>
    <nav class="nav-links" data-nav>
      <a href="index.html">Início</a>
      <a href="inscricao.html">Inscrição</a>
      <a href="chaveamento.html" class="ativo">Chaveamento</a>
      <a href="admin.html">Admin</a>
    </nav>
  </div>
</header>

<main class="section">
  <div class="container">
    <div class="section-head">
      <div>
        <span class="eyebrow">Ao vivo</span>
        <h1>Chaveamento</h1>
      </div>
      <a class="btn btn-secondary" href="inscricao.html">Inscrever atleta</a>
    </div>

    <div class="segmented" id="modalidades"></div>

    <div class="legend">
      <span><i class="dot ready"></i> Pronta</span>
      <span><i class="dot done"></i> Finalizada</span>
      <span><i class="dot wait"></i> Aguardando</span>
    </div>

    <div id="conteudo-chave" class="bracket-stage">
      <div class="loading">Carregando chaveamento...</div>
    </div>
  </div>
</main>

<footer class="footer"><div class="container">Copa RD Saúde CD-AM</div></footer>

<script type="module">
  import { buscarChaveCompleta, listarModalidades } from "./js/appData.js";

  document.querySelector("[data-nav-toggle]").addEventListener("click", () => {
    document.querySelector("[data-nav]").classList.toggle("aberto");
  });

  const params = new URLSearchParams(location.search);
  let modalidades = await listarModalidades();
  let atual = modalidades.find((m) => m.slug === params.get("modalidade"))?.id || modalidades[0]?.id || "";
  const conteudo = document.getElementById("conteudo-chave");

  function escapeHtml(texto = "") {
    return texto.replace(/[&<>"']/g, (c) => ({ "&": "&amp;", "<": "&lt;", ">": "&gt;", '"': "&quot;", "'": "&#039;" }[c]));
  }

  function renderModalidades() {
    document.getElementById("modalidades").innerHTML = modalidades.map((m) => `
      <button type="button" class="${m.id === atual ? "active" : ""}" data-id="${m.id}" data-slug="${m.slug}">
        <span>${m.icone || "CP"}</span>${m.nome}
      </button>
    `).join("");
    document.querySelectorAll("#modalidades button").forEach((btn) => {
      btn.addEventListener("click", () => {
        atual = btn.dataset.id;
        history.replaceState(null, "", `?modalidade=${btn.dataset.slug}`);
        renderModalidades();
        carregar();
      });
    });
  }

  function nome(p, lado) {
    const n = lado === 1 ? p.atleta1_nome : p.atleta2_nome;
    const id = lado === 1 ? p.atleta1_id : p.atleta2_id;
    if (n) return escapeHtml(n);
    return id ? "A definir" : "Aguardando";
  }

  function placar(p, lado) {
    if (p.status !== "finalizada" && p.status !== "wo") return "";
    return lado === 1 ? p.placar1 ?? "" : p.placar2 ?? "";
  }

  function cardPartida(p) {
    const classe = p.status === "pronta" ? "ready" : p.status === "finalizada" || p.status === "wo" ? "done" : "waiting";
    const lado = (num) => {
      const id = num === 1 ? p.atleta1_id : p.atleta2_id;
      const vencedor = p.vencedor_id && id === p.vencedor_id;
      const perdedor = p.vencedor_id && id && id !== p.vencedor_id;
      return `
        <div class="match-side ${vencedor ? "winner" : ""} ${perdedor ? "loser" : ""}">
          <span>${nome(p, num)}</span>
          <b>${placar(p, num)}</b>
        </div>`;
    };
    return `
      <article class="match-card ${classe}">
        ${lado(1)}
        ${lado(2)}
      </article>`;
  }

  function colunaFase(partidas, titulo) {
    const porRodada = partidas.reduce((acc, p) => {
      acc[p.rodada] = acc[p.rodada] || [];
      acc[p.rodada].push(p);
      return acc;
    }, {});
    return Object.entries(porRodada).map(([rodada, lista]) => `
      <section class="bracket-column">
        <h3>${titulo(rodada)}</h3>
        ${lista.map(cardPartida).join("")}
      </section>
    `).join("");
  }

  async function carregar() {
    conteudo.innerHTML = `<div class="loading">Carregando chaveamento...</div>`;
    const modalidade = modalidades.find((m) => m.id === atual);
    const resultado = await buscarChaveCompleta(atual);
    if (!resultado) {
      conteudo.innerHTML = `
        <div class="empty-state">
          <h2>${modalidade?.nome || "Modalidade"}</h2>
          <p>O organizador ainda não sorteou a chave desta modalidade.</p>
          <div class="action-row center">
            <a class="btn btn-primary" href="inscricao.html?modalidade=${modalidade?.slug || ""}">Inscrever atleta</a>
            <a class="btn btn-secondary" href="admin.html">Abrir admin</a>
          </div>
        </div>`;
      return;
    }

    const { chave, partidas } = resultado;
    const campeao = chave.campeao_id ? partidas.find((p) => p.vencedor_id === chave.campeao_id)?.vencedor_nome : "";
    const wb = partidas.filter((p) => p.fase === "WB");
    const lb = partidas.filter((p) => p.fase === "LB");
    const gf = partidas.filter((p) => p.fase === "GF" && (p.rodada === 1 || p.atleta1_id || p.status === "pronta"));

    conteudo.innerHTML = `
      ${campeao ? `<div class="champion-banner"><span>Campeão</span><strong>${escapeHtml(campeao)}</strong></div>` : ""}
      <div class="bracket-meta">
        <strong>${modalidade.nome}</strong>
        <span>${chave.tamanho} posições · ${partidas.length} partidas · ${chave.status.replaceAll("_", " ")}</span>
      </div>
      <div class="phase-title">Chave de vencedores</div>
      <div class="bracket-scroll"><div class="bracket-row">${colunaFase(wb, (r) => `Rodada ${r}`)}</div></div>
      <div class="phase-title">Repescagem</div>
      <div class="bracket-scroll"><div class="bracket-row">${colunaFase(lb, (r) => `Rodada ${r}`)}</div></div>
      <div class="phase-title">Grande final</div>
      <div class="bracket-scroll"><div class="bracket-row">${colunaFase(gf, (r) => Number(r) === 1 ? "Jogo 1" : "Reset")}</div></div>
    `;
  }

  renderModalidades();
  carregar();
</script>
</body>
</html>
