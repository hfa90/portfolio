<!doctype html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
<title>Inscrição · Copa RD Saúde CD-AM</title>
<link rel="manifest" href="manifest.json" />
<meta name="theme-color" content="#101419" />
<link rel="apple-touch-icon" href="icons/apple-touch-icon.png" />
<link rel="icon" href="icons/favicon-32.png" />
<link rel="stylesheet" href="css/style.css" />
</head>
<body>
<header class="topbar">
  <div class="container topbar-inner">
    <a class="brand" href="index.html"><span class="brand-mark">RD</span><span class="brand-text">Copa CD-AM<small>Torneio interno</small></span></a>
    <button class="nav-toggle" data-nav-toggle aria-label="Abrir menu">☰</button>
    <nav class="nav-links" data-nav>
      <a href="index.html">Início</a>
      <a href="inscricao.html" class="ativo">Inscrição</a>
      <a href="chaveamento.html">Chaveamento</a>
      <a href="admin.html">Admin</a>
    </nav>
  </div>
</header>

<main class="section">
  <div class="container form-layout">
    <aside class="side-panel">
      <span class="eyebrow">Nova inscrição</span>
      <h1>Entre na disputa</h1>
      <p>Escolha a modalidade, preencha seus dados e siga para o Pix. A inscrição só entra no sorteio depois da aprovação do comprovante.</p>
      <div class="status-list">
        <span>Cadastro</span>
        <span>Pix</span>
        <span>Aprovação</span>
        <span>Chave</span>
      </div>
    </aside>

    <section class="panel">
      <form id="form-inscricao" class="form">
        <div class="field">
          <label>Modalidade</label>
          <div class="segmented" id="modalidades"></div>
        </div>

        <div class="field-grid">
          <div class="field">
            <label for="nome">Nome completo</label>
            <input id="nome" type="text" required autocomplete="name" placeholder="Nome como será chamado na tabela" />
          </div>
          <div class="field">
            <label for="email">E-mail</label>
            <input id="email" type="email" required autocomplete="email" placeholder="voce@empresa.com.br" />
          </div>
        </div>

        <div class="field-grid">
          <div class="field">
            <label for="whatsapp">WhatsApp</label>
            <input id="whatsapp" type="tel" required autocomplete="tel" inputmode="tel" placeholder="(92) 99999-9999" />
          </div>
          <div class="field">
            <label for="loja">Setor ou loja</label>
            <input id="loja" type="text" placeholder="Ex.: Expedição, Loja 123" />
          </div>
        </div>

        <div class="field">
          <label for="matricula">Matrícula <small>opcional</small></label>
          <input id="matricula" type="text" placeholder="Ajuda o admin a identificar o atleta" />
        </div>

        <div id="alerta" class="alert hidden"></div>
        <button id="btn-enviar" class="btn btn-primary btn-wide" type="submit">Continuar para o Pix</button>
      </form>
    </section>
  </div>
</main>

<footer class="footer"><div class="container">Copa RD Saúde CD-AM</div></footer>

<script type="module">
  import { criarInscricao, listarModalidades } from "./js/appData.js";

  document.querySelector("[data-nav-toggle]").addEventListener("click", () => {
    document.querySelector("[data-nav]").classList.toggle("aberto");
  });

  const params = new URLSearchParams(location.search);
  let modalidadeAtual = params.get("modalidade") || "";
  let modalidades = await listarModalidades();
  if (!modalidadeAtual) modalidadeAtual = modalidades[0]?.slug || "";

  const wrap = document.getElementById("modalidades");
  const alerta = document.getElementById("alerta");

  function renderModalidades() {
    wrap.innerHTML = modalidades.map((m) => `
      <button type="button" class="${m.slug === modalidadeAtual ? "active" : ""}" data-slug="${m.slug}">
        <span>${m.icone || "CP"}</span>${m.nome}
      </button>
    `).join("");
    wrap.querySelectorAll("button").forEach((btn) => {
      btn.addEventListener("click", () => {
        modalidadeAtual = btn.dataset.slug;
        renderModalidades();
      });
    });
  }

  function erro(texto) {
    alerta.textContent = texto;
    alerta.className = "alert alert-error";
  }

  function limparErro() {
    alerta.className = "alert hidden";
    alerta.textContent = "";
  }

  renderModalidades();

  document.getElementById("whatsapp").addEventListener("input", (e) => {
    const digitos = e.target.value.replace(/\D/g, "").slice(0, 11);
    const ddd = digitos.slice(0, 2);
    const parte1 = digitos.length > 10 ? digitos.slice(2, 7) : digitos.slice(2, 6);
    const parte2 = digitos.length > 10 ? digitos.slice(7, 11) : digitos.slice(6, 10);
    e.target.value = [ddd && `(${ddd}`, ddd && ") ", parte1, parte2 && `-${parte2}`].filter(Boolean).join("");
  });

  document.getElementById("form-inscricao").addEventListener("submit", async (event) => {
    event.preventDefault();
    limparErro();

    const nome = document.getElementById("nome").value.trim();
    const email = document.getElementById("email").value.trim().toLowerCase();
    const whatsapp = document.getElementById("whatsapp").value.replace(/\D/g, "");
    const loja = document.getElementById("loja").value.trim();
    const matricula = document.getElementById("matricula").value.trim();

    if (!modalidadeAtual) return erro("Escolha uma modalidade.");
    if (nome.split(" ").length < 2) return erro("Informe nome e sobrenome.");
    if (whatsapp.length < 10) return erro("Informe um WhatsApp com DDD.");

    const btn = document.getElementById("btn-enviar");
    btn.disabled = true;
    btn.textContent = "Criando inscrição...";

    try {
      const id = await criarInscricao({ modalidadeSlug: modalidadeAtual, nome, email, whatsapp, loja, matricula });
      location.href = `pagamento.html?inscricao=${encodeURIComponent(id)}`;
    } catch (e) {
      console.error(e);
      erro(e.message || "Não foi possível criar a inscrição.");
      btn.disabled = false;
      btn.textContent = "Continuar para o Pix";
    }
  });
</script>
</body>
</html>
