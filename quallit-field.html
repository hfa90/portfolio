<!DOCTYPE html>
<html lang="pt-BR">

<head>
  <meta charset="UTF-8">
  <meta name="viewport"
    content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no, viewport-fit=cover">
  <meta name="theme-color" content="#0d1420">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="Quallit Field">
  <title>Quallit IT Field</title>
  <link rel="manifest" href="./quallit-manifest.json">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link
    href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700;800&family=JetBrains+Mono:wght@400;600&display=swap"
    rel="stylesheet">
  <style>
    /* ── RESET & TOKENS ─────────────────────────────────────────────── */
    *,
    *::before,
    *::after {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
      -webkit-tap-highlight-color: transparent;
    }

    :root {
      --bg: #0d1420;
      --bg2: #111827;
      --bg3: #1a2236;
      --surface: #162035;
      --border: rgba(255, 255, 255, .08);
      --border2: rgba(255, 255, 255, .14);
      --text: #e2eaf8;
      --text2: #94a3b8;
      --text3: #64748b;
      --accent: #0ea5e9;
      --green: #22c55e;
      --yellow: #f59e0b;
      --red: #ef4444;
      --purple: #a78bfa;
      --font: 'Space Grotesk', system-ui, sans-serif;
      --mono: 'JetBrains Mono', monospace;
      --safe-top: env(safe-area-inset-top, 0px);
      --safe-bot: env(safe-area-inset-bottom, 0px);
    }

    html,
    body {
      height: 100%;
      overflow: hidden;
      font-family: var(--font);
      background: var(--bg);
      color: var(--text);
    }

    /* ── SCREENS ────────────────────────────────────────────────────── */
    .screen {
      position: fixed;
      inset: 0;
      display: none;
      flex-direction: column;
      background: var(--bg);
    }

    .screen.active {
      display: flex;
    }

    /* ── TOPBAR ─────────────────────────────────────────────────────── */
    .topbar {
      flex-shrink: 0;
      display: flex;
      align-items: center;
      gap: 12px;
      padding: calc(var(--safe-top) + 12px) 16px 12px;
      background: var(--bg2);
      border-bottom: 1px solid var(--border);
      min-height: 56px;
    }

    .topbar-brand {
      font-size: 17px;
      font-weight: 800;
      letter-spacing: -0.5px;
    }

    .topbar-brand span {
      color: var(--accent);
    }

    .topbar-spacer {
      flex: 1;
    }

    .topbar-badge {
      background: var(--yellow);
      color: #000;
      border-radius: 99px;
      font-size: 11px;
      font-weight: 700;
      padding: 2px 8px;
      font-family: var(--mono);
      display: none;
    }

    /* ── BOTTOM NAV ─────────────────────────────────────────────────── */
    .bottomnav {
      flex-shrink: 0;
      display: flex;
      background: var(--bg2);
      border-top: 1px solid var(--border);
      padding-bottom: var(--safe-bot);
    }

    .bnav-item {
      flex: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 3px;
      padding: 10px 4px;
      background: none;
      border: none;
      color: var(--text3);
      font-family: var(--font);
      font-size: 10px;
      font-weight: 600;
      cursor: pointer;
      transition: color .15s;
      position: relative;
    }

    .bnav-item.active {
      color: var(--accent);
    }

    .bnav-item .icon {
      font-size: 20px;
      line-height: 1;
    }

    .bnav-badge {
      position: absolute;
      top: 6px;
      right: calc(50% - 18px);
      background: var(--red);
      color: #fff;
      border-radius: 99px;
      font-size: 9px;
      font-weight: 700;
      min-width: 15px;
      height: 15px;
      padding: 0 4px;
      display: none;
      align-items: center;
      justify-content: center;
      font-family: var(--mono);
    }

    /* ── SCROLL BODY ────────────────────────────────────────────────── */
    .screen-body {
      flex: 1;
      overflow-y: auto;
      -webkit-overflow-scrolling: touch;
      padding: 16px;
    }

    /* ── CARD ───────────────────────────────────────────────────────── */
    .card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 14px;
      padding: 16px;
      margin-bottom: 12px;
    }

    .card-title {
      font-size: 13px;
      font-weight: 700;
      margin-bottom: 4px;
    }

    .card-sub {
      font-size: 11px;
      color: var(--text3);
    }

    /* ── STATUS BADGE ───────────────────────────────────────────────── */
    .badge {
      display: inline-flex;
      align-items: center;
      padding: 3px 10px;
      border-radius: 20px;
      font-size: 11px;
      font-weight: 700;
    }

    .badge-ativo {
      background: rgba(34, 197, 94, .12);
      color: var(--green);
      border: 1px solid rgba(34, 197, 94, .25);
    }

    .badge-inativo {
      background: rgba(239, 68, 68, .1);
      color: var(--red);
      border: 1px solid rgba(239, 68, 68, .2);
    }

    .badge-manut {
      background: rgba(245, 158, 11, .1);
      color: var(--yellow);
      border: 1px solid rgba(245, 158, 11, .2);
    }

    .badge-backup {
      background: rgba(14, 165, 233, .1);
      color: var(--accent);
      border: 1px solid rgba(14, 165, 233, .2);
    }

    .badge-offline {
      background: rgba(245, 158, 11, .15);
      color: var(--yellow);
      border: 1px solid rgba(245, 158, 11, .3);
    }

    /* ── KPI STRIP ──────────────────────────────────────────────────── */
    .kpi-strip {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 10px;
      margin-bottom: 16px;
    }

    .kpi-box {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 12px;
      text-align: center;
    }

    .kpi-val {
      font-size: 22px;
      font-weight: 800;
      font-family: var(--mono);
    }

    .kpi-lbl {
      font-size: 10px;
      color: var(--text3);
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: .6px;
      margin-top: 2px;
    }

    /* ── SEARCH ─────────────────────────────────────────────────────── */
    .search-wrap {
      position: relative;
      margin-bottom: 14px;
    }

    .search-input {
      width: 100%;
      padding: 11px 14px 11px 40px;
      background: var(--surface);
      border: 1px solid var(--border2);
      border-radius: 12px;
      color: var(--text);
      font-family: var(--font);
      font-size: 14px;
      outline: none;
    }

    .search-input:focus {
      border-color: var(--accent);
    }

    .search-icon {
      position: absolute;
      left: 14px;
      top: 50%;
      transform: translateY(-50%);
      font-size: 16px;
    }

    /* ── ITEM CARD ──────────────────────────────────────────────────── */
    .item-card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 14px;
      margin-bottom: 10px;
      display: flex;
      gap: 12px;
      align-items: flex-start;
      cursor: pointer;
      transition: border-color .15s;
      -webkit-user-select: none;
      user-select: none;
    }

    .item-card:active {
      border-color: var(--border2);
      background: var(--bg3);
    }

    .item-card.validated {
      border-color: rgba(34, 197, 94, .35);
      background: rgba(34, 197, 94, .04);
    }

    .item-icon {
      font-size: 28px;
      flex-shrink: 0;
    }

    .item-info {
      flex: 1;
      min-width: 0;
    }

    .item-name {
      font-size: 14px;
      font-weight: 700;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .item-meta {
      font-size: 11px;
      color: var(--text3);
      margin-top: 2px;
    }

    .item-check {
      font-size: 20px;
      flex-shrink: 0;
      align-self: center;
      color: var(--text3);
    }

    .item-card.validated .item-check {
      color: var(--green);
    }

    /* ── SCANNER SCREEN ─────────────────────────────────────────────── */
    .scanner-wrap {
      flex: 1;
      position: relative;
      overflow: hidden;
      background: #000;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    #qr-video {
      width: 100%;
      height: 100%;
      object-fit: cover;
      display: block;
    }

    .scanner-overlay {
      position: absolute;
      inset: 0;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      pointer-events: none;
    }

    .scanner-frame {
      width: 220px;
      height: 220px;
      border: 2px solid rgba(255, 255, 255, .3);
      border-radius: 20px;
      box-shadow: 0 0 0 9999px rgba(0, 0, 0, .55);
      position: relative;
    }

    .scanner-frame::before,
    .scanner-frame::after,
    .scanner-frame>span::before,
    .scanner-frame>span::after {
      content: '';
      position: absolute;
      width: 28px;
      height: 28px;
      border-color: var(--accent);
      border-style: solid;
    }

    .scanner-frame::before {
      top: -2px;
      left: -2px;
      border-width: 3px 0 0 3px;
      border-radius: 20px 0 0 0;
    }

    .scanner-frame::after {
      top: -2px;
      right: -2px;
      border-width: 3px 3px 0 0;
      border-radius: 0 20px 0 0;
    }

    .scanner-frame>span::before {
      bottom: -2px;
      left: -2px;
      border-width: 0 0 3px 3px;
      border-radius: 0 0 0 20px;
    }

    .scanner-frame>span::after {
      bottom: -2px;
      right: -2px;
      border-width: 0 3px 3px 0;
      border-radius: 0 0 20px 0;
    }

    .scan-line {
      position: absolute;
      left: 8px;
      right: 8px;
      height: 2px;
      background: linear-gradient(90deg, transparent, var(--accent), transparent);
      animation: scanMove 2s ease-in-out infinite;
      top: 50%;
    }

    @keyframes scanMove {

      0%,
      100% {
        top: 15%;
        opacity: .6;
      }

      50% {
        top: 85%;
        opacity: 1;
      }
    }

    .scanner-status {
      margin-top: 24px;
      padding: 8px 20px;
      background: rgba(0, 0, 0, .6);
      border-radius: 99px;
      color: #fff;
      font-size: 13px;
      font-weight: 600;
      backdrop-filter: blur(8px);
      text-align: center;
      max-width: 280px;
    }

    .scanner-controls {
      flex-shrink: 0;
      padding: 14px 16px;
      background: var(--bg2);
      border-top: 1px solid var(--border);
      display: flex;
      gap: 10px;
      padding-bottom: calc(14px + var(--safe-bot));
    }

    /* ── BUTTONS ────────────────────────────────────────────────────── */
    .btn {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 6px;
      padding: 12px 20px;
      border-radius: 12px;
      font-family: var(--font);
      font-size: 14px;
      font-weight: 700;
      border: none;
      cursor: pointer;
      transition: all .15s;
      -webkit-user-select: none;
      user-select: none;
    }

    .btn:active {
      transform: scale(.97);
    }

    .btn-primary {
      background: var(--accent);
      color: #fff;
      flex: 1;
      font-size: 15px;
      padding: 14px;
    }

    .btn-primary:active {
      background: #0284c7;
    }

    .btn-danger {
      background: var(--red);
      color: #fff;
    }

    .btn-danger:active {
      background: #dc2626;
    }

    .btn-ghost {
      background: var(--bg3);
      color: var(--text2);
      border: 1px solid var(--border2);
    }

    .btn-ghost:active {
      background: var(--surface);
    }

    .btn-success {
      background: var(--green);
      color: #fff;
      flex: 1;
      font-size: 15px;
      padding: 14px;
    }

    .btn-full {
      width: 100%;
    }

    /* ── RESULT SHEET ───────────────────────────────────────────────── */
    .result-sheet {
      position: fixed;
      inset: 0;
      z-index: 200;
      display: none;
      flex-direction: column;
      background: var(--bg);
      animation: slideUp .3s cubic-bezier(.34, 1.56, .64, 1);
    }

    .result-sheet.open {
      display: flex;
    }

    @keyframes slideUp {
      from {
        transform: translateY(100%);
      }

      to {
        transform: translateY(0);
      }
    }

    .result-header {
      flex-shrink: 0;
      padding: calc(var(--safe-top) + 14px) 16px 14px;
      background: var(--bg2);
      border-bottom: 1px solid var(--border);
      display: flex;
      align-items: center;
      gap: 12px;
    }

    .result-body {
      flex: 1;
      overflow-y: auto;
      padding: 16px;
    }

    .result-footer {
      flex-shrink: 0;
      padding: 14px 16px;
      background: var(--bg2);
      border-top: 1px solid var(--border);
      display: flex;
      gap: 10px;
      padding-bottom: calc(14px + var(--safe-bot));
    }

    /* ── FIELD ROW ──────────────────────────────────────────────────── */
    .field-row {
      display: flex;
      align-items: center;
      gap: 12px;
      padding: 11px 14px;
      background: var(--bg3);
      border-radius: 10px;
      border: 1px solid var(--border);
      margin-bottom: 8px;
    }

    .field-label {
      font-size: 10px;
      color: var(--text3);
      text-transform: uppercase;
      letter-spacing: .8px;
      font-family: var(--mono);
      width: 80px;
      flex-shrink: 0;
    }

    .field-val {
      font-size: 13px;
      font-weight: 600;
      flex: 1;
    }

    /* ── LOGIN ──────────────────────────────────────────────────────── */
    .login-wrap {
      flex: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 32px 24px;
    }

    .login-logo {
      font-size: 24px;
      font-weight: 800;
      margin-bottom: 6px;
    }

    .login-logo span {
      color: var(--accent);
    }

    .login-sub {
      font-size: 13px;
      color: var(--text3);
      margin-bottom: 32px;
    }

    .login-form {
      width: 100%;
      max-width: 360px;
    }

    .form-group {
      margin-bottom: 14px;
    }

    .form-label {
      font-size: 11px;
      font-weight: 600;
      color: var(--text3);
      text-transform: uppercase;
      letter-spacing: .8px;
      display: block;
      margin-bottom: 6px;
      font-family: var(--mono);
    }

    .form-input {
      width: 100%;
      padding: 13px 14px;
      background: var(--surface);
      border: 1px solid var(--border2);
      border-radius: 12px;
      color: var(--text);
      font-family: var(--font);
      font-size: 15px;
      outline: none;
    }

    .form-input:focus {
      border-color: var(--accent);
    }

    /* ── TOAST ──────────────────────────────────────────────────────── */
    #toast {
      position: fixed;
      top: calc(var(--safe-top) + 16px);
      left: 50%;
      transform: translateX(-50%) translateY(-80px);
      background: var(--surface);
      border: 1px solid var(--border2);
      border-radius: 99px;
      padding: 10px 20px;
      font-size: 13px;
      font-weight: 600;
      box-shadow: 0 4px 20px rgba(0, 0, 0, .4);
      z-index: 9999;
      transition: transform .3s cubic-bezier(.34, 1.56, .64, 1);
      white-space: nowrap;
      max-width: calc(100vw - 32px);
    }

    #toast.show {
      transform: translateX(-50%) translateY(0);
    }

    /* ── SYNC INDICATOR ─────────────────────────────────────────────── */
    .sync-banner {
      background: rgba(245, 158, 11, .12);
      border-bottom: 1px solid rgba(245, 158, 11, .25);
      padding: 8px 16px;
      font-size: 12px;
      font-weight: 600;
      color: var(--yellow);
      display: none;
      align-items: center;
      gap: 8px;
      flex-shrink: 0;
    }

    .sync-banner.show {
      display: flex;
    }

    .sync-dot {
      width: 8px;
      height: 8px;
      border-radius: 50%;
      background: var(--yellow);
      animation: pulse 1.5s infinite;
    }

    @keyframes pulse {

      0%,
      100% {
        opacity: 1
      }

      50% {
        opacity: .3
      }
    }

    /* ── EMPTY STATE ────────────────────────────────────────────────── */
    .empty {
      text-align: center;
      padding: 48px 20px;
      color: var(--text3);
    }

    .empty-icon {
      font-size: 48px;
      margin-bottom: 12px;
    }

    .empty-title {
      font-size: 16px;
      font-weight: 700;
      color: var(--text2);
      margin-bottom: 6px;
    }

    /* ── OFFLINE PILL ───────────────────────────────────────────────── */
    .offline-pill {
      background: rgba(239, 68, 68, .12);
      border: 1px solid rgba(239, 68, 68, .25);
      color: var(--red);
      border-radius: 99px;
      padding: 2px 10px;
      font-size: 11px;
      font-weight: 700;
      font-family: var(--mono);
      display: none;
    }

    .offline-pill.show {
      display: inline-flex;
    }
  </style>
</head>

<body>

  <!-- ══════════════════════════════════════════════
     SCREEN: LOGIN
══════════════════════════════════════════════ -->
  <div class="screen active" id="screen-login">
    <div class="topbar">
      <div class="topbar-brand">Quallit<span>IT</span></div>
      <div class="topbar-spacer"></div>
      <span class="offline-pill" id="login-offline">📵 Offline</span>
    </div>
    <div class="login-wrap">
      <div class="login-logo">Quallit<span>IT</span></div>
      <div class="login-sub">Field App — Inventário em Campo</div>
      <div class="login-form">
        <div class="form-group">
          <label class="form-label">Código de Acesso</label>
          <input class="form-input" id="login-code" type="text" placeholder="Código do CD" autocomplete="off"
            autocorrect="off" autocapitalize="none" spellcheck="false" oninput="this.value=this.value.toUpperCase()"
            onkeydown="if(event.key==='Enter')doLogin()">
        </div>
        <div class="form-group">
          <label class="form-label">Senha</label>
          <input class="form-input" id="login-pass" type="password" placeholder="••••••"
            onkeydown="if(event.key==='Enter')doLogin()">
        </div>
        <button class="btn btn-primary btn-full" onclick="doLogin()" id="btn-login">Entrar →</button>
        <div id="login-err" style="margin-top:12px;font-size:12px;color:var(--red);text-align:center;display:none">
        </div>
        <div style="margin-top:20px;text-align:center;font-size:12px;color:var(--text3)">
          Não tem internet? Use o modo <strong style="color:var(--yellow)">offline</strong> — seus dados salvos
          localmente serão usados.
        </div>
      </div>
    </div>
  </div>

  <!-- ══════════════════════════════════════════════
     SCREEN: MAIN APP (com bottom nav)
══════════════════════════════════════════════ -->
  <div class="screen" id="screen-app">

    <!-- Topbar -->
    <div class="topbar">
      <div>
        <div class="topbar-brand">Quallit<span>IT</span></div>
        <div style="font-size:10px;color:var(--text3);font-family:var(--mono)" id="topbar-user"></div>
      </div>
      <div class="topbar-spacer"></div>
      <span class="offline-pill" id="app-offline">📵 Offline</span>
      <span class="topbar-badge" id="sync-badge">0 pendente(s)</span>
      <button class="btn btn-ghost" style="padding:8px 12px;font-size:12px" onclick="logout()">Sair</button>
    </div>

    <!-- Sync banner -->
    <div class="sync-banner" id="sync-banner">
      <span class="sync-dot"></span>
      <span id="sync-banner-text">Validações pendentes de sincronização</span>
      <button onclick="syncNow()"
        style="margin-left:auto;background:rgba(245,158,11,.15);border:1px solid rgba(245,158,11,.3);color:var(--yellow);border-radius:99px;padding:4px 12px;font-size:11px;font-weight:700;font-family:var(--font);cursor:pointer">Sincronizar</button>
    </div>

    <!-- TAB: DASHBOARD -->
    <div class="screen-body" id="tab-dashboard" style="display:flex;flex-direction:column">
      <div class="kpi-strip" id="dash-kpis"></div>
      <div
        style="font-size:11px;font-weight:600;color:var(--text3);text-transform:uppercase;letter-spacing:1px;margin-bottom:10px;font-family:var(--mono)">
        Resumo do Inventário</div>
      <div id="dash-cats"></div>
      <div style="margin-top:8px;text-align:center">
        <button class="btn btn-ghost" onclick="syncInventory()" style="font-size:12px;padding:10px 20px">
          🔄 Atualizar dados do servidor
        </button>
        <div id="dash-last-sync" style="font-size:11px;color:var(--text3);margin-top:8px;font-family:var(--mono)"></div>
      </div>
    </div>

    <!-- TAB: INVENTÁRIO -->
    <div class="screen-body" id="tab-inventory" style="display:none;flex-direction:column">
      <div class="search-wrap">
        <span class="search-icon">🔍</span>
        <input class="search-input" id="inv-search" placeholder="Equipamento, modelo, N/S..."
          oninput="renderInventory()">
      </div>
      <div style="display:flex;gap:8px;margin-bottom:14px;overflow-x:auto;padding-bottom:4px">
        <select id="inv-flt-status" onchange="renderInventory()"
          style="background:var(--surface);border:1px solid var(--border2);border-radius:8px;padding:7px 10px;color:var(--text);font-size:12px;font-family:var(--font);outline:none;flex-shrink:0">

  <!-- ══════════════════════════════════════════════
     RESULT SHEET (full-screen item detail)
══════════════════════════════════════════════ -->
  <div class="result-sheet" id="result-sheet">

  <!-- Toast -->

  <script>
    // ══════════════════════════════════════════════════════════════════
    // CONFIG — substitua com suas credenciais Supabase
    // ══════════════════════════════════════════════════════════════════
    const SB_URL = 'https://dhjbdkxugctpflqfuzed.supabase.co';
    const SB_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImRoamJka3h1Z2N0cGZscWZ1emVkIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzIyMDQ4MDAsImV4cCI6MjA4Nzc4MDgwMH0.3OcMUD0KGZS6IEvgVh8bKrUPLOcThkxADl2xhvpL17g';

    // ══════════════════════════════════════════════════════════════════
    // STATE
    // ══════════════════════════════════════════════════════════════════
    let ME = null;   // CD logado
    let items = [];     // inventário local
    let validated = new Set(); // IDs validados nesta sessão
    let syncQueue = [];     // validações offline pendentes
    let isOnline = navigator.onLine;
    let _qrActive = false;
    let _qrStream = null;
    let _qrRaf = null;
    let _pendingItem = null;

    // ══════════════════════════════════════════════════════════════════
    // SERVICE WORKER
    // ══════════════════════════════════════════════════════════════════
    if ('serviceWorker' in navigator) {
      navigator.serviceWorker.register('./quallit-sw.js').then(reg => {
        console.log('[SW] Registered', reg.scope);
      }).catch(console.warn);

      navigator.serviceWorker.addEventListener('message', e => {
        if (e.data?.type === 'SYNC_VALIDACOES') processQueue();
      });
    }

    // ══════════════════════════════════════════════════════════════════
    // ONLINE / OFFLINE DETECTION
    // ══════════════════════════════════════════════════════════════════
    function updateOnlineStatus() {
      isOnline = navigator.onLine;
      document.getElementById('login-offline').classList.toggle('show', !isOnline);
      document.getElementById('app-offline').classList.toggle('show', !isOnline);
      if (isOnline && syncQueue.length) {
        showBanner(`${syncQueue.length} validação(ões) pendente(s) — conectado!`);
        setTimeout(syncNow, 1500);
      }
    }
    window.addEventListener('online', updateOnlineStatus);
    window.addEventListener('offline', updateOnlineStatus);
    updateOnlineStatus();

    // ══════════════════════════════════════════════════════════════════
    // INDEXEDDB — persistência offline
    // ══════════════════════════════════════════════════════════════════
    let _db = null;
    function openDB() {
      return new Promise((res, rej) => {
        const req = indexedDB.open('quallit-field', 2);
        req.onupgradeneeded = e => {
          const db = e.target.result;
          if (!db.objectStoreNames.contains('session')) db.createObjectStore('session');
          if (!db.objectStoreNames.contains('items')) db.createObjectStore('items', { keyPath: 'id' });
          if (!db.objectStoreNames.contains('queue')) db.createObjectStore('queue', { autoIncrement: true });
        };
        req.onsuccess = e => { _db = e.target.result; res(_db); };
        req.onerror = () => rej(req.error);
      });
    }
    function idbPut(store, key, value) {
      return new Promise((res, rej) => {
        const tx = _db.transaction(store, 'readwrite');
        const req = key !== null ? tx.objectStore(store).put(value, key) : tx.objectStore(store).put(value);
        req.onsuccess = () => res(); req.onerror = () => rej(req.error);
      });
    }
    function idbGet(store, key) {
      return new Promise((res, rej) => {
        const tx = _db.transaction(store, 'readonly');
        const req = tx.objectStore(store).get(key);
        req.onsuccess = () => res(req.result); req.onerror = () => rej(req.error);
      });
    }
    function idbGetAll(store) {
      return new Promise((res, rej) => {
        const tx = _db.transaction(store, 'readonly');
        const req = tx.objectStore(store).getAll();
        req.onsuccess = () => res(req.result || []); req.onerror = () => rej(req.error);
      });
    }
    function idbClearStore(store) {
      return new Promise((res, rej) => {
        const tx = _db.transaction(store, 'readwrite');
        tx.objectStore(store).clear();
        tx.oncomplete = res; tx.onerror = () => rej(tx.error);
      });
    }
    function idbDeleteKey(store, key) {
      return new Promise((res, rej) => {
        const tx = _db.transaction(store, 'readwrite');
        tx.objectStore(store).delete(key);
        tx.oncomplete = res; tx.onerror = () => rej(tx.error);
      });
    }

    // ══════════════════════════════════════════════════════════════════
    // SUPABASE API
    // ══════════════════════════════════════════════════════════════════
    async function sbReq(method, table, qs = '', body = null) {
      const r = await fetch(`${SB_URL}/rest/v1/${table}${qs}`, {
        method,
        headers: {
          'apikey': SB_KEY,
          'Authorization': `Bearer ${SB_KEY}`,
          'Content-Type': 'application/json',
          'Prefer': 'return=representation'
        },
        body: body ? JSON.stringify(body) : undefined
      });
      if (!r.ok) { const e = await r.json().catch(() => ({})); throw new Error(e.message || `HTTP ${r.status}`); }
      return r.status === 204 ? [] : r.json();
    }

    // ══════════════════════════════════════════════════════════════════
    // LOGIN
    // ══════════════════════════════════════════════════════════════════
    async function doLogin() {
      const code = document.getElementById('login-code').value.trim();
      const pass = document.getElementById('login-pass').value;
      const btn = document.getElementById('btn-login');
      const err = document.getElementById('login-err');

      if (!code || !pass) { showErr('Preencha código e senha'); return; }

      btn.disabled = true; btn.textContent = 'Entrando...';
      err.style.display = 'none';

      try {
        // Tenta autenticação online
        if (isOnline) {
          const rows = await sbReq('GET', 'cd_users', `?code=eq.${encodeURIComponent(code)}&select=*`);
          const user = rows.find(u => u.password === pass || u.password === btoa(pass));
          if (!user) throw new Error('Código ou senha incorretos');
          ME = user;
          await idbPut('session', 'me', ME);
          await syncInventory(true);
        } else {
          // Modo offline: valida contra sessão salva
          const saved = await idbGet('session', 'me');
          if (!saved || saved.code !== code) throw new Error('Offline: código não encontrado no cache local');
          ME = saved;
          const savedItems = await idbGetAll('items');
          items = savedItems;
          toast('⚡ Modo offline — dados do cache local');
        }

        // Carrega fila de sync pendente
        const queue = await idbGetAll('queue');
        syncQueue = queue || [];
        updateSyncBadge();

        showScreen('app');
        renderDashboard();
        document.getElementById('topbar-user').textContent = ME.name || ME.cd;

      } catch (e) {
        showErr(e.message);
      } finally {
        btn.disabled = false; btn.textContent = 'Entrar →';
      }
    }

    function showErr(msg) {
      const err = document.getElementById('login-err');
      err.textContent = msg; err.style.display = 'block';
    }

    async function logout() {
      stopQR();
      ME = null; items = []; validated.clear();
      await idbPut('session', 'me', null).catch(() => { });
      showScreen('login');
    }

    // ══════════════════════════════════════════════════════════════════
    // SYNC INVENTÁRIO DO SERVIDOR
    // ══════════════════════════════════════════════════════════════════
    async function syncInventory(silent = false) {
      if (!isOnline) { if (!silent) toast('📵 Sem conexão'); return; }
      if (!ME) return;

      if (!silent) toast('🔄 Sincronizando...');
      try {
        const FIELDS = 'id,category,equipamento,modelo,fabricante,departamento,status,tempo_uso,numero_serie,ns_patrimonio,patrimonio,last_validated_at,validated_by,photo_b64';
        const rows = await sbReq('GET', 'inventory_items',
          `?cd_id=eq.${ME.id}&select=${FIELDS}&order=equipamento.asc`
        );
        items = rows;
        // Persiste no IndexedDB para uso offline
        await idbClearStore('items');
        await Promise.all(items.map(it => idbPut('items', null, it)));
        await idbPut('session', 'last_sync', new Date().toISOString());
        if (!silent) toast(`✅ ${items.length} itens sincronizados`);
        renderDashboard();
        if (document.getElementById('tab-inventory').style.display !== 'none') renderInventory();
        updateLastSync();
      } catch (e) {
        if (!silent) toast('Erro: ' + e.message, true);
      }
    }

    async function updateLastSync() {
      const ts = await idbGet('session', 'last_sync').catch(() => null);
      const el = document.getElementById('dash-last-sync');
      if (el && ts) {
        el.textContent = 'Última sync: ' + new Date(ts).toLocaleString('pt-BR', { day: '2-digit', month: '2-digit', hour: '2-digit', minute: '2-digit' });
      }
    }

    // ══════════════════════════════════════════════════════════════════
    // DASHBOARD
    // ══════════════════════════════════════════════════════════════════
    function renderDashboard() {
      updateLastSync();
      const total = items.length;
      const ativos = items.filter(i => i.status === 'Ativo').length;
      const manut = items.filter(i => i.status === 'Manutenção').length;
      const valids = items.filter(i => i.last_validated_at).length + validated.size;

      document.getElementById('dash-kpis').innerHTML = `
    <div class="kpi-box">
      <div class="kpi-val">${total}</div>
      <div class="kpi-lbl">Total</div>
    </div>
    <div class="kpi-box">
      <div class="kpi-val" style="color:var(--green)">${ativos}</div>
      <div class="kpi-lbl">Ativos</div>
    </div>
    <div class="kpi-box">
      <div class="kpi-val" style="color:var(--accent)">${valids}</div>
      <div class="kpi-lbl">Validados</div>
    </div>
  `;

      // Resumo por status
      const groups = {};
      items.forEach(i => { groups[i.status] = (groups[i.status] || 0) + 1; });
      const statusIcon = { 'Ativo': '✅', 'Manutenção': '🔧', 'Inativo': '❌', 'Backup': '💾' };
      const statusColor = { 'Ativo': 'var(--green)', 'Manutenção': 'var(--yellow)', 'Inativo': 'var(--red)', 'Backup': 'var(--accent)' };
      document.getElementById('dash-cats').innerHTML = Object.entries(groups).map(([s, n]) =>
        `<div class="card" style="display:flex;align-items:center;gap:12px;padding:12px 14px;margin-bottom:8px">
      <span style="font-size:22px">${statusIcon[s] || '📦'}</span>
      <div style="flex:1;font-size:14px;font-weight:600">${s}</div>
      <span style="font-size:18px;font-weight:800;font-family:var(--mono);color:${statusColor[s] || 'var(--text)'}">${n}</span>
    </div>`
      ).join('') || '<div class="empty"><div class="empty-icon">📋</div><div class="empty-title">Sem dados</div><p>Sincronize para carregar o inventário</p></div>';

      if (manut > 0) {
        document.getElementById('dash-cats').innerHTML += `
      <div style="padding:10px 14px;background:rgba(239,68,68,.08);border:1px solid rgba(239,68,68,.2);border-radius:10px;font-size:12px;color:var(--red);font-weight:600">
        ⚠️ ${manut} equipamento(s) em manutenção — verifique o SLA
      </div>`;
      }
    }

    // ══════════════════════════════════════════════════════════════════
    // INVENTORY LIST
    // ══════════════════════════════════════════════════════════════════
    function renderInventory() {
      const q = (document.getElementById('inv-search')?.value || '').toLowerCase();
      const fltSt = document.getElementById('inv-flt-status')?.value || '';
      const fltVal = document.getElementById('inv-flt-validated')?.value || '';

      let filtered = items;
      if (fltSt) filtered = filtered.filter(i => i.status === fltSt);
      if (fltVal === 'ok') filtered = filtered.filter(i => i.last_validated_at || validated.has(i.id));
      if (fltVal === 'pendente') filtered = filtered.filter(i => !i.last_validated_at && !validated.has(i.id));
      if (q) filtered = filtered.filter(i =>
        (i.equipamento || '').toLowerCase().includes(q) ||
        (i.modelo || '').toLowerCase().includes(q) ||
        (i.numero_serie || '').toLowerCase().includes(q) ||
        (i.patrimonio || '').toLowerCase().includes(q) ||
        (i.departamento || '').toLowerCase().includes(q)
      );

      document.getElementById('inv-count').textContent = `${filtered.length} de ${items.length} item(ns)`;

      if (!filtered.length) {
        document.getElementById('inv-list').innerHTML = `<div class="empty"><div class="empty-icon">🔍</div><div class="empty-title">Nenhum resultado</div></div>`;
        return;
      }

      const statusBadge = {
        'Ativo': '<span class="badge badge-ativo">Ativo</span>',
        'Manutenção': '<span class="badge badge-manut">Manutenção</span>',
        'Inativo': '<span class="badge badge-inativo">Inativo</span>',
        'Backup': '<span class="badge badge-backup">Backup</span>',
      };

      document.getElementById('inv-list').innerHTML = filtered.map(item => {
        const isVal = item.last_validated_at || validated.has(item.id);
        return `<div class="item-card ${isVal ? 'validated' : ''}" onclick="openItem('${item.id}')">
      <span class="item-icon">📦</span>
      <div class="item-info">
        <div class="item-name">${item.equipamento || item.modelo || 'Item'}</div>
        <div class="item-meta">${item.modelo || ''} ${item.numero_serie ? '· ' + item.numero_serie : ''}</div>
        <div style="margin-top:6px;display:flex;gap:6px;align-items:center">
          ${statusBadge[item.status] || ''}
          ${item.departamento ? `<span style="font-size:10px;color:var(--text3)">${item.departamento}</span>` : ''}
        </div>
      </div>
      <span class="item-check">${isVal ? '✅' : '○'}</span>
    </div>`;
      }).join('');
    }

    // ══════════════════════════════════════════════════════════════════
    // ITEM DETAIL
    // ══════════════════════════════════════════════════════════════════
    function openItem(id) {
      const item = items.find(i => i.id === id);
      if (!item) return;
      _pendingItem = item;

      const isVal = item.last_validated_at || validated.has(item.id);
      document.getElementById('result-title').textContent = item.equipamento || item.modelo || 'Equipamento';
      document.getElementById('result-validated-badge').style.display = isVal ? 'inline-flex' : 'none';

      const field = (lbl, val, color) => val ? `
    <div class="field-row">
      <span class="field-label">${lbl}</span>
      <span class="field-val" ${color ? `style="color:${color}"` : ''}>${val}</span>
    </div>` : '';

      const statusColor = { 'Ativo': 'var(--green)', 'Manutenção': 'var(--yellow)', 'Inativo': 'var(--red)', 'Backup': 'var(--accent)' };

      let html = '';
      if (item.photo_b64) {
        html += `<img src="${item.photo_b64}" style="width:100%;max-height:200px;object-fit:cover;border-radius:12px;margin-bottom:14px;border:1px solid var(--border)">`;
      }
      html += field('Equipamento', item.equipamento);
      html += field('Modelo', item.modelo);
      html += field('Fabricante', item.fabricante);
      html += field('N/S', item.numero_serie || item.ns_patrimonio);
      html += field('Patrimônio', item.patrimonio);
      html += field('Departamento', item.departamento);
      html += field('Status', item.status, statusColor[item.status]);
      html += field('Tempo de uso', item.tempo_uso);
      if (item.last_validated_at) {
        html += field('Última validação', new Date(item.last_validated_at).toLocaleString('pt-BR'), 'var(--green)');
      }
      if (validated.has(item.id)) {
        html += `<div style="margin-top:12px;padding:10px 14px;background:rgba(34,197,94,.08);border:1px solid rgba(34,197,94,.2);border-radius:10px;font-size:12px;color:var(--green);font-weight:600">✅ Validado nesta sessão (pendente de sync)</div>`;
      }

      document.getElementById('result-body').innerHTML = html;

      const footer = document.getElementById('result-footer');
      if (isVal && !validated.has(item.id)) {
        footer.innerHTML = `<button class="btn btn-ghost" style="flex:1" onclick="closeResult()">← Voltar</button>`;
      } else if (validated.has(item.id)) {
        footer.innerHTML = `<button class="btn btn-ghost" style="flex:1" onclick="closeResult()">← Voltar</button><div style="align-self:center;font-size:12px;color:var(--green);font-weight:600">✅ Já validado</div>`;
      } else {
        footer.innerHTML = `
      <button class="btn btn-ghost" onclick="closeResult()">← Voltar</button>
      <button class="btn btn-success" style="flex:1" onclick="validateItem('${item.id}')">✅ Validar</button>
    `;
      }

      document.getElementById('result-sheet').classList.add('open');
    }

    function closeResult() {
      document.getElementById('result-sheet').classList.remove('open');
      _pendingItem = null;
    }

    // ══════════════════════════════════════════════════════════════════
    // VALIDATE ITEM
    // ══════════════════════════════════════════════════════════════════
    async function validateItem(id) {
      const item = items.find(i => i.id === id);
      if (!item) return;

      const now = new Date().toISOString();
      const by = ME?.name || ME?.cd || 'Field';

      validated.add(id);
      item.last_validated_at = now;
      item.validated_by = by;

      // Atualiza IndexedDB local
      await idbPut('items', null, item).catch(() => { });

      if (isOnline) {
        // Tenta salvar no banco direto
        try {
          await sbReq('PATCH', 'inventory_items', `?id=eq.${id}`, {
            last_validated_at: now,
            validated_by: by,
            updated_at: now
          });
          toast('✅ Validado e salvo!');
        } catch {
          // Falhou — adiciona à fila de sync
          await enqueueValidation(id, now, by);
          toast('⚡ Salvo localmente — sincronizará depois');
        }
      } else {
        await enqueueValidation(id, now, by);
        toast('📵 Offline — validação salva para sync');
      }

      closeResult();
      renderInventory();
      renderDashboard();
    }

    async function enqueueValidation(id, now, by) {
      const entry = { item_id: id, validated_at: now, validated_by: by, queued_at: new Date().toISOString() };
      await idbPut('queue', null, entry);
      syncQueue = await idbGetAll('queue');
      updateSyncBadge();
      renderSyncTab();

      // Registra background sync se disponível
      if ('serviceWorker' in navigator && 'SyncManager' in window) {
        const reg = await navigator.serviceWorker.ready;
        reg.sync.register('quallit-sync-validacoes').catch(() => { });
      }
    }

    // ══════════════════════════════════════════════════════════════════
    // SYNC QUEUE
    // ══════════════════════════════════════════════════════════════════
    async function syncNow() {
      if (!isOnline) { toast('📵 Sem conexão'); return; }
      if (!syncQueue.length) { toast('✅ Nada para sincronizar'); return; }

      toast('🔄 Sincronizando validações...');
      let ok = 0, fail = 0;

      const allKeys = await new Promise(res => {
        const tx = _db.transaction('queue', 'readonly');
        const req = tx.objectStore('queue').getAllKeys();
        req.onsuccess = () => res(req.result);
      });

      for (let i = 0; i < syncQueue.length; i++) {
        const entry = syncQueue[i];
        const key = allKeys[i];
        try {
          await sbReq('PATCH', 'inventory_items', `?id=eq.${entry.item_id}`, {
            last_validated_at: entry.validated_at,
            validated_by: entry.validated_by,
            updated_at: entry.validated_at
          });
          await idbDeleteKey('queue', key);
          ok++;
        } catch { fail++; }
      }

      syncQueue = await idbGetAll('queue');
      updateSyncBadge();
      renderSyncTab();

      if (fail === 0) toast(`✅ ${ok} validação(ões) sincronizada(s)!`);
      else toast(`⚠️ ${ok} OK, ${fail} falhou — tente novamente`);

      await syncInventory(true);
    }

    async function processQueue() {
      syncQueue = await idbGetAll('queue').catch(() => []);
      if (syncQueue.length && isOnline) syncNow();
    }

    function updateSyncBadge() {
      const n = syncQueue.length;
      ['bn-sync-badge', 'sync-badge'].forEach(id => {
        const el = document.getElementById(id);
        if (!el) return;
        el.textContent = n;
        el.style.display = n > 0 ? 'inline-flex' : 'none';
      });
      const banner = document.getElementById('sync-banner');
      if (banner) {
        banner.classList.toggle('show', n > 0);
        const txt = document.getElementById('sync-banner-text');
        if (txt) txt.textContent = `${n} validação(ões) pendente(s) de sincronização`;
      }
    }

    function renderSyncTab() {
      const el = document.getElementById('sync-status-detail');
      const list = document.getElementById('sync-queue-list');
      if (!el || !list) return;

      el.innerHTML = `
    <div>📡 Conexão: <strong style="color:${isOnline ? 'var(--green)' : 'var(--red)'}">${isOnline ? 'Online' : 'Offline'}</strong></div>
    <div>📋 Pendentes: <strong style="color:${syncQueue.length > 0 ? 'var(--yellow)' : 'var(--green)'}">${syncQueue.length}</strong></div>
    <div>✅ Validados nesta sessão: <strong>${validated.size}</strong></div>
  `;

      if (!syncQueue.length) {
        list.innerHTML = `<div class="empty"><div class="empty-icon">✅</div><div class="empty-title">Fila vazia</div><p>Todas as validações foram sincronizadas</p></div>`;
        return;
      }

      list.innerHTML = `<div style="font-size:11px;font-weight:600;color:var(--text3);text-transform:uppercase;letter-spacing:1px;font-family:var(--mono);margin-bottom:10px">FILA DE SINCRONIZAÇÃO (${syncQueue.length})</div>` +
        syncQueue.map(e => {
          const item = items.find(i => i.id === e.item_id);
          const name = item ? (item.equipamento || item.modelo || 'Item') : e.item_id;
          const ts = new Date(e.queued_at).toLocaleTimeString('pt-BR', { hour: '2-digit', minute: '2-digit' });
          return `<div class="card" style="padding:12px 14px;margin-bottom:8px;display:flex;gap:10px;align-items:center">
        <span>⏳</span>
        <div style="flex:1">
          <div style="font-size:13px;font-weight:600">${name}</div>
          <div style="font-size:11px;color:var(--text3)">Validado às ${ts} por ${e.validated_by}</div>
        </div>
        <span class="badge badge-offline">Pendente</span>
      </div>`;
        }).join('');
    }

    // ══════════════════════════════════════════════════════════════════
    // QR SCANNER
    // ══════════════════════════════════════════════════════════════════
    function buildScannerUI() {
      const tab = document.getElementById('tab-scanner');
      tab.style.padding = '0';
      tab.innerHTML = `
    <div style="flex:1;position:relative;overflow:hidden;background:#000;display:flex;align-items:center;justify-content:center" class="scanner-wrap">
      <video id="qr-video" playsinline muted autoplay style="width:100%;height:100%;object-fit:cover"></video>
      <canvas id="qr-canvas" style="display:none"></canvas>
      <div class="scanner-overlay">
        <div class="scanner-frame"><span></span>
          <div class="scan-line"></div>
        </div>
        <div class="scanner-status" id="qr-status">Aponte para o QR Code</div>
      </div>
    </div>
    <div class="scanner-controls">
      <button class="btn btn-ghost" style="flex:1" onclick="switchTab('dashboard')">← Voltar</button>
      <button class="btn btn-primary" style="flex:2" id="btn-scan-toggle" onclick="toggleQR()">📷 Iniciar Scanner</button>
    </div>
  `;
    }

    async function toggleQR() {
      if (_qrActive) { stopQR(); return; }
      await startQR();
    }

    async function startQR() {
      const btn = document.getElementById('btn-scan-toggle');
      if (btn) { btn.textContent = '⏹ Parar Scanner'; btn.classList.remove('btn-primary'); btn.classList.add('btn-danger'); }

      try {
        const constraints = { video: { facingMode: { ideal: 'environment' }, width: { ideal: 1280 }, height: { ideal: 720 } } };
        _qrStream = await navigator.mediaDevices.getUserMedia(constraints);
        const video = document.getElementById('qr-video');
        video.srcObject = _qrStream;
        await video.play();
        _qrActive = true;
        setQRStatus('Buscando QR Code...');
        detectLoop();
      } catch (e) {
        setQRStatus('Câmera indisponível: ' + e.message);
        resetScanBtn();
      }
    }

    function stopQR() {
      _qrActive = false;
      if (_qrRaf) { cancelAnimationFrame(_qrRaf); _qrRaf = null; }
      if (_qrStream) { _qrStream.getTracks().forEach(t => t.stop()); _qrStream = null; }
      const video = document.getElementById('qr-video');
      if (video) video.srcObject = null;
      resetScanBtn();
      setQRStatus('Aponte para o QR Code');
    }

    function resetScanBtn() {
      const btn = document.getElementById('btn-scan-toggle');
      if (btn) { btn.textContent = '📷 Iniciar Scanner'; btn.classList.add('btn-primary'); btn.classList.remove('btn-danger'); }
    }

    let _qrPaused = false;
    async function detectLoop() {
      const video = document.getElementById('qr-video');
      const canvas = document.getElementById('qr-canvas');
      if (!video || !canvas || !_qrActive) return;

      if (video.readyState >= 2) {
        canvas.width = video.videoWidth;
        canvas.height = video.videoHeight;
        const ctx = canvas.getContext('2d');
        ctx.drawImage(video, 0, 0);

        if (!_qrPaused) {
          try {
            // Tenta BarcodeDetector nativo (Chrome Android / Edge)
            if ('BarcodeDetector' in window) {
              const det = new BarcodeDetector({ formats: ['qr_code'] });
              const codes = await det.detect(video);
              if (codes.length) { handleQRRead(codes[0].rawValue); }
            } else if (window.jsQR) {
              // Fallback jsQR
              const imgData = ctx.getImageData(0, 0, canvas.width, canvas.height);
              const code = window.jsQR(imgData.data, imgData.width, imgData.height, { inversionAttempts: 'dontInvert' });
              if (code) handleQRRead(code.data);
            } else {
              // Tenta carregar jsQR
              loadJsQR();
            }
          } catch (e) { /* silencioso */ }
        }
      }

      _qrRaf = requestAnimationFrame(detectLoop);
    }

    function loadJsQR() {
      if (document.getElementById('jsqr-script')) return;
      const s = document.createElement('script');
      s.id = 'jsqr-script';
      s.src = 'https://cdn.jsdelivr.net/npm/jsqr@1.4.0/dist/jsQR.min.js';
      document.head.appendChild(s);
    }

    function handleQRRead(raw) {
      if (_qrPaused) return;

      let data = null;
      try { data = JSON.parse(raw); } catch { data = { id: raw }; }

      // Busca item por id → numero_serie → patrimônio
      const item = items.find(i => i.id === data.id)
        || items.find(i => i.numero_serie && i.numero_serie === (data.ns || raw))
        || items.find(i => i.patrimonio && i.patrimonio === (data.patrimonio || raw));

      if (!item) {
        setQRStatus('QR Code não reconhecido ⚠️');
        return;
      }

      const isVal = item.last_validated_at || validated.has(item.id);
      if (isVal) {
        setQRStatus(`Já validado: ${item.equipamento || item.modelo} ✅`);
        return;
      }

      _qrPaused = true;
      setQRStatus(`Encontrado: ${item.equipamento || item.modelo || 'Item'}`);

      // Vibra se disponível
      if (navigator.vibrate) navigator.vibrate([50, 30, 50]);

      // Abre o item para confirmação
      setTimeout(() => {
        _pendingItem = item;
        openItemFromQR(item);
      }, 300);
    }

    function openItemFromQR(item) {
      _pendingItem = item;
      const footer = document.getElementById('result-footer');

      openItem(item.id);

      // Substitui footer com botões de validar/rejeitar do scanner
      document.getElementById('result-footer').innerHTML = `
    <button class="btn btn-ghost" onclick="rejectQRItem()">✗ Não é este</button>
    <button class="btn btn-success" style="flex:1" onclick="confirmQRItem()">✅ Validar</button>
  `;
    }

    async function confirmQRItem() {
      if (!_pendingItem) return;
      await validateItem(_pendingItem.id);
      _qrPaused = false;
      setQRStatus('Aponte para o próximo QR Code');
    }

    function rejectQRItem() {
      _pendingItem = null;
      _qrPaused = false;
      closeResult();
      setQRStatus('Aponte para o QR Code');
    }

    function setQRStatus(msg) {
      const el = document.getElementById('qr-status');
      if (el) el.textContent = msg;
    }

    // ══════════════════════════════════════════════════════════════════
    // NAVIGATION
    // ══════════════════════════════════════════════════════════════════
    function showScreen(id) {
      document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
      const screen = document.getElementById('screen-' + id);
      if (screen) screen.classList.add('active');
    }

    function switchTab(tab) {
      ['dashboard', 'inventory', 'scanner', 'sync'].forEach(t => {
        const body = document.getElementById('tab-' + t);
        const btn = document.getElementById('bn-' + t);
        if (!body || !btn) return;

        const isActive = t === tab;
        body.style.display = isActive ? 'flex' : 'none';
        btn.classList.toggle('active', isActive);

        // Stop QR when leaving scanner tab
        if (t === 'scanner' && !isActive && _qrActive) stopQR();
      });

      if (tab === 'scanner') {
        buildScannerUI();
        loadJsQR();
      }
      if (tab === 'inventory') renderInventory();
      if (tab === 'sync') { renderSyncTab(); }
      if (tab === 'dashboard') renderDashboard();
    }

    // ══════════════════════════════════════════════════════════════════
    // UTILS
    // ══════════════════════════════════════════════════════════════════
    let _toastTimer = null;
    function toast(msg, isErr = false) {
      const el = document.getElementById('toast');
      el.textContent = msg;
      el.style.background = isErr ? 'rgba(239,68,68,.9)' : 'var(--surface)';
      el.classList.add('show');
      clearTimeout(_toastTimer);
      _toastTimer = setTimeout(() => el.classList.remove('show'), 2800);
    }

    function showBanner(msg) {
      const el = document.getElementById('sync-banner');
      const txt = document.getElementById('sync-banner-text');
      if (el && txt) { txt.textContent = msg; el.classList.add('show'); }
    }

    // ══════════════════════════════════════════════════════════════════
    // BOOT
    // ══════════════════════════════════════════════════════════════════
    async function boot() {
      await openDB();

      // Tenta restaurar sessão salva
      const saved = await idbGet('session', 'me').catch(() => null);
      if (saved && saved.id) {
        ME = saved;
        const savedItems = await idbGetAll('items').catch(() => []);
        items = savedItems || [];
        syncQueue = await idbGetAll('queue').catch(() => []);
        updateSyncBadge();
        document.getElementById('topbar-user').textContent = ME.name || ME.cd;

        showScreen('app');
        renderDashboard();

        // Tenta sync silencioso se online
        if (isOnline) syncInventory(true);
        if (syncQueue.length && isOnline) setTimeout(syncNow, 2000);
      }

      updateOnlineStatus();
    }

    boot();
  </script>
</body>

</html>
