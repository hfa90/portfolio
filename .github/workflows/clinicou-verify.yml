name: Clinicou Verify

on:
  pull_request:
    paths:
      - "clinicou/**"
      - ".github/workflows/clinicou-verify.yml"
  push:
    branches:
      - main
    paths:
      - "clinicou/**"
      - ".github/workflows/clinicou-verify.yml"

jobs:
  static-checks:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: clinicou
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Verify
        run: npm run verify
