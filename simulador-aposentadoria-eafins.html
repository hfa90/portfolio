<!DOCTYPE html>
<html lang="pt-br">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Portal do Trabalhador & Aposentadoria 2026</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>
    <style>
        :root {
            --primary: #1a5276;
            --secondary: #d4ac0d;
            --success: #27ae60;
            --bg: #f8f9f9;
            --white: #ffffff;
        }

        body {
            font-family: 'Segoe UI', Arial, sans-serif;
            background: var(--bg);
            color: #333;
            margin: 0;
            padding: 15px;
        }

        .main-container {
            max-width: 800px;
            margin: auto;
        }

        /* Navegação */
        .tabs {
            display: flex;
            gap: 8px;
            margin-bottom: 20px;
        }

        .tab-btn {
            flex: 1;
            padding: 14px;
            border: none;
            background: #d5dbdb;
            cursor: pointer;
            border-radius: 10px;
            font-weight: bold;
            transition: 0.3s;
        }

        .tab-btn.active {
            background: var(--primary);
            color: white;
            box-shadow: 0 4px 10px rgba(26, 82, 118, 0.3);
        }

        .card {
            background: var(--white);
            padding: 25px;
            border-radius: 15px;
            box-shadow: 0 5px 20px rgba(0, 0, 0, 0.05);
            margin-bottom: 20px;
        }

        .hidden {
            display: none;
        }

        h2 {
            color: var(--primary);
            margin-top: 0;
            border-bottom: 2px solid #eee;
            padding-bottom: 10px;
        }

        label {
            display: block;
            margin: 15px 0 5px;
            font-weight: 600;
            color: #555;
        }

        input,
        select {
            width: 100%;
            padding: 12px;
            border: 1.5px solid #d5dbdb;
            border-radius: 8px;
            font-size: 16px;
            transition: 0.3s;
        }

        input:focus {
            border-color: var(--primary);
            outline: none;
        }

        .btn-calc {
            width: 100%;
            padding: 16px;
            border: none;
            border-radius: 8px;
            font-size: 18px;
            font-weight: bold;
            cursor: pointer;
            background: var(--primary);
            color: white;
            margin-top: 20px;
        }

        .btn-pdf {
            width: 100%;
            padding: 12px;
            border: none;
            border-radius: 8px;
            font-weight: bold;
            cursor: pointer;
            background: var(--success);
            color: white;
            margin-top: 15px;
            display: none;
        }

        /* Resultados */
        .resumo {
            margin-top: 25px;
            padding: 20px;
            border-radius: 10px;
            background: #fdfefe;
            border: 1px solid #e5e8e8;
        }

        .item-valor {
            display: flex;
            justify-content: space-between;
            padding: 8px 0;
            border-bottom: 1px solid #f2f2f2;
        }

        .total-box {
            background: #e8f6f3;
            padding: 15px;
            border-radius: 8px;
            margin-top: 15px;
            border-left: 5px solid var(--success);
        }

        /* FAQ Seguro Desemprego */
        .faq-section {
            margin-top: 20px;
            background: #fef9e7;
            padding: 15px;
            border-radius: 10px;
            border: 1px solid #f9e79f;
        }

        .faq-title {
            font-weight: bold;
            color: #9a7d0a;
            margin-bottom: 10px;
            display: flex;
            align-items: center;
        }
    </style>
</head>

<body>

    <div class="main-container">
        <div class="tabs">
            <button class="tab-btn active" onclick="switchTab('previdencia')">Aposentadoria</button>
            <button class="tab-btn" onclick="switchTab('trabalhista')">Trabalhista & Seguro</button>
        </div>

        <div id="previdencia" class="card">
            <h2>Simulador de Aposentadoria 2026</h2>
            <p><small>Cálculos atualizados automaticamente para as regras vigentes.</small></p>

            <label>Sexo:</label>
            <select id="sexo">
                <option value="M">Masculino</option>
                <option value="F">Feminino</option>
            </select>
            <label>Sua Idade:</label>
            <input type="number" id="idade" placeholder="Ex: 55">
            <label>Tempo de Contribuição (Anos):</label>
            <input type="number" id="tempo" placeholder="Ex: 30">

            <button class="btn-calc" onclick="calcularPrevidencia()">Verificar Meu Tempo</button>

            <div id="res-prev" class="resumo hidden"></div>
            <button id="btn-pdf-prev" class="btn-pdf" onclick="gerarPDF('res-prev', 'Aposentadoria_2026')">Salvar
                Resultado em PDF</button>
        </div>

        <div id="trabalhista" class="card hidden">
            <h2>Cálculo de Rescisão & Direitos</h2>

            <label>Salário Bruto Mensal (R$):</label>
            <input type="number" id="salario" placeholder="Ex: 3000">
            <label>Tempo de Empresa (Meses):</label>
            <input type="number" id="meses" placeholder="Ex: 24">
            <label>Motivo da Saída:</label>
            <select id="motivo" onchange="checkSeguro()">
                <option value="semJusta">Demissão sem Justa Causa</option>
                <option value="pedido">Pedido de Demissão</option>
            </select>

            <button class="btn-calc" onclick="calcularTrabalhista()">Calcular Direitos</button>

            <div id="res-trab" class="resumo hidden"></div>
            <button id="btn-pdf-trab" class="btn-pdf" onclick="gerarPDF('res-trab', 'Rescisao_Trabalhista')">Salvar
                Relatório em PDF</button>

            <div id="seguro-info" class="faq-section hidden">
                <div class="faq-title">ℹ️ Sobre seu Seguro-Desemprego:</div>
                <div id="seguro-texto"></div>
            </div>
        </div>
    </div>

    <script>
        const anoAtual = new Date().getFullYear();

        function switchTab(tab) {
            document.querySelectorAll('.card').forEach(c => c.classList.add('hidden'));
            document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
            document.getElementById(tab).classList.remove('hidden');
            event.currentTarget.classList.add('active');
        }

        function calcularPrevidencia() {
            const sexo = document.getElementById('sexo').value;
            const idade = parseFloat(document.getElementById('idade').value);
            const tempo = parseFloat(document.getElementById('tempo').value);
            if (!idade || !tempo) return alert("Preencha os campos!");

            const metaP = (sexo === 'M') ? 103 : 93;
            const soma = idade + tempo;
            const faltaP = Math.max(0, (metaP - soma) / 2);

            let html = `<h3>Simulação Previdenciária (${anoAtual})</h3>`;
            html += `<div class="item-valor"><span>Sua Pontuação Atual:</span> <b>${soma} pontos</b></div>`;
            html += `<div class="item-valor"><span>Meta para o seu Perfil:</span> <b>${metaP} pontos</b></div>`;
            html += `<div class="total-box"><strong>Conclusão:</strong><br>${soma >= metaP ? "✅ Você já atingiu a pontuação!" : "⏳ Faltam aproximadamente <b>" + faltaP.toFixed(1) + " anos</b> de contribuição + idade."}</div>`;

            exibirResultado('res-prev', 'btn-pdf-prev', html);
        }

        function calcularTrabalhista() {
            const sal = parseFloat(document.getElementById('salario').value);
            const meses = parseInt(document.getElementById('meses').value);
            const motivo = document.getElementById('motivo').value;
            if (!sal || !meses) return alert("Preencha salário e meses!");

            const decimo = (sal / 12) * (meses % 12 || 12);
            const ferias = (sal / 12 * meses) * 1.33;
            const fgtsMulta = (motivo === 'semJusta') ? (sal * 0.08 * meses) * 0.40 : 0;
            const total = decimo + ferias + fgtsMulta;

            let html = `<h3>Detalhamento da Rescisão</h3>`;
            html += `<div class="item-valor"><span>13º Salário Prop.:</span> <span>R$ ${decimo.toFixed(2)}</span></div>`;
            html += `<div class="item-valor"><span>Férias + 1/3:</span> <span>R$ ${ferias.toFixed(2)}</span></div>`;
            if (motivo === 'semJusta') html += `<div class="item-valor"><span>Multa FGTS (40%):</span> <span>R$ ${fgtsMulta.toFixed(2)}</span></div>`;
            html += `<div class="total-box"><strong>Total Estimado: R$ ${total.toFixed(2)}</strong></div>`;

            exibirResultado('res-trab', 'btn-pdf-trab', html);
            checkSeguro(meses, motivo);
        }

        function checkSeguro(meses, motivo) {
            const infoDiv = document.getElementById('seguro-info');
            const txtDiv = document.getElementById('seguro-texto');

            if (motivo === 'pedido') {
                infoDiv.classList.add('hidden');
                return;
            }

            let parcelas = 0;
            if (meses >= 6 && meses < 12) parcelas = 3;
            else if (meses >= 12 && meses < 24) parcelas = 4;
            else if (meses >= 24) parcelas = 5;

            infoDiv.classList.remove('hidden');
            txtDiv.innerHTML = `<p>Com ${meses} meses de trabalho, você pode solicitar entre <b>${parcelas} parcelas</b> do seguro-desemprego, desde que seja sua 3ª solicitação ou mais. Para a 1ª vez, são necessários 12 meses.</p>`;
        }

        function exibirResultado(resId, btnId, html) {
            const res = document.getElementById(resId);
            res.innerHTML = html;
            res.classList.remove('hidden');
            document.getElementById(btnId).style.display = 'block';
        }

        function gerarPDF(id, nome) {
            const elemento = document.getElementById(id);
            const opt = { margin: 1, filename: nome + '.pdf', image: { type: 'jpeg', quality: 0.98 }, html2canvas: { scale: 2 }, jsPDF: { unit: 'in', format: 'letter', orientation: 'portrait' } };
            html2pdf().set(opt).from(elemento).save();
        }
    </script>
</body>

</html>
