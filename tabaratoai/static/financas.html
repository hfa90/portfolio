<!DOCTYPE html>
<html lang="pt-br">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hub Financeiro Pro | Tá Barato Lá</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;800&display=swap"
        rel="stylesheet">

    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        :root {
            --primary: #6366f1;
            --bg: #0f172a;
            --card: #1e293b;
            --text: #f8fafc;
            --success: #10b981;
            --danger: #f43f5e;
            --radius: 20px;
        }

        body {
            font-family: 'Plus Jakarta Sans', sans-serif;
            background-color: var(--bg);
            color: var(--text);
            margin: 0;
            padding: 20px;
            background-image: radial-gradient(circle at 0% 0%, rgba(99, 102, 241, 0.15) 0%, transparent 50%);
        }

        .container {
            max-width: 1000px;
            margin: 0 auto;
        }

        /* Dashboard Header */
        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 40px;
        }

        .balance-hero {
            background: linear-gradient(135deg, var(--primary), #4338ca);
            padding: 40px;
            border-radius: var(--radius);
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.3);
            margin-bottom: 30px;
            position: relative;
            overflow: hidden;
        }

        .balance-hero::after {
            content: '';
            position: absolute;
            top: -50%;
            right: -20%;
            width: 300px;
            height: 300px;
            background: rgba(255, 255, 255, 0.1);
            border-radius: 50%;
        }

        /* Botão Novo Lançamento */
        .btn-main {
            background: #fff;
            color: var(--primary);
            border: none;
            padding: 15px 30px;
            border-radius: 14px;
            font-weight: 800;
            cursor: pointer;
            transition: 0.3s;
            display: flex;
            align-items: center;
            gap: 10px;
            box-shadow: 0 10px 20px rgba(0, 0, 0, 0.1);
        }

        .btn-main:hover {
            transform: scale(1.05);
            background: var(--primary);
            color: #fff;
        }

        /* Stats Grid */
        .stats-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 20px;
            margin-bottom: 30px;
        }

        .stat-card {
            background: var(--card);
            padding: 25px;
            border-radius: var(--radius);
            border: 1px solid rgba(255, 255, 255, 0.05);
        }

        .val {
            font-size: 1.8rem;
            font-weight: 800;
            margin-top: 5px;
        }

        /* Lista de Transações */
        .panel {
            background: var(--card);
            border-radius: var(--radius);
            padding: 30px;
        }

        .t-item {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 18px 0;
            border-bottom: 1px solid rgba(255, 255, 255, 0.05);
        }

        .icon-box {
            width: 48px;
            height: 48px;
            border-radius: 14px;
            display: flex;
            align-items: center;
            justify-content: center;
            margin-right: 15px;
            font-size: 1.2rem;
        }

        /* Modal Style */
        .overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.8);
            backdrop-filter: blur(8px);
            display: none;
            align-items: center;
            justify-content: center;
            z-index: 999;
        }

        .modal {
            background: var(--card);
            padding: 40px;
            border-radius: 30px;
            width: 400px;
            border: 1px solid rgba(255, 255, 255, 0.1);
        }

        input,
        select {
            width: 100%;
            background: #0f172a;
            border: 1px solid #334155;
            color: #fff;
            padding: 15px;
            border-radius: 12px;
            margin-top: 10px;
            box-sizing: border-box;
        }

        .btn-confirm {
            width: 100%;
            background: var(--primary);
            color: #fff;
            border: none;
            padding: 18px;
            border-radius: 15px;
            font-weight: 700;
            margin-top: 25px;
            cursor: pointer;
        }
    </style>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2.108.2/dist/umd/supabase.min.js"></script>
  <script src="js/supabase-config.js"></script>
  <script src="js/supabase-api.js"></script> </head>

<body>

    <div class="container">
        <div class="header">
            <h1>Dashboard<span style="color:var(--primary)">.</span></h1>
            <button class="btn-main" onclick="abrirModal()">
                <i class="fas fa-plus"></i> Novo Lançamento
            </button>
        </div>

        <div class="balance-hero">
            <span style="opacity:0.8; font-weight: 600;">Saldo Disponível</span>
            <div style="font-size: 3rem; font-weight: 800;" id="resumo-saldo">R$ 0,00</div>
        </div>

        <div class="stats-grid">
            <div class="stat-card">
                <small style="color:var(--success)">● Receitas</small>
                <div class="val" id="resumo-receita">R$ 0,00</div>
            </div>
            <div class="stat-card">
                <small style="color:var(--danger)">● Despesas</small>
                <div class="val" id="resumo-despesa">R$ 0,00</div>
            </div>
        </div>

        <div class="main-grid">
            <div class="panel">
                <h3 style="margin-top:0">Últimas Movimentações</h3>
                <div id="lista-transacoes"></div>
            </div>

            <div class="panel">
                <h3 style="margin-top:0">Distribuição de Gastos</h3>
                <div style="height: 300px; position: relative;">
                    <canvas id="chartGastos"></canvas>
                </div>
            </div>
        </div>

        <div class="panel">
            <h3 style="margin-top:0">Últimas Movimentações</h3>
            <div id="lista-transacoes">
            </div>
        </div>
    </div>

    <div class="overlay" id="modal-overlay">
        <div class="modal">
            <h2 style="margin-top:0">Lançamento</h2>
            <form id="form-financeiro">
                <label>Tipo</label>
                <select id="tipo" onchange="carregarCategorias()">
                    <option value="despesa">Despesa (Saída)</option>
                    <option value="receita">Receita (Entrada)</option>
                </select>

                <label style="display:block; margin-top:15px;">Categoria</label>
                <select id="categoria_id"></select>

                <label style="display:block; margin-top:15px;">Descrição</label>
                <input type="text" id="descricao" required placeholder="Ex: Supermercado DB">

                <div style="display:flex; gap:10px; margin-top:15px;">
                    <div style="flex:1">
                        <label>Valor</label>
                        <input type="number" step="0.01" id="valor" required>
                    </div>
                    <div style="flex:1">
                        <label>Data</label>
                        <input type="date" id="data" required>
                    </div>
                </div>

                <button type="submit" class="btn-confirm">Salvar Registro</button>
                <button type="button" onclick="fecharModal()"
                    style="width:100%; background:none; border:none; color:#94a3b8; margin-top:15px; cursor:pointer;">Cancelar</button>
            </form>
        </div>
    </div>

    <script>
        const fmt = (v) => new Intl.NumberFormat('pt-BR', { style: 'currency', currency: 'BRL' }).format(v);

        let meuGrafico = null; // Variável global para o gráfico

        async function carregarDados() {
            try {
                const r = await fetch('/api/financas/dados');
                const d = await r.json();

                // Atualiza os cards de valores
                document.getElementById('resumo-saldo').innerText = fmt(d.saldo);
                document.getElementById('resumo-receita').innerText = fmt(d.receitas);
                document.getElementById('resumo-despesa').innerText = fmt(d.despesas);

                // Atualiza a lista de transações
                const lista = document.getElementById('lista-transacoes');
                lista.innerHTML = d.transacoes.map(t => `
            <div class="t-item">
                <div style="display:flex; align-items:center;">
                    <div class="icon-box" style="background:${t.tipo === 'receita' ? 'rgba(16,185,129,0.1)' : 'rgba(244,63,94,0.1)'};">
                        <i class="fas ${t.tipo === 'receita' ? 'fa-plus' : 'fa-minus'}"></i>
                    </div>
                    <div>
                        <strong>${t.descricao}</strong><br>
                        <small style="color:#94a3b8">${t.data_vencimento}</small>
                    </div>
                </div>
                <div style="font-weight:800;">${fmt(t.valor)}</div>
            </div>
        `).join('');

                // ATUALIZA O GRÁFICO
                renderizarGrafico(d.grafico);

            } catch (e) { console.error("Erro:", e); }
        }

        function renderizarGrafico(dados) {
            const ctx = document.getElementById('chartGastos').getContext('2d');

            // Se o gráfico já existe, destrói para criar um novo (evita bugs visuais)
            if (meuGrafico) meuGrafico.destroy();

            meuGrafico = new Chart(ctx, {
                type: 'doughnut',
                data: {
                    labels: dados.map(i => i.nome),
                    datasets: [{
                        data: dados.map(i => i.total),
                        backgroundColor: ['#6366f1', '#10b981', '#f43f5e', '#f59e0b', '#8b5cf6', '#ec4899'],
                        borderWidth: 0,
                        hoverOffset: 20
                    }]
                },
                options: {
                    responsive: true,
                    maintainAspectRatio: false,
                    plugins: {
                        legend: {
                            position: 'bottom',
                            labels: { color: '#94a3b8', font: { family: 'Plus Jakarta Sans', size: 12 } }
                        }
                    },
                    cutout: '70%' // Efeito Donut
                }
            });
        }

        async function carregarCategorias() {
            const tipo = document.getElementById('tipo').value;
            const r = await fetch(`/api/financas/categorias/${tipo}`);
            const cats = await r.json();
            document.getElementById('categoria_id').innerHTML = cats.map(c => `<option value="${c.id}">${c.nome}</option>`).join('');
        }

        function abrirModal() {
            document.getElementById('modal-overlay').style.display = 'flex';
            document.getElementById('data').valueAsDate = new Date();
            carregarCategorias();
        }

        function fecharModal() { document.getElementById('modal-overlay').style.display = 'none'; }

        document.getElementById('form-financeiro').onsubmit = async (e) => {
            e.preventDefault();
            const data = {
                tipo: document.getElementById('tipo').value,
                categoria_id: document.getElementById('categoria_id').value,
                descricao: document.getElementById('descricao').value,
                valor: document.getElementById('valor').value,
                data: document.getElementById('data').value,
                observacoes: ""
            };

            const r = await fetch('/api/financas/transacao/salvar', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify(data)
            });

            if (r.ok) { fecharModal(); carregarDados(); }
        };

        async function deletar(id) {
            if (confirm("Excluir?")) {
                await fetch(`/api/financas/transacao/deletar/${id}`, { method: 'DELETE' });
                carregarDados();
            }
        }

        window.onload = carregarDados;
    </script>
</body>

</html>
