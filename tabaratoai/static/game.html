<!DOCTYPE html>
<html lang="pt-br">
 <head>
  <link href="css/global.css" rel="stylesheet"/>
  <meta charset="utf-8"/>
  <meta content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" name="viewport"/>
  <title>
   Desafio do Caixa - Manaus
  </title>
  <link href="css/game.css" rel="stylesheet"/>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2.108.2/dist/umd/supabase.min.js"></script>
  <script src="js/supabase-config.js"></script>
  <script src="js/supabase-api.js"></script> </head>
 <body>
  <div class="overlay" id="startScreen">
   <div style="font-size: 60px; margin-bottom: 20px;">
    🛒
   </div>
   <h1>
    Empacotador Veloz
   </h1>
   <p>
    A fila tá grande? Divirta-se!
   </p>
   <button class="start-btn" onclick="startGame()">
    JOGAR
   </button>
   <button class="emergency-btn" onclick="exitGame()" style="border:none; margin-top:10px;">
    Ir para minha
            lista
   </button>
  </div>
  <div class="overlay hidden" id="gameOverScreen">
   <div style="font-size: 50px;">
    😅
   </div>
   <h2 style="color:#444">
    Fim de jogo!
   </h2>
   <p>
    Pontuação:
    <span id="finalScore" style="font-weight:bold;">
     0
    </span>
   </p>
   <div class="offer-card" id="offerContainer">
    <span class="offer-title">
     🔥 Destaque para você:
    </span>
    <span class="offer-price" id="offerPrice">
     R$ --,--
    </span>
    <span class="offer-store" id="offerDesc">
     Carregando oferta...
    </span>
   </div>
   <button class="start-btn" onclick="startGame()">
    JOGAR NOVAMENTE
   </button>
   <button class="emergency-btn" onclick="exitGame()" style="width:100%; max-width:300px; justify-content:center; margin-top:10px;">
    VOLTAR PARA LISTA
   </button>
  </div>
  <div class="timer-bar">
   <div class="timer-fill" id="timerFill">
   </div>
  </div>
  <div class="header">
   <div class="score-box">
    Itens:
    <span id="score">
     0
    </span>
   </div>
   <button class="emergency-btn" onclick="exitGame()">
    <span>
     🏃
    </span>
    Sair
   </button>
  </div>
  <div class="game-area">
   <div class="item-card hidden" id="card">
    <span id="cardIcon">
     🍎
    </span>
    <span class="item-name" id="cardName">
     Maçã
    </span>
   </div>
  </div>
  <div class="controls">
   <button class="btn btn-left" onclick="handleInput('geladeira')" ontouchstart="">
    <span style="font-size: 25px;">
     ❄️
    </span>
    GELADEIRA
   </button>
   <button class="btn btn-right" onclick="handleInput('armario')" ontouchstart="">
    <span style="font-size: 25px;">
     📦
    </span>
    ARMÁRIO
   </button>
  </div>
  <script src="js/game.js">
  </script>
 </body>
</html>
