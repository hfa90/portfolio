<!DOCTYPE html>
<html lang="pt-BR">
 <head>
  <link href="css/global.css" rel="stylesheet"/>
  <meta charset="utf-8"/>
  <meta content="width=device-width, initial-scale=1.0" name="viewport"/>
  <title>
   Histórico de Preços | Tá Barato Lá?
  </title>
  <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet"/>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&amp;display=swap" rel="stylesheet"/>
  <script src="https://cdn.jsdelivr.net/npm/apexcharts">
  </script>
  <link href="css/historico-precos.css" rel="stylesheet"/>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2.108.2/dist/umd/supabase.min.js"></script>
  <script src="js/supabase-config.js"></script>
  <script src="js/supabase-api.js"></script> </head>
 <body>
  <header class="header">
   <div class="nav-container">
    <a class="logo" href="/">
     <i class="fas fa-leaf">
     </i>
     Tá Barato Lá?
    </a>
    <a class="btn-back" href="compareaqui.html">
     <i class="fas fa-arrow-left">
     </i>
     Voltar
    </a>
   </div>
  </header>
  <div class="main-container">
   <div class="alerts-section" id="alerts-wrapper" style="display:none">
    <div class="section-title" style="color: var(--success);">
     <i class="fas fa-bolt">
     </i>
     Oportunidades do Dia!
    </div>
    <div class="alerts-grid" id="alerts-grid">
    </div>
   </div>
   <div style="margin-bottom: 1.5rem; display:flex; justify-content:space-between; align-items:center">
    <div class="section-title" style="margin:0">
     Histórico Geral
    </div>
    <select style="padding:0.5rem; border-radius:8px; border:1px solid #cbd5e1; bg:white">
     <option>
      Últimos 7 dias
     </option>
     <option>
      Últimos 30 dias
     </option>
    </select>
   </div>
   <div id="history-list">
    <div class="loading">
     <i class="fas fa-spinner fa-spin">
     </i>
     Carregando inteligência de preços...
    </div>
   </div>
  </div>
  <script src="js/historico-precos.js">
  </script>
 </body>
</html>
