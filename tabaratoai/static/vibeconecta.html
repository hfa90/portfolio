<!DOCTYPE html>
<html lang="pt-BR">
 <head>
  <link href="css/global.css" rel="stylesheet"/>
  <meta charset="utf-8"/>
  <meta content="width=device-width, initial-scale=1.0" name="viewport"/>
  <title>
   VibeConecta | Tá Barato Lá?
  </title>
  <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet"/>
  <link href="https://fonts.googleapis.com/css2?family=Segoe+UI:wght@400;600;700&amp;family=Inter:wght@300;400;500;600;700&amp;display=swap" rel="stylesheet"/>
  <link href="css/vibeconecta.css" rel="stylesheet"/>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2.108.2/dist/umd/supabase.min.js"></script>
  <script src="js/supabase-config.js"></script>
  <script src="js/supabase-api.js"></script> </head>
 <body>
  <header class="header">
   <a class="logo" href="compareaqui.html">
    <i class="fas fa-leaf">
    </i>
    Tá Barato Lá?
   </a>
   <div class="header-controls">
    <a href="compareaqui.html">
     <i class="fas fa-home">
     </i>
    </a>
   </div>
  </header>
  <div class="notification-toast" id="new-post-toast" onclick="app.atualizarFeed()">
   <div class="notification-icon">
    <i class="fas fa-bell">
    </i>
   </div>
   <div class="notification-content" id="toast-message">
    Tem novidade na área!
   </div>
   <button class="btn-refresh-feed">
    VER
   </button>
  </div>
  <div class="layout-container">
   <aside class="sidebar">
    <div class="menu-card">
     <div class="menu-item" onclick="app.carregarPosts()">
      <i class="fas fa-rss">
      </i>
      Feed
     </div>
     <div class="menu-item" onclick="window.location.href='meuperfil.html'">
      <i class="fas fa-user">
      </i>
      Meu Perfil
     </div>
     <div class="menu-item" onclick="app.verMeusPosts()">
      <i class="fas fa-heart">
      </i>
      Meus Posts
     </div>
     <div class="filter-section">
      <p class="filter-title">
       Filtrar por Mercado
      </p>
      <select class="supermercado-select" id="filtro-supermercado">
       <option value="">
        Todos os Mercados
       </option>
      </select>
     </div>
    </div>
   </aside>
   <main class="feed">
    <div class="create-post-card">
     <div class="create-top">
      <div class="user-avatar">
       <i class="fas fa-user">
       </i>
      </div>
      <div class="post-input-fake" onclick="app.abrirModal()">
       No que você está pensando,
       <span id="user-name-display" style="margin-left: 4px;">
        vizinho
       </span>
       ?
      </div>
     </div>
    </div>
    <div id="posts-container">
     <div class="loading-state">
      <i class="fas fa-spinner fa-spin">
      </i>
      Carregando o que tá rolando em Manaus...
     </div>
    </div>
   </main>
  </div>
  <div class="modal-overlay" id="modal-criar">
   <div class="modal-card">
    <div class="modal-header">
     Criar publicação
     <div class="close-modal" onclick="app.fecharModal()">
      ×
     </div>
    </div>
    <form enctype="multipart/form-data" id="post-form">
     <div class="modal-body">
      <select class="supermercado-input-modal" id="post-supermercado" name="supermercado" required="">
       <option value="">
        Onde você está?
       </option>
      </select>
      <textarea class="post-textarea" id="post-conteudo" name="conteudo" placeholder="O preço tá bom? A fila tá grande? Conta pra gente!" required=""></textarea>
      <!-- SEÇÃO DE UPLOAD DE IMAGEM -->
      <div class="image-upload-section" id="image-upload-area">
       <input accept="image/*" hidden="" id="post-imagem" name="imagem" type="file"/>
       <label class="upload-btn" for="post-imagem">
        <i class="fas fa-camera">
        </i>
        Adicionar Foto
       </label>
       <div class="file-info">
        Formatos: JPG, PNG, GIF • Máx: 5MB
       </div>
       <div class="image-preview" id="image-preview">
        <img alt="Preview" id="preview-image" src=""/>
        <button class="remove-image" onclick="app.removerImagem()" type="button">
         <i class="fas fa-times">
         </i>
         Remover
        </button>
       </div>
      </div>
      <div class="emoji-bar">
       <button class="emoji-btn" onclick="app.addEmoji('🔥')" type="button">
        🔥
       </button>
       <button class="emoji-btn" onclick="app.addEmoji('💸')" type="button">
        💸
       </button>
       <button class="emoji-btn" onclick="app.addEmoji('🛒')" type="button">
        🛒
       </button>
       <button class="emoji-btn" onclick="app.addEmoji('😡')" type="button">
        😡
       </button>
       <button class="emoji-btn" onclick="app.addEmoji('😍')" type="button">
        😍
       </button>
       <button class="emoji-btn" onclick="app.addEmoji('👀')" type="button">
        👀
       </button>
      </div>
      <label style="display: flex; align-items: center; gap: 8px; font-size: 0.9rem; color: var(--text-sec);">
       <input id="post-anonimo" name="anonimato" type="checkbox"/>
       Publicar como anônimo
      </label>
     </div>
     <div class="modal-footer">
      <button class="btn-post" id="btn-publicar" onclick="app.publicar()" type="button">
       Publicar
      </button>
     </div>
    </form>
   </div>
  </div>
  <!-- Modal para imagem ampliada -->
  <div class="image-modal" id="image-modal">
   <button class="close-image-modal" onclick="app.fecharModalImagem()">
    ×
   </button>
   <img alt="Imagem ampliada" id="modal-image" src=""/>
  </div>
  <script src="js/vibeconecta.js">
  </script>
 </body>
</html>
