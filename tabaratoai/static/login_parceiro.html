<!DOCTYPE html>
<html lang="pt-br">

<head>

    <link rel="stylesheet" href="administrativo.css">
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <style>
        .login-container {
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            background: #f4f7f6;
        }

        .login-card {
            background: white;
            padding: 2rem;
            border-radius: 12px;
            box-shadow: 0 10px 25px rgba(0, 0, 0, 0.1);
            width: 100%;
            max-width: 400px;
            text-align: center;
        }

        .login-card h2 {
            margin-bottom: 1.5rem;
            color: #1a2a6c;
        }

        .login-card input {
            width: 100%;
            padding: 12px;
            margin-bottom: 1rem;
            border: 1px solid #ddd;
            border-radius: 6px;
        }

        .login-card button {
            width: 100%;
            padding: 12px;
            background: #28a745;
            color: white;
            border: none;

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2.108.2/dist/umd/supabase.min.js"></script>
  <script src="js/supabase-config.js"></script>
  <script src="js/supabase-api.js"></script> </head>

<body>
    <div class="login-container">
        <div class="login-card">
            <h2>Portal do Parceiro</h2>
            <p>Introduza o seu Token de Acesso</p>
            <input type="password" id="partnerToken" placeholder="â€¢â€¢â€¢â€¢â€¢â€¢â€¢â€¢â€¢â€¢â€¢â€¢">
            <button onclick="autenticarParceiro()">Entrar no Painel</button>
        </div>
    </div>

    <script>
        async function autenticarParceiro() {
            const token = document.getElementById('partnerToken').value;
            if (!token) return;

            try {
                const res = await fetch('/api/auth/parceiro', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ token: token })
                });
                const data = await res.json();

                if (data.success) {
                    // GRAVA APENAS NA SESSÃƒO ATUAL (Apaga ao fechar a aba)
                    sessionStorage.setItem('partner_token', token);
                    sessionStorage.setItem('supermercado_id', data.supermercado_id);
                    sessionStorage.setItem('supermercado_nome', data.nome);

                    window.location.href = 'administrativo.html?mode=partner';
                } else {
                    Swal.fire('Erro', 'Token invÃ¡lido ou expirado.', 'error');
                }
            } catch (e) {
                Swal.fire('Erro', 'Falha na ligaÃ§Ã£o ao servidor.', 'error');
            }
        }
    </script>
</body>
