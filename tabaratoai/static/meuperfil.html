<!DOCTYPE html>
<html lang="pt-BR">
 <head>
  <link href="css/global.css" rel="stylesheet"/>
  <meta charset="utf-8"/>
  <meta content="width=device-width, initial-scale=1.0" name="viewport"/>
  <title>
   Meu Perfil | Tá Barato Lá?
  </title>
  <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet"/>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&amp;display=swap" rel="stylesheet"/>
  <link href="css/meuperfil.css" rel="stylesheet"/>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2.108.2/dist/umd/supabase.min.js"></script>
  <script src="js/supabase-config.js"></script>
  <script src="js/supabase-api.js"></script> </head>
 <body>
  <nav class="nav-header">
   <a class="nav-btn" href="/vibeconecta">
    <i class="fas fa-arrow-left">
    </i>
   </a>
   <span class="nav-title">
    Perfil
   </span>
   <a class="nav-btn" href="/api/logout" title="Sair">
    <i class="fas fa-sign-out-alt">
    </i>
   </a>
  </nav>
  <div class="profile-cover">
  </div>
  <div class="profile-container">
   <div class="profile-avatar" id="avatar-display">
    <i class="fas fa-user">
    </i>
   </div>
   <div class="profile-info">
    <h1 class="profile-name" id="user-name">
     Carregando...
    </h1>
    <p class="profile-bio" id="user-bio">
     ...
    </p>
    <div class="profile-meta">
     <span id="meta-location">
      <i class="fas fa-map-marker-alt">
      </i>
      Manaus
     </span>
     <span id="meta-joined">
      <i class="fas fa-calendar">
      </i>
      Membro
     </span>
    </div>
    <div class="action-row" id="my-actions" style="display:none;">
     <button class="btn btn-primary" onclick="app.toggleEditMode()">
      <i class="fas fa-pen">
      </i>
      Editar Perfil
     </button>
     <button class="btn btn-secondary">
      <i class="fas fa-share-alt">
      </i>
      Compartilhar
     </button>
    </div>
   </div>
   <div class="stats-grid">
    <div class="stat-card">
     <div class="stat-num" id="stat-posts">
      0
     </div>
     <div class="stat-label">
      Contribuições
     </div>
    </div>
    <div class="stat-card">
     <div class="stat-num" id="stat-likes">
      0
     </div>
     <div class="stat-label">
      Likes Recebidos
     </div>
    </div>
   </div>
   <div class="tabs">
    <div class="tab active" onclick="app.switchTab('posts', this)">
     Minhas Publicações
    </div>
    <div class="tab" id="tab-config" onclick="app.switchTab('config', this)" style="display:none;">
     Editar Dados
    </div>
   </div>
   <div class="section-content active" id="posts-content">
    <div class="loading" id="posts-list">
     <i class="fas fa-spinner fa-spin">
     </i>
     Carregando atividades...
    </div>
   </div>
   <div class="section-content" id="config-content">
    <div class="post-card">
     <form id="edit-form" onsubmit="app.salvarPerfil(event)">
      <div class="form-group">
       <label class="form-label">
        Nome de Exibição
       </label>
       <input class="form-input" id="edit-nome" required="" type="text"/>
      </div>
      <div class="form-group">
       <label class="form-label">
        Bio (Frase de efeito)
       </label>
       <input class="form-input" id="edit-bio" placeholder="Ex: Caçador de ofertas!" type="text"/>
      </div>
      <div class="form-group">
       <label class="form-label">
        Endereço (Bairro/Rua)
       </label>
       <input class="form-input" id="edit-endereco" type="text"/>
      </div>
      <div class="form-group">
       <label class="form-label">
        Email
       </label>
       <input class="form-input" id="edit-email" type="email"/>
      </div>
      <div style="margin-top:20px; border-top:1px solid #eee; padding-top:15px;">
       <label class="form-label">
        Nova Senha (deixe em branco para manter)
       </label>
       <input class="form-input" id="edit-senha" placeholder="******" type="password"/>
      </div>
      <button class="btn btn-primary" style="width:100%; margin-top:20px;" type="submit">
       Salvar Alterações
      </button>
     </form>
    </div>
   </div>
  </div>
  <script src="js/meuperfil.js">
  </script>
 </body>
</html>
