<!-- ═══════════════════════════════════════════════════════════
     AVISO DE CLIENTE JÁ LOGADO — cole este bloco logo antes de </body>
     Depende do Supabase JS já carregado na página.
     Se o cadastro.html não carrega o Supabase, adicione antes deste bloco:
     <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
════════════════════════════════════════════════════════════ -->
<style>
    #venus-cliente-notice {
        display: none;
        position: fixed;
        inset: 0;
        z-index: 9999;
        background: rgba(13, 13, 20, .82);
        backdrop-filter: blur(6px);
        align-items: center;
        justify-content: center;
        padding: 24px;
    }

    #venus-cliente-notice.show {
        display: flex;
    }

    .vcn-card {
        background: #13131c;
        border: 1px solid rgba(201, 168, 76, .3);
        border-radius: 16px;
        padding: 40px 36px;
        max-width: 420px;
        width: 100%;
        text-align: center;
        box-shadow: 0 24px 64px rgba(0, 0, 0, .6);
        font-family: Georgia, serif;
        color: #e8e8f0;
        position: relative;
    }

    .vcn-icon {
        font-size: 2.8rem;
        margin-bottom: 16px;
        display: block;
        color: #c9a84c;
    }

    .vcn-title {
        font-size: 1.3rem;
        font-style: italic;
        margin-bottom: 10px;
    }

    .vcn-sub {
        font-size: .9rem;
        color: #7a7a95;
        line-height: 1.6;
        margin-bottom: 28px;
        font-family: sans-serif;
    }

    .vcn-name {
        color: #c9a84c;
        font-style: italic;
    }

    .vcn-actions {
        display: flex;
        flex-direction: column;
        gap: 12px;
    }

    .vcn-btn-panel {
        display: flex;
        align-items: center;
        justify-content: center;
        gap: 8px;
        background: linear-gradient(135deg, #c9a84c, #e8b84b);
        color: #0d0d14;
        font-weight: 700;
        font-size: .95rem;
        padding: 13px 24px;
        border-radius: 8px;
        border: none;
        cursor: pointer;
        text-decoration: none;
        font-family: sans-serif;
        transition: opacity .2s;
    }

    .vcn-btn-panel:hover {
        opacity: .88;
    }

    .vcn-btn-catalog {
        display: flex;
        align-items: center;
        justify-content: center;
        gap: 8px;
        background: rgba(201, 168, 76, .1);
        color: #c9a84c;
        font-size: .9rem;
        padding: 12px 24px;
        border-radius: 8px;
        border: 1px solid rgba(201, 168, 76, .25);
        cursor: pointer;
        text-decoration: none;
        font-family: sans-serif;
        transition: background .2s;
    }

    .vcn-btn-catalog:hover {
        background: rgba(201, 168, 76, .18);
    }

    .vcn-btn-dismiss {
        background: none;
        border: none;
        color: #7a7a95;
        font-size: .82rem;
        cursor: pointer;
        font-family: sans-serif;
        padding: 4px;
        transition: color .2s;
    }

    .vcn-btn-dismiss:hover {
        color: #e8e8f0;
    }
</style>

<!-- Modal de aviso -->
<div id="venus-cliente-notice" role="dialog" aria-modal="true" aria-label="Você já tem uma conta">
    <div class="vcn-card">
        <i class="vcn-icon">✦</i>
        <div class="vcn-title">Você já tem uma conta</div>
        <p class="vcn-sub">
            Olá, <span class="vcn-name" id="vcnName">…</span>!<br>
            Você já está conectado(a) como cliente. Não é necessário se cadastrar novamente.
        </p>
        <div class="vcn-actions">
            <a href="painel-cliente.html" class="vcn-btn-panel">
                &#9670; Ir para meu painel
            </a>
            <a href="catalogo.html" class="vcn-btn-catalog">
                &#128269; Explorar o catálogo
            </a>
            <button class="vcn-btn-dismiss"
                onclick="document.getElementById('venus-cliente-notice').classList.remove('show')">
                Continuar nesta página mesmo assim
            </button>
        </div>
    </div>
</div>

<script>
    (async () => {
        const SUPABASE_URL = 'https://wykmukfohehtpoezojwg.supabase.co';
        const SUPABASE_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Ind5a211a2ZvaGVodHBvZXpvandnIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODAxNTc0NjcsImV4cCI6MjA5NTczMzQ2N30.mlfxsXSirX-0MXOreyShuS2kn5JDh_nMEp1onsBL9-0';

        // Usar a mesma storageKey do login — sem ela não encontra a sessão
        const _sb = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY, {
            auth: { storageKey: 'venus-user-session' }
        });

        const { data: { session } } = await _sb.auth.getSession();
        if (!session) return; // sem sessão → nada a fazer

        // Checar se é cliente (tem registro em customers)
        const { data: cliente } = await _sb
            .from('customers')
            .select('nome')
            .eq('id', session.user.id)
            .maybeSingle();

        if (!cliente) return; // é profissional ou sem registro → deixar cadastrar

        // É cliente logado → mostrar o modal
        const nameEl = document.getElementById('vcnName');
        if (nameEl) nameEl.textContent = cliente.nome || session.user.email;
        document.getElementById('venus-cliente-notice').classList.add('show');
    })();
</script>
