<!DOCTYPE html>
<html lang="pt-BR">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Entrar — Vênus</title>
  <link rel="stylesheet" href="css/global.css" />
  <link rel="stylesheet" href="css/login.css" />
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@3.31.0/dist/tabler-icons.min.css" />
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
</head>

<body>

  <nav class="navbar" data-no-mobile-nav="true">
    <a href="index.html" class="navbar-brand"><em>Vênus</em></a>
    <nav class="navbar-nav">
      <a href="catalogo.html" class="nav-link">Catálogo</a>
    </nav>
  </nav>

  <main class="page login-page">
    <div class="login-bg">
      <div class="login-orb login-orb-1"></div>
      <div class="login-orb login-orb-2"></div>
    </div>

    <div class="login-container">

      <!-- BRAND -->
      <div class="login-brand">
        <a href="index.html" class="login-logo"><em>Vênus</em></a>
        <p>Bem-vinda(o) de volta</p>
      </div>

      <!-- TABS -->
      <div class="login-tabs">
        <button class="login-tab active" onclick="switchTab('profissional', this)">Profissional</button>
        <button class="login-tab" onclick="switchTab('cliente', this)">Cliente</button>
      </div>

      <!-- FORM PROFISSIONAL -->
      <div class="login-form-wrap" id="tab-profissional">
        <form id="loginForm">
          <div class="form-group">
            <label class="form-label">E-mail</label>
            <div class="input-icon-wrap">
              <i class="ti ti-mail"></i>
              <input type="email" class="form-input" placeholder="seu@email.com" required />
            </div>
          </div>

          <div class="form-group">
            <label class="form-label">
              Senha
              <a href="#" class="forgot-link">Esqueci minha senha</a>
            </label>
            <div class="input-icon-wrap input-eye-wrap">
              <i class="ti ti-lock"></i>
              <input type="password" class="form-input" id="pwInput" placeholder="Sua senha" required />
              <button type="button" class="input-eye" onclick="togglePw('pwInput','eye1')">
                <i class="ti ti-eye" id="eye1"></i>
              </button>
            </div>
          </div>

          <label class="remember-me">
            <input type="checkbox" /> Manter conectada(o)
          </label>

          <button type="submit" class="btn btn-gold btn-lg login-btn">
            Entrar no painel
          </button>

          <p class="login-signup">
            Ainda não tem conta?
            <a href="cadastro.html">Cadastre-se grátis <i class="ti ti-arrow-right"></i></a>
          </p>
        </form>

        <div class="login-divider"><span>ou continue com</span></div>
        <button type="button" class="btn btn-google login-btn" onclick="loginWithGoogle('profissional')">
          <i class="ti ti-brand-google"></i> Entrar com Google
        </button>
      </div>

      <!-- FORM CLIENTE -->
      <div class="login-form-wrap" id="tab-cliente" style="display:none;">
        <form>
          <div class="form-group">
            <label class="form-label">E-mail</label>
            <div class="input-icon-wrap">
              <i class="ti ti-mail"></i>
              <input type="email" class="form-input" placeholder="seu@email.com" />
            </div>
          </div>

          <div class="form-group">
            <label class="form-label">
              Senha
              <a href="#" class="forgot-link">Esqueci minha senha</a>
            </label>
            <div class="input-icon-wrap input-eye-wrap">
              <i class="ti ti-lock"></i>
              <input type="password" class="form-input" id="pwInput2" placeholder="Sua senha" />
              <button type="button" class="input-eye" onclick="togglePw('pwInput2','eye2')">
                <i class="ti ti-eye" id="eye2"></i>
              </button>
            </div>
          </div>

          <button type="submit" class="btn btn-gold btn-lg login-btn">
            Entrar
          </button>

          <p class="login-signup">
            Ainda não tem conta?
            <a href="cadastro-cliente.html">Cadastre-se grátis <i class="ti ti-arrow-right"></i></a>
          </p>
        </form>

        <div class="login-divider"><span>ou continue com</span></div>
        <button type="button" class="btn btn-google login-btn" onclick="loginWithGoogle('cliente')">
          <i class="ti ti-brand-google"></i> Entrar com Google
        </button>

        <div class="login-divider"><span>ou continue sem conta</span></div>

        <a href="catalogo.html" class="btn btn-outline login-btn">
          <i class="ti ti-eye"></i> Explorar catálogo
        </a>
      </div>

    </div>
  </main>

  <script>
    // ── Supabase init inline ──────────────────────────────────────
    const SUPABASE_URL = 'https://wykmukfohehtpoezojwg.supabase.co';
    const SUPABASE_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Ind5a211a2ZvaGVodHBvZXpvandnIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODAxNTc0NjcsImV4cCI6MjA5NTczMzQ2N30.mlfxsXSirX-0MXOreyShuS2kn5JDh_nMEp1onsBL9-0';
    const _supabase = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY, {
      auth: { storageKey: 'venus-user-session' }
    });

    function toast(msg, tipo = 'info') {
      const el = document.createElement('div');
      el.textContent = msg;
      el.style.cssText = `
      position:fixed;bottom:24px;right:24px;z-index:9999;max-width:320px;
      background:${tipo === 'erro' ? '#c0392b' : tipo === 'ok' ? '#27ae60' : '#2c2c3a'};
      color:#fff;padding:12px 20px;border-radius:8px;font-size:.9rem;
      box-shadow:0 4px 20px rgba(0,0,0,.4);`;
      document.body.appendChild(el);
      setTimeout(() => el.remove(), 4000);
    }

    function getSafeRedirect() {
      const raw = new URLSearchParams(window.location.search).get('redirect');
      if (!raw) return null;
      try {
        const url = new URL(raw, window.location.origin);
        if (url.origin !== window.location.origin) return null;
        return url.pathname + url.search + url.hash;
      } catch {
        return null;
      }
    }

    // ── Redireciona conforme o tipo de conta ─────────────────────
    function consumeOAuthRole() {
      try {
        const role = localStorage.getItem('venus_oauth_role');
        localStorage.removeItem('venus_oauth_role');
        return role;
      } catch {
        return null;
      }
    }

    async function ensureCustomerForOAuth(user) {
      const nome = user.user_metadata?.full_name || user.user_metadata?.name || user.email?.split('@')[0] || 'Cliente';
      const { error } = await _supabase.from('customers').upsert({
        id: user.id,
        nome,
        email: user.email,
        avatar_url: user.user_metadata?.avatar_url || user.user_metadata?.picture || null,
        updated_at: new Date().toISOString()
      }, { onConflict: 'id' });
      if (error) throw error;
    }

    async function redirectByRole(user) {
      const userId = user?.id || user;
      const isGoogleUser = user?.app_metadata?.provider === 'google'
        || user?.app_metadata?.providers?.includes?.('google');
      const oauthRole = isGoogleUser ? consumeOAuthRole() : null;

      // Checar as duas tabelas em paralelo para evitar ambiguidade de role
      const [
        { data: cliente, error: errCliente },
        { data: profissional, error: errProfissional }
      ] = await Promise.all([
        _supabase.from('customers').select('id').eq('id', userId).maybeSingle(),
        _supabase.from('profiles').select('id').eq('id', userId).maybeSingle(),
      ]);

      // Erro em ambas — provavelmente rede ou RLS quebrada
      if (errCliente && errProfissional) {
        console.error('redirectByRole errors:', errCliente.message, errProfissional.message);
        toast('Erro ao identificar tipo de conta. Tente novamente.', 'erro');
        return;
      }

      const redirect = getSafeRedirect();

      if (cliente) {
        window.location.replace(redirect || 'painel-cliente.html');
      } else if (profissional) {
        if (!user?.email_confirmed_at) {
          toast('Confirme seu e-mail antes de entrar no painel profissional.', 'erro');
          await _supabase.auth.signOut();
          return;
        }
        window.location.replace('painel.html');
      } else if (oauthRole === 'cliente') {
        try {
          await ensureCustomerForOAuth(user);
          window.location.replace(redirect || 'painel-cliente.html');
        } catch (err) {
          console.error('Erro ao criar cliente OAuth:', err);
          toast('Nao foi possivel concluir o acesso pelo Google.', 'erro');
          await _supabase.auth.signOut();
        }
      } else if (oauthRole === 'profissional') {
        toast('Complete seu cadastro profissional para liberar o painel.', 'info');
        await _supabase.auth.signOut();
        window.location.replace('cadastro.html');
      } else {
        // Nenhum registro encontrado — deslogar para não entrar em loop
        console.warn('redirectByRole: nenhum registro encontrado para', userId);
        toast('Conta nao encontrada. Verifique seus dados ou cadastre-se.', 'erro');
        await _supabase.auth.signOut();
      }
    }

    async function loginWithGoogle(role) {
      try {
        localStorage.setItem('venus_oauth_role', role);
      } catch {}

      const redirectTo = new URL('login.html', window.location.href).href;
      const { error } = await _supabase.auth.signInWithOAuth({
        provider: 'google',
        options: {
          redirectTo,
          queryParams: {
            access_type: 'offline',
            prompt: 'select_account'
          }
        }
      });
      if (error) toast(error.message || 'Erro ao entrar com Google.', 'erro');
    }

    // ── Redireciona se já está logado ─────────────────────────────
    (async () => {
      const { data: { session } } = await _supabase.auth.getSession();
      if (session) await redirectByRole(session.user);
    })();

    // ── Troca de abas ─────────────────────────────────────────────
    function switchTab(tab, btn) {
      document.querySelectorAll('.login-tab').forEach(t => t.classList.remove('active'));
      btn.classList.add('active');
      document.getElementById('tab-profissional').style.display = tab === 'profissional' ? 'block' : 'none';
      document.getElementById('tab-cliente').style.display = tab === 'cliente' ? 'block' : 'none';
    }

    const tipoInicial = new URLSearchParams(window.location.search).get('tipo');
    if (tipoInicial === 'cliente') {
      switchTab('cliente', document.querySelectorAll('.login-tab')[1]);
    }

    function togglePw(id, iconId) {
      const input = document.getElementById(id);
      const icon = document.getElementById(iconId);
      input.type = input.type === 'password' ? 'text' : 'password';
      icon.className = input.type === 'text' ? 'ti ti-eye-off' : 'ti ti-eye';
    }

    // ── Login Profissional ────────────────────────────────────────
    document.getElementById('loginForm').addEventListener('submit', async (e) => {
      e.preventDefault();
      const btn = e.target.querySelector('button[type=submit]');
      const email = e.target.querySelector('input[type=email]').value.trim();
      const senha = document.getElementById('pwInput').value;

      btn.disabled = true;
      btn.textContent = 'Entrando…';

      const { data, error } = await _supabase.auth.signInWithPassword({ email, password: senha });

      if (error) {
        toast(
          error.message.includes('Invalid login') || error.message.includes('invalid_credentials')
            ? 'E-mail ou senha incorretos.'
            : error.message,
          'erro'
        );
        btn.disabled = false;
        btn.textContent = 'Entrar no painel';
        return;
      }

      await redirectByRole(data.user);
    });

    // ── Login Cliente ─────────────────────────────────────────────
    document.querySelector('#tab-cliente form').addEventListener('submit', async (e) => {
      e.preventDefault();
      const btn = e.target.querySelector('button[type=submit]');
      const email = e.target.querySelector('input[type=email]').value.trim();
      const senha = document.getElementById('pwInput2').value;

      btn.disabled = true;
      btn.textContent = 'Entrando…';

      const { data, error } = await _supabase.auth.signInWithPassword({ email, password: senha });

      if (error) {
        toast(
          error.message.includes('Invalid login') || error.message.includes('invalid_credentials')
            ? 'E-mail ou senha incorretos.'
            : error.message,
          'erro'
        );
        btn.disabled = false;
        btn.textContent = 'Entrar';
        return;
      }

      await redirectByRole(data.user);
    });

    // ── Esqueci a senha ───────────────────────────────────────────
    document.querySelectorAll('.forgot-link').forEach((link) => link.addEventListener('click', async (e) => {
      e.preventDefault();
      const form = e.target.closest('form');
      const email = form?.querySelector('input[type=email]')?.value?.trim();
      if (!email) {
        toast('Digite seu e-mail para recuperar a senha.', 'info');
        form?.querySelector('input[type=email]')?.focus();
        return;
      }
      const { error } = await _supabase.auth.resetPasswordForEmail(email, {
        redirectTo: new URL('login.html', window.location.href).href
      });
      toast(error ? error.message : 'Enviamos o link de recuperação para seu e-mail.', error ? 'erro' : 'ok');
    }));
  </script>
  <script src="js/site.js" defer></script>
  <script src="js/mobile-nav.js" defer></script>
</body>

</html>
