<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Entrar — Vênus</title>
  <link rel="stylesheet" href="css/global.css" />
  <link rel="stylesheet" href="css/login.css" />
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@3.31.0/dist/tabler-icons.min.css" />
  <!-- Supabase SDK -->
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
  <script src="js/supabase.js"></script>
</head>
<body>

<nav class="navbar">
  <a href="index.html" class="navbar-brand"><em>Vênus</em></a>
  <nav class="navbar-nav">
    <a href="catalogo.html" class="nav-link">Catálogo</a>
    <a href="cadastro.html" class="btn btn-gold btn-sm">Anuncie grátis</a>
  </nav>
</nav>

<main class="page login-page">
  <div class="login-bg">
    <div class="login-orb login-orb-1"></div>
    <div class="login-orb login-orb-2"></div>
  </div>

  <div class="login-container">

    <!-- BRAND -->
    <div class="login-brand">
      <a href="index.html" class="login-logo"><em>Vênus</em></a>
      <p>Bem-vinda(o) de volta</p>
    </div>

    <!-- TABS -->
    <div class="login-tabs">
      <button class="login-tab active" onclick="switchTab('profissional', this)">Profissional</button>
      <button class="login-tab" onclick="switchTab('cliente', this)">Cliente</button>
    </div>

    <!-- FORM PROFISSIONAL -->
    <div class="login-form-wrap" id="tab-profissional">
      <form id="loginForm">
        <div class="form-group">
          <label class="form-label">E-mail</label>
          <div class="input-icon-wrap">
            <i class="ti ti-mail"></i>
            <input type="email" class="form-input" placeholder="seu@email.com" required />
          </div>
        </div>

        <div class="form-group">
          <label class="form-label">
            Senha
            <a href="#" class="forgot-link">Esqueci minha senha</a>
          </label>
          <div class="input-icon-wrap input-eye-wrap">
            <i class="ti ti-lock"></i>
            <input type="password" class="form-input" id="pwInput" placeholder="Sua senha" required />
            <button type="button" class="input-eye" onclick="togglePw('pwInput','eye1')">
              <i class="ti ti-eye" id="eye1"></i>
            </button>
          </div>
        </div>

        <label class="remember-me">
          <input type="checkbox" /> Manter conectada(o)
        </label>

        <button type="submit" class="btn btn-gold btn-lg login-btn">
          Entrar no painel
        </button>

        <p class="login-signup">
          Ainda não tem conta?
          <a href="cadastro.html">Cadastre-se grátis <i class="ti ti-arrow-right"></i></a>
        </p>
      </form>
    </div>

    <!-- FORM CLIENTE -->
    <div class="login-form-wrap" id="tab-cliente" style="display:none;">
      <form>
        <div class="form-group">
          <label class="form-label">E-mail</label>
          <div class="input-icon-wrap">
            <i class="ti ti-mail"></i>
            <input type="email" class="form-input" placeholder="seu@email.com" />
          </div>
        </div>

        <div class="form-group">
          <label class="form-label">
            Senha
            <a href="#" class="forgot-link">Esqueci minha senha</a>
          </label>
          <div class="input-icon-wrap input-eye-wrap">
            <i class="ti ti-lock"></i>
            <input type="password" class="form-input" id="pwInput2" placeholder="Sua senha" />
            <button type="button" class="input-eye" onclick="togglePw('pwInput2','eye2')">
              <i class="ti ti-eye" id="eye2"></i>
            </button>
          </div>
        </div>

        <button type="submit" class="btn btn-gold btn-lg login-btn">
          Entrar
        </button>

        <p class="login-signup">
          Ainda não tem conta?
          <a href="cadastro.html">Cadastre-se grátis <i class="ti ti-arrow-right"></i></a>
        </p>
      </form>

      <div class="login-divider"><span>ou continue sem conta</span></div>

      <a href="catalogo.html" class="btn btn-outline login-btn">
        <i class="ti ti-eye"></i> Explorar catálogo
      </a>
    </div>

  </div>
</main>

<script>
// ── Redireciona se já está logado ─────────────────────────────
(async () => {
  const user = await getUser();
  if (user) window.location.href = 'painel.html';
})();

// ── Troca de abas ─────────────────────────────────────────────
function switchTab(tab, btn) {
  document.querySelectorAll('.login-tab').forEach(t => t.classList.remove('active'));
  btn.classList.add('active');
  document.getElementById('tab-profissional').style.display = tab === 'profissional' ? 'block' : 'none';
  document.getElementById('tab-cliente').style.display      = tab === 'cliente'       ? 'block' : 'none';
}

function togglePw(id, iconId) {
  const input = document.getElementById(id);
  const icon  = document.getElementById(iconId);
  input.type      = input.type === 'password' ? 'text' : 'password';
  icon.className  = input.type === 'text' ? 'ti ti-eye-off' : 'ti ti-eye';
}

// ── Login Profissional ────────────────────────────────────────
document.getElementById('loginForm').addEventListener('submit', async (e) => {
  e.preventDefault();
  const btn   = e.target.querySelector('button[type=submit]');
  const email = e.target.querySelector('input[type=email]').value.trim();
  const senha = e.target.querySelector('input[type=password]').value;

  btn.disabled    = true;
  btn.textContent = 'Entrando…';

  const { error } = await supabase.auth.signInWithPassword({ email, password: senha });

  if (error) {
    toast(
      error.message.includes('Invalid login') ? 'E-mail ou senha incorretos.' : error.message,
      'erro'
    );
    btn.disabled    = false;
    btn.textContent = 'Entrar no painel';
    return;
  }

  window.location.href = 'painel.html';
});

// ── Esqueci a senha ───────────────────────────────────────────
document.querySelector('.forgot-link').addEventListener('click', async (e) => {
  e.preventDefault();
  const email = document.querySelector('#tab-profissional input[type=email]').value.trim();
  if (!email) { toast('Digite seu e-mail primeiro.', 'erro'); return; }

  const { error } = await supabase.auth.resetPasswordForEmail(email, {
    redirectTo: window.location.origin + '/login.html',
  });

  toast(error ? error.message : 'E-mail de recuperação enviado!', error ? 'erro' : 'ok');
});
</script>
</body>
</html>
