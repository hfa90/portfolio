<!DOCTYPE html>
<html lang="pt-BR">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Chat — Vênus</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="js/safety-tools.js"></script>
    <style>
        :root {
            --bg: #0d0d14;
            --surface: #13131c;
            --surface2: #1a1a26;
            --surface3: #22223a;
            --border: #262636;
            --gold: #c9a84c;
            --gold-light: #e8c97a;
            --gold-dim: rgba(201, 168, 76, .12);
            --text: #e8e8f0;
            --text-muted: #7a7a95;
            --green: #2ecc71;
            --blue: #5b9cf6;
            --danger: #c0392b;
            --radius: 12px;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            background: var(--bg);
            color: var(--text);
            font-family: 'Georgia', serif;
            height: 100dvh;
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }

        /* ── TOPBAR ── */
        .topbar {
            height: 58px;
            background: var(--surface);
            border-bottom: 1px solid var(--border);
            display: flex;
            align-items: center;
            padding: 0 18px;
            gap: 12px;
            flex-shrink: 0;
        }

        .topbar-back {
            background: none;
            border: none;
            color: var(--text-muted);
            cursor: pointer;
            font-size: 1.1rem;
            padding: 6px 8px;
            border-radius: 8px;
            transition: all .2s;
        }

        .topbar-back:hover {
            color: var(--text);
            background: var(--surface2);
        }

        .topbar-logo {
            font-size: 1.25rem;
            font-weight: 700;
            color: var(--gold);
            font-style: italic;
        }

        .topbar-divider {
            color: var(--border);
        }

        .topbar-spacer {
            flex: 1;
        }

        /* Countdown chip */
        .countdown-chip {
            display: flex;
            align-items: center;
            gap: 6px;
            background: var(--surface2);
            border: 1px solid var(--border);
            border-radius: 20px;
            padding: 4px 12px;
            font-size: .72rem;
            color: var(--text-muted);
            font-family: 'Courier New', monospace;
        }

        .countdown-chip.warn {
            color: #e74c3c;
            border-color: rgba(231, 76, 60, .3);
        }

        .chip-dot {
            width: 6px;
            height: 6px;
            border-radius: 50%;
            background: var(--green);
            animation: blink 1.8s ease infinite;
        }

        .countdown-chip.warn .chip-dot {
            background: #e74c3c;
        }

        @keyframes blink {

            0%,
            100% {
                opacity: 1
            }

            50% {
                opacity: .2
            }
        }

        /* ── MAIN LAYOUT ── */
        .layout {
            display: flex;
            flex: 1;
            overflow: hidden;
        }

        /* ── CONVERSATIONS PANEL ── */
        .panel {
            width: 280px;
            background: var(--surface);
            border-right: 1px solid var(--border);
            display: flex;
            flex-direction: column;
            overflow: hidden;
            flex-shrink: 0;
        }

        .panel-head {
            padding: 14px 16px;
            border-bottom: 1px solid var(--border);
            display: flex;
            align-items: center;
            justify-content: space-between;
        }

        .panel-head-title {
            font-size: .75rem;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: .1em;
            color: var(--text-muted);
        }

        .new-chat-btn {
            background: var(--gold-dim);
            border: 1px solid rgba(201, 168, 76, .25);
            color: var(--gold);
            padding: 4px 10px;
            border-radius: 6px;
            font-size: .72rem;
            cursor: pointer;
            transition: all .2s;
        }

        .new-chat-btn:hover {
            background: rgba(201, 168, 76, .2);
        }

        .panel-list {
            flex: 1;
            overflow-y: auto;
            padding: 6px;
        }

        .panel-list::-webkit-scrollbar {
            width: 3px;
        }

        .panel-list::-webkit-scrollbar-thumb {
            background: var(--surface3);
            border-radius: 2px;
        }

        .conv-item {
            display: flex;
            align-items: center;
            gap: 10px;
            padding: 10px 10px;
            border-radius: 10px;
            cursor: pointer;
            transition: background .15s;
            position: relative;
        }

        .conv-item:hover {
            background: var(--surface2);
        }

        .conv-item.active {
            background: var(--gold-dim);
            border: 1px solid rgba(201, 168, 76, .15);
        }

        .conv-ava {
            width: 38px;
            height: 38px;
            border-radius: 50%;
            background: linear-gradient(135deg, var(--gold), #6b4c0f);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: .85rem;
            font-weight: 700;
            color: #fff;
            flex-shrink: 0;
            overflow: hidden;
        }

        .conv-ava img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        .conv-info {
            flex: 1;
            overflow: hidden;
        }

        .conv-name {
            font-size: .85rem;
            font-weight: 600;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        .conv-preview {
            font-size: .72rem;
            color: var(--text-muted);
            margin-top: 2px;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        .conv-side {
            display: flex;
            flex-direction: column;
            align-items: flex-end;
            gap: 3px;
        }

        .conv-time {
            font-size: .68rem;
            color: var(--text-muted);
        }

        .conv-unread {
            background: var(--gold);
            color: #000;
            font-size: .62rem;
            font-weight: 700;
            padding: 1px 5px;
            border-radius: 8px;
            min-width: 16px;
            text-align: center;
        }

        .conv-exp-tag {
            font-size: .62rem;
            color: #e74c3c;
            border: 1px solid rgba(231, 76, 60, .25);
            padding: 1px 5px;
            border-radius: 4px;
        }

        /* ── CHAT AREA ── */
        .chat-area {
            flex: 1;
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }

        /* Chat Header */
        .chat-head {
            height: 62px;
            background: var(--surface);
            border-bottom: 1px solid var(--border);
            display: flex;
            align-items: center;
            padding: 0 18px;
            gap: 12px;
            flex-shrink: 0;
        }

        .chat-head-ava {
            width: 36px;
            height: 36px;
            border-radius: 50%;
            background: linear-gradient(135deg, var(--gold), #6b4c0f);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: .85rem;
            font-weight: 700;
            overflow: hidden;
        }

        .chat-head-ava img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        .chat-head-info {
            flex: 1;
        }

        .chat-head-name {
            font-size: .88rem;
            font-weight: 600;
        }

        .chat-head-sub {
            font-size: .72rem;
            color: var(--text-muted);
            margin-top: 1px;
        }

        /* Selos de autenticação no header */
        .auth-chips {
            display: flex;
            gap: 6px;
            align-items: center;
        }

        .auth-chip {
            display: inline-flex;
            align-items: center;
            gap: 3px;
            font-size: .66rem;
            font-weight: 600;
            padding: 2px 8px;
            border-radius: 10px;
        }

        .chip-gold {
            color: var(--gold);
            background: var(--gold-dim);
            border: 1px solid rgba(201, 168, 76, .2);
        }

        .chip-green {
            color: var(--green);
            background: rgba(46, 204, 113, .08);
            border: 1px solid rgba(46, 204, 113, .2);
        }

        /* Messages */
        .messages {
            flex: 1;
            overflow-y: auto;
            padding: 18px 20px 8px;
            display: flex;
            flex-direction: column;
            gap: 5px;
        }

        .messages::-webkit-scrollbar {
            width: 3px;
        }

        .messages::-webkit-scrollbar-thumb {
            background: var(--surface3);
            border-radius: 2px;
        }

        .date-sep {
            text-align: center;
            font-size: .68rem;
            color: var(--text-muted);
            padding: 6px 0;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .date-sep::before,
        .date-sep::after {
            content: '';
            flex: 1;
            height: 1px;
            background: var(--border);
        }

        .msg-row {
            display: flex;
            align-items: flex-end;
            gap: 7px;
            animation: slide-up .18s ease;
        }

        @keyframes slide-up {
            from {
                opacity: 0;
                transform: translateY(6px)
            }

            to {
                opacity: 1;
                transform: translateY(0)
            }
        }

        .msg-row.sent {
            flex-direction: row-reverse;
        }

        .msg-mini-ava {
            width: 26px;
            height: 26px;
            border-radius: 50%;
            background: linear-gradient(135deg, var(--gold), #6b4c0f);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: .6rem;
            font-weight: 700;
            flex-shrink: 0;
            margin-bottom: 16px;
            overflow: hidden;
        }

        .msg-mini-ava img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        .msg-wrap {
            max-width: 66%;
            display: flex;
            flex-direction: column;
            gap: 3px;
        }

        .msg-row.sent .msg-wrap {
            align-items: flex-end;
        }

        .bubble {
            padding: 9px 13px;
            border-radius: 16px;
            font-size: .855rem;
            line-height: 1.5;
            word-break: break-word;
        }

        .msg-row.received .bubble {
            background: var(--surface2);
            border-bottom-left-radius: 4px;
        }

        .msg-row.sent .bubble {
            background: linear-gradient(135deg, #7a5210, var(--gold));
            color: #160f00;
            font-weight: 500;
            border-bottom-right-radius: 4px;
        }

        /* ── Status Selos ── */
        .msg-foot {
            display: flex;
            align-items: center;
            gap: 4px;
            font-size: .66rem;
            color: var(--text-muted);
        }

        .msg-row.sent .msg-foot {
            justify-content: flex-end;
        }

        .seal {
            display: inline-flex;
            align-items: center;
            gap: 2px;
            font-size: .63rem;
            font-weight: 600;
            padding: 1px 5px;
            border-radius: 8px;
        }

        .seal-auth {
            color: var(--gold);
            background: var(--gold-dim);
            border: 1px solid rgba(201, 168, 76, .18);
        }

        .seal-sent {
            color: #aaa;
        }

        .seal-deliv {
            color: #aaa;
        }

        .seal-read {
            color: var(--blue);
        }

        /* check icons inline */
        .chk {
            display: inline-flex;
            align-items: center;
        }

        .chk svg {
            width: 13px;
            height: 9px;
            stroke: currentColor;
            fill: none;
            stroke-width: 2.2;
            stroke-linecap: round;
        }

        /* Expired overlay */
        .expired-notice {
            background: rgba(231, 76, 60, .08);
            border: 1px solid rgba(231, 76, 60, .2);
            color: #e74c3c;
            text-align: center;
            padding: 10px 14px;
            font-size: .78rem;
            border-radius: 10px;
            margin: 10px 16px;
        }

        /* ── INPUT ── */
        .input-bar {
            padding: 12px 16px;
            background: var(--surface);
            border-top: 1px solid var(--border);
            display: flex;
            align-items: flex-end;
            gap: 9px;
            flex-shrink: 0;
        }

        .input-bar.locked {
            opacity: .4;
            pointer-events: none;
        }

        .chat-input {
            flex: 1;
            background: var(--surface2);
            border: 1px solid var(--border);
            border-radius: 20px;
            padding: 9px 15px;
            color: var(--text);
            font-size: .855rem;
            font-family: 'Georgia', serif;
            resize: none;
            max-height: 100px;
            line-height: 1.45;
            outline: none;
            transition: border-color .2s;
        }

        .chat-input:focus {
            border-color: rgba(201, 168, 76, .35);
        }

        .chat-input::placeholder {
            color: var(--text-muted);
        }

        .send-btn {
            width: 40px;
            height: 40px;
            border-radius: 50%;
            background: var(--gold);
            border: none;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            flex-shrink: 0;
            transition: transform .15s, background .2s;
        }

        .send-btn:hover {
            background: var(--gold-light);
            transform: scale(1.06);
        }

        .send-btn:active {
            transform: scale(.93);
        }

        .send-btn svg {
            width: 16px;
            height: 16px;
            stroke: #150f00;
            fill: none;
            stroke-width: 2.5;
            stroke-linecap: round;
            stroke-linejoin: round;
        }

        /* ── Empty / No-conv states ── */
        .no-conv {
            flex: 1;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            gap: 14px;
            color: var(--text-muted);
        }

        .no-conv-icon {
            font-size: 3.5rem;
            opacity: .18;
        }

        .empty-msgs {
            flex: 1;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            gap: 10px;
            color: var(--text-muted);
        }

        /* ── Loading ── */
        .loader {
            position: fixed;
            inset: 0;
            background: var(--bg);
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 999;
            transition: opacity .3s;
        }

        .loader.gone {
            opacity: 0;
            pointer-events: none;
        }

        .spin {
            width: 34px;
            height: 34px;
            border-radius: 50%;
            border: 3px solid var(--surface3);
            border-top-color: var(--gold);
            animation: rot .8s linear infinite;
        }

        @keyframes rot {
            to {
                transform: rotate(360deg)
            }
        }

        /* ── Toast ── */
        #toast {
            position: fixed;
            bottom: 22px;
            left: 50%;
            transform: translateX(-50%);
            background: var(--surface3);
            color: var(--text);
            padding: 9px 18px;
            border-radius: 20px;
            font-size: .8rem;
            border: 1px solid var(--border);
            z-index: 1000;
            opacity: 0;
            transition: opacity .3s;
            pointer-events: none;
        }

        #toast.on {
            opacity: 1;
        }
    </style>
</head>

<body>

    <div class="loader" id="loader">
        <div class="spin"></div>
    </div>

    <!-- TOPBAR -->
    <div class="topbar">
        <button class="topbar-back" onclick="history.back()">←</button>
        <span class="topbar-logo">Vênus</span>
        <span class="topbar-divider">|</span>
        <span style="font-size:.88rem;color:var(--text-muted);">Chat</span>
        <div class="topbar-spacer"></div>
        <div class="countdown-chip" id="countdown" style="display:none">
            <div class="chip-dot"></div>
            <span id="cntText">–</span>
        </div>
    </div>

    <!-- LAYOUT -->
    <div class="layout">

        <!-- PAINEL DE CONVERSAS -->
        <div class="panel">
            <div class="panel-head">
                <span class="panel-head-title">Conversas</span>
            </div>
            <div class="panel-list" id="panelList">
                <div style="padding:20px;text-align:center;font-size:.78rem;color:var(--text-muted)">Carregando...</div>
            </div>
        </div>

        <!-- ÁREA DE CHAT -->
        <div class="chat-area">

            <!-- Placeholder -->
            <div class="no-conv" id="noConv">
                <div class="no-conv-icon">💬</div>
                <div style="font-size:.88rem;font-weight:600;opacity:.4">Nenhuma conversa selecionada</div>
                <div style="font-size:.75rem;opacity:.3;text-align:center;max-width:200px">Abra o perfil de um
                    profissional e clique em "Enviar mensagem"</div>
            </div>

            <!-- Chat ativo -->
            <div id="chatBox" style="display:none;flex:1;flex-direction:column;overflow:hidden;">

                <div class="chat-head" id="chatHead">
                    <div class="chat-head-ava" id="headAva">?</div>
                    <div class="chat-head-info">
                        <div class="chat-head-name" id="headName">–</div>
                        <div class="chat-head-sub" id="headSub">Profissional</div>
                    </div>
                    <div class="auth-chips">
                        <span class="auth-chip chip-gold">✓ Verificado</span>
                        <span class="auth-chip chip-green">● Online</span>
                    <button class="send-btn" style="width:auto;height:38px;padding:0 12px;gap:6px;background:#2a2020;color:#ffb4a8;border:1px solid rgba(248,113,113,.35)" title="Denunciar ou bloquear" onclick="reportChatSafety()"><i class="ti ti-shield-exclamation"></i><span style="font-size:.78rem;font-weight:800">Seguranca</span></button>
                    </div>
                </div>

                <div class="messages" id="msgArea"></div>

                <div class="input-bar" id="inputBar">
                    <textarea class="chat-input" id="chatInput" placeholder="Escreva uma mensagem…" rows="1"
                        onkeydown="onKey(event)" oninput="resize(this)"></textarea>
                    <button class="send-btn" onclick="send()">
                        <svg viewBox="0 0 24 24">
                            <line x1="22" y1="2" x2="11" y2="13" />
                            <polygon points="22 2 15 22 11 13 2 9 22 2" />
                        </svg>
                    </button>
                </div>

            </div>
        </div>
    </div>

    <div id="toast"></div>

    <script>
        const SUPABASE_URL = 'https://wykmukfohehtpoezojwg.supabase.co';
        const SUPABASE_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Ind5a211a2ZvaGVodHBvZXpvandnIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODAxNTc0NjcsImV4cCI6MjA5NTczMzQ2N30.mlfxsXSirX-0MXOreyShuS2kn5JDh_nMEp1onsBL9-0';

        const { createClient } = supabase;
        const sb = createClient(SUPABASE_URL, SUPABASE_ANON_KEY, {
            auth: { storageKey: 'venus-user-session' }
        });

        let me = null;
        let activeConvId = null;
        let activeConv = null;
        let rtSub = null;
        let cntInterval = null;
        let convs = [];

        // ── INIT ──
        async function init() {
            const { data: { session } } = await sb.auth.getSession();
            if (!session) {
                window.location.href = `login.html?redirect=${encodeURIComponent(location.pathname + location.search)}`;
                return;
            }
            me = session.user;

            // Verifica se veio de perfil com profissional definido
            const params = new URLSearchParams(location.search);
            const profId = params.get('profissional');
            const profName = params.get('nome');

            await loadConversations();

            if (profId) {
                await openOrCreateConv(profId, profName);
            }

            document.getElementById('loader').classList.add('gone');
        }

        // ── CARREGAR CONVERSAS ──
        async function loadConversations() {
            const { data } = await sb
                .from('chat_conversations')
                .select(`id, client_id, professional_id, created_at, expires_at,
             chat_messages(id, content, sender_id, created_at, read_at)`)
                .eq('client_id', me.id)
                .order('created_at', { ascending: false });

            convs = data || [];
            await renderPanel();
        }

        async function renderPanel() {
            const list = document.getElementById('panelList');
            if (!convs.length) {
                list.innerHTML = `<div style="padding:24px;text-align:center;font-size:.78rem;color:var(--text-muted)">Nenhuma conversa ainda</div>`;
                return;
            }

            const profIds = convs.map(c => c.professional_id);
            const pm = await loadProfessionals(profIds);

            list.innerHTML = convs.map(c => {
                const prof = pm[c.professional_id] || {};
                const msgs = c.chat_messages || [];
                const last = msgs[msgs.length - 1];
                const unread = msgs.filter(m => m.sender_id !== me.id && !m.read_at).length;
                const exp = new Date(c.expires_at) < new Date();
                const ini = (prof.name || '?').slice(0, 2).toUpperCase();

                return `
      <div class="conv-item ${c.id === activeConvId ? 'active' : ''} ${exp ? '' : ''}"
           onclick="openConv('${c.id}')">
        <div class="conv-ava">
          ${prof.avatar_url ? `<img src="${prof.avatar_url}">` : ini}
        </div>
        <div class="conv-info">
          <div class="conv-name">${esc(prof.name || 'Profissional')}</div>
          <div class="conv-preview">${last ? esc(last.content).slice(0, 38) : 'Sem mensagens'}</div>
        </div>
        <div class="conv-side">
          <span class="conv-time">${last ? fmt(last.created_at) : ''}</span>
          ${exp
                        ? `<span class="conv-exp-tag">Expirada</span>`
                        : unread ? `<span class="conv-unread">${unread}</span>` : ''}
        </div>
      </div>
    `;
            }).join('');
        }

        // ── ABRIR/CRIAR CONVERSA ──
        async function openOrCreateConv(profId, profName) {
            const { data: convId, error } = await sb.rpc('get_or_create_conversation', { p_professional_id: profId });
            if (error || !convId) { toast('Erro ao iniciar conversa'); return; }
            await loadConversations();
            await openConv(convId);
        }

        async function openConv(convId) {
            activeConvId = convId;
            activeConv = convs.find(c => c.id === convId);

            // Se não está na lista local, recarrega
            if (!activeConv) {
                await loadConversations();
                activeConv = convs.find(c => c.id === convId);
            }
            if (!activeConv) return;

            await renderPanel();

            // Mostra chat
            document.getElementById('noConv').style.display = 'none';
            const box = document.getElementById('chatBox');
            box.style.display = 'flex';
            box.style.flexDirection = 'column';
            box.style.overflow = 'hidden';
            box.style.flex = '1';

            // Header do profissional
            const prof = (await loadProfessionals([activeConv.professional_id]))[activeConv.professional_id] || {};
            const profName = prof?.name || 'Profissional';
            const ini = profName.slice(0, 2).toUpperCase();

            document.getElementById('headName').textContent = profName;
            const avaEl = document.getElementById('headAva');
            avaEl.innerHTML = prof?.avatar_url ? `<img src="${prof.avatar_url}">` : ini;

            // Timer
            startTimer(activeConv.expires_at);

            // Mensagens
            await fetchMessages();

            // Realtime
            subscribeRT();

            // Marcar como lido
            await sb.rpc('mark_messages_read', { p_conversation_id: convId });
            await renderPanel();

            // Lock se expirado
            const exp = new Date(activeConv.expires_at) < new Date();
            document.getElementById('inputBar').classList.toggle('locked', exp);
        }

        // ── MENSAGENS ──
        async function loadProfessionals(ids) {
            const uniqueIds = [...new Set((ids || []).filter(Boolean))];
            if (!uniqueIds.length) return {};

            const { data: participants } = await sb.rpc('get_chat_participants', { p_ids: uniqueIds });
            if (participants?.length) {
                const participantMap = {};
                participants.forEach(p => {
                    participantMap[p.id] = { name: p.name, avatar_url: p.avatar_url };
                });
                return participantMap;
            }

            const [{ data: profiles }, { data: legacyUsers }] = await Promise.all([
                sb.from('profiles').select('id,nome_artistico').in('id', uniqueIds),
                sb.from('users').select('id,name,avatar_url').in('id', uniqueIds)
            ]);

            const map = {};
            (legacyUsers || []).forEach(u => {
                map[u.id] = { name: u.name, avatar_url: u.avatar_url };
            });
            (profiles || []).forEach(p => {
                map[p.id] = {
                    ...(map[p.id] || {}),
                    name: p.nome_artistico || map[p.id]?.name
                };
            });
            return map;
        }

        async function fetchMessages() {
            const { data } = await sb
                .from('chat_messages')
                .select('*')
                .eq('conversation_id', activeConvId)
                .order('created_at', { ascending: true });

            paintMessages(data || []);
        }

        function paintMessages(msgs) {
            const area = document.getElementById('msgArea');
            if (!msgs.length) {
                area.innerHTML = `<div class="empty-msgs">
      <div style="font-size:2.5rem;opacity:.2">✉️</div>
      <div style="font-size:.82rem;opacity:.35">Sem mensagens ainda — diga olá!</div>
    </div>`;
                return;
            }
            let html = '';
            let lastDate = '';
            msgs.forEach(m => {
                const d = new Date(m.created_at);
                const ds = d.toLocaleDateString('pt-BR', { day: '2-digit', month: 'long' });
                if (ds !== lastDate) {
                    html += `<div class="date-sep">${ds}</div>`;
                    lastDate = ds;
                }
                html += buildBubble(m);
            });
            area.innerHTML = html;
            area.scrollTop = area.scrollHeight;
        }

        function buildBubble(m) {
            const sent = m.sender_id === me.id;
            const time = fmt(m.created_at);

            // Status check marks
            let statusHTML = '';
            if (sent) {
                if (m.read_at) {
                    statusHTML = `<span class="seal seal-read chk" title="Lido">${dblChk()}</span>`;
                } else if (m.delivered_at) {
                    statusHTML = `<span class="seal seal-deliv chk" title="Entregue">${dblChk()}</span>`;
                } else if (m.sent_at) {
                    statusHTML = `<span class="seal seal-sent chk" title="Enviado">${sglChk()}</span>`;
                } else {
                    statusHTML = `<span class="seal seal-sent" title="Enviando" style="opacity:.4">${sglChk()}</span>`;
                }
            }

            const authSeal = `<span class="seal seal-auth">✓ Auth</span>`;

            return `
    <div class="msg-row ${sent ? 'sent' : 'received'}" id="m-${m.id}">
      ${!sent ? `<div class="msg-mini-ava" id="mava-${m.id}">?</div>` : ''}
      <div class="msg-wrap">
        <div class="bubble">${esc(m.content)}</div>
        <div class="msg-foot">
          ${authSeal}
          <span>${time}</span>
          ${statusHTML}
        </div>
      </div>
    </div>
  `;
        }

        function sglChk() {
            return `<svg viewBox="0 0 14 10"><polyline points="1,5 5,9 13,1"/></svg>`;
        }
        function dblChk() {
            return `<svg viewBox="0 0 18 10"><polyline points="1,5 5,9 13,1"/><polyline points="5,5 9,9 17,1"/></svg>`;
        }

        // ── ENVIAR ──
        async function send() {
            const input = document.getElementById('chatInput');
            const txt = input.value.trim();
            if (!txt || !activeConvId) return;
            if (activeConv && new Date(activeConv.expires_at) < new Date()) {
                toast('Conversa expirada (24h)'); return;
            }

            input.value = ''; input.style.height = '';

            // Otimista
            const tmpId = 'tmp' + Date.now();
            const tmpMsg = {
                id: tmpId, sender_id: me.id,
                content: txt, created_at: new Date().toISOString(),
                sent_at: null, delivered_at: null, read_at: null
            };
            push(tmpMsg);

            const { data, error } = await sb.from('chat_messages').insert({
                conversation_id: activeConvId,
                sender_id: me.id,
                content: txt,
                sent_at: new Date().toISOString(),
                delivered_at: new Date().toISOString()
            }).select().single();

            if (error) {
                document.getElementById('m-' + tmpId)?.remove();
                toast('Erro ao enviar'); return;
            }

            const el = document.getElementById('m-' + tmpId);
            if (el) el.outerHTML = buildBubble(data);
        }

        function push(m) {
            const area = document.getElementById('msgArea');
            const empty = area.querySelector('.empty-msgs');
            if (empty) empty.remove();
            area.insertAdjacentHTML('beforeend', buildBubble(m));
            area.scrollTop = area.scrollHeight;
        }

        // ── REALTIME ──
        function subscribeRT() {
            if (rtSub) rtSub.unsubscribe();
            rtSub = sb.channel('client-chat-' + activeConvId)
                .on('postgres_changes', {
                    event: 'INSERT', schema: 'public',
                    table: 'chat_messages',
                    filter: `conversation_id=eq.${activeConvId}`
                }, async (payload) => {
                    if (payload.new.sender_id === me.id) return;
                    push(payload.new);
                    await sb.from('chat_messages')
                        .update({ read_at: new Date().toISOString() })
                        .eq('id', payload.new.id);
                })
                .on('postgres_changes', {
                    event: 'UPDATE', schema: 'public',
                    table: 'chat_messages',
                    filter: `conversation_id=eq.${activeConvId}`
                }, (payload) => {
                    const el = document.getElementById('m-' + payload.new.id);
                    if (el) el.outerHTML = buildBubble(payload.new);
                })
                .subscribe();
        }

        // ── TIMER ──
        async function reportChatSafety() {
            if (!activeConv?.professional_id) return;
            const report = await VenusSafety.openReport({
                title: 'Seguranca da conversa',
                subtitle: 'Sua denuncia sera enviada ao administrador. Se bloquear, o chat trava e o perfil sai do seu catalogo.'
            });
            if (!report) return;
            const { error } = await sb.rpc('submit_safety_report', {
                p_reported_user_id: activeConv.professional_id,
                p_reason: report.reason,
                p_details: report.details,
                p_profile_id: activeConv.professional_id,
                p_conversation_id: activeConvId,
                p_block_user: report.blockUser
            });
            if (error) { await VenusSafety.notice('Erro ao enviar denuncia: ' + error.message, 'Erro', 'error'); return; }
            toast(report.blockUser ? 'Denuncia enviada e contato bloqueado' : 'Denuncia enviada');
            if (report.blockUser) {
                document.getElementById('inputBar').classList.add('locked');
                convs = convs.filter(c => c.id !== activeConvId);
                activeConvId = null;
                activeConv = null;
                await renderPanel();
                document.getElementById('chatBox').style.display = 'none';
                document.getElementById('noConv').style.display = 'flex';
            }
            await VenusSafety.notice(report.blockUser ? 'Denuncia enviada e contato bloqueado.' : 'Denuncia enviada para analise.', 'Denuncia enviada');
        }

        function startTimer(expiresAt) {
            clearInterval(cntInterval);
            const chip = document.getElementById('countdown');
            const txt = document.getElementById('cntText');
            chip.style.display = 'flex';

            function tick() {
                const diff = new Date(expiresAt) - Date.now();
                if (diff <= 0) {
                    chip.classList.add('warn');
                    txt.textContent = 'Expirada';
                    document.getElementById('inputBar').classList.add('locked');
                    clearInterval(cntInterval);
                    return;
                }
                chip.classList.toggle('warn', diff < 3_600_000);
                const h = Math.floor(diff / 3_600_000);
                const m = Math.floor((diff % 3_600_000) / 60_000);
                const s = Math.floor((diff % 60_000) / 1_000);
                txt.textContent = h > 0 ? `${h}h ${m}m restantes` : `${m}m ${s}s`;
            }
            tick();
            cntInterval = setInterval(tick, 1000);
        }

        // ── UTILS ──
        function onKey(e) { if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); send(); } }
        function resize(el) { el.style.height = 'auto'; el.style.height = Math.min(el.scrollHeight, 100) + 'px'; }
        function fmt(iso) { return new Date(iso).toLocaleTimeString('pt-BR', { hour: '2-digit', minute: '2-digit' }); }
        function esc(s) { return s.replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;').replace(/\n/g, '<br>'); }
        function toast(msg) {
            const t = document.getElementById('toast');
            t.textContent = msg; t.classList.add('on');
            setTimeout(() => t.classList.remove('on'), 3000);
        }

        init();
    </script>
</body>
