<!DOCTYPE html>
<html lang="pt-BR">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Mensagens — Vênus</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="js/safety-tools.js"></script>
    <style>
        :root {
            --gold: #C9A84C;
            --gold-light: #E8C96A;
            --gold-dim: rgba(201, 168, 76, 0.12);
            --bg: #0E0E0F;
            --surface: #18181B;
            --surface2: #222226;
            --surface3: #2A2A30;
            --border: rgba(255, 255, 255, 0.07);
            --text: #F0EDE8;
            --text-muted: #888;
            --green: #4ADE80;
            --blue: #60A5FA;
            --radius: 12px;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            background: var(--bg);
            color: var(--text);
            font-family: 'Segoe UI', system-ui, sans-serif;
            height: 100vh;
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }

        /* ── TOPBAR ── */
        .topbar {
            height: 60px;
            background: var(--surface);
            border-bottom: 1px solid var(--border);
            display: flex;
            align-items: center;
            padding: 0 20px;
            gap: 14px;
            flex-shrink: 0;
        }

        .topbar-back {
            background: none;
            border: none;
            color: var(--text-muted);
            cursor: pointer;
            font-size: 1.2rem;
            padding: 6px;
            border-radius: 8px;
            transition: color .2s, background .2s;
        }

        .topbar-back:hover {
            color: var(--text);
            background: var(--surface2);
        }

        .topbar-logo {
            font-size: 1.3rem;
            font-weight: 700;
            color: var(--gold);
            font-style: italic;
        }

        .topbar-title {
            font-size: .95rem;
            font-weight: 600;
            margin-left: 4px;
        }

        .topbar-spacer {
            flex: 1;
        }

        .topbar-timer {
            font-size: .75rem;
            color: var(--text-muted);
            background: var(--surface2);
            border: 1px solid var(--border);
            padding: 4px 10px;
            border-radius: 20px;
            display: flex;
            align-items: center;
            gap: 5px;
        }

        .topbar-timer.warning {
            color: #F87171;
            border-color: rgba(248, 113, 113, .3);
        }

        .timer-dot {
            width: 6px;
            height: 6px;
            border-radius: 50%;
            background: var(--green);
            animation: pulse-dot 2s infinite;
        }

        .topbar-timer.warning .timer-dot {
            background: #F87171;
        }

        @keyframes pulse-dot {

            0%,
            100% {
                opacity: 1;
            }

            50% {
                opacity: .3;
            }
        }

        /* ── LAYOUT ── */
        .chat-layout {
            display: flex;
            flex: 1;
            overflow: hidden;
        }

        /* ── SIDEBAR CONVERSAS ── */
        .conv-sidebar {
            width: 300px;
            min-width: 260px;
            background: var(--surface);
            border-right: 1px solid var(--border);
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }

        .conv-header {
            padding: 16px 18px 12px;
            border-bottom: 1px solid var(--border);
            font-size: .8rem;
            font-weight: 600;
            color: var(--text-muted);
            text-transform: uppercase;
            letter-spacing: .08em;
        }

        .conv-list {
            flex: 1;
            overflow-y: auto;
            padding: 8px;
        }

        .conv-list::-webkit-scrollbar {
            width: 4px;
        }

        .conv-list::-webkit-scrollbar-track {
            background: transparent;
        }

        .conv-list::-webkit-scrollbar-thumb {
            background: var(--surface3);
            border-radius: 2px;
        }

        .conv-item {
            display: flex;
            align-items: center;
            gap: 12px;
            padding: 10px 12px;
            border-radius: 10px;
            cursor: pointer;
            transition: background .15s;
            position: relative;
        }

        .conv-item:hover {
            background: var(--surface2);
        }

        .conv-item.active {
            background: var(--gold-dim);
        }

        .conv-avatar {
            width: 40px;
            height: 40px;
            border-radius: 50%;
            background: linear-gradient(135deg, var(--gold), #7B5C1A);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: .95rem;
            font-weight: 700;
            flex-shrink: 0;
            position: relative;
        }

        .conv-avatar img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            border-radius: 50%;
        }

        .conv-info {
            flex: 1;
            overflow: hidden;
        }

        .conv-name {
            font-size: .88rem;
            font-weight: 600;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        .conv-preview {
            font-size: .75rem;
            color: var(--text-muted);
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
            margin-top: 2px;
        }

        .conv-meta {
            display: flex;
            flex-direction: column;
            align-items: flex-end;
            gap: 4px;
        }

        .conv-time {
            font-size: .7rem;
            color: var(--text-muted);
        }

        .conv-badge {
            background: var(--gold);
            color: #000;
            font-size: .65rem;
            font-weight: 700;
            padding: 2px 6px;
            border-radius: 10px;
            min-width: 18px;
            text-align: center;
        }

        .conv-expired {
            opacity: .4;
        }

        .conv-expired-label {
            font-size: .65rem;
            color: #F87171;
            border: 1px solid rgba(248, 113, 113, .3);
            padding: 1px 5px;
            border-radius: 4px;
        }

        /* ── CHAT MAIN ── */
        .chat-main {
            flex: 1;
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }

        .chat-header {
            height: 64px;
            background: var(--surface);
            border-bottom: 1px solid var(--border);
            display: flex;
            align-items: center;
            padding: 0 20px;
            gap: 12px;
            flex-shrink: 0;
        }

        .chat-header-avatar {
            width: 38px;
            height: 38px;
            border-radius: 50%;
            background: linear-gradient(135deg, var(--gold), #7B5C1A);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: .9rem;
            font-weight: 700;
            flex-shrink: 0;
        }

        .chat-header-avatar img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            border-radius: 50%;
        }

        .chat-header-info {
            flex: 1;
        }

        .chat-header-name {
            font-size: .9rem;
            font-weight: 600;
        }

        .chat-header-status {
            font-size: .75rem;
            color: var(--text-muted);
            margin-top: 2px;
        }

        .chat-header-badge {
            display: inline-flex;
            align-items: center;
            gap: 4px;
            font-size: .7rem;
            color: var(--green);
            background: rgba(74, 222, 128, .1);
            border: 1px solid rgba(74, 222, 128, .25);
            padding: 3px 8px;
            border-radius: 20px;
            font-weight: 600;
        }

        .chat-header-badge svg {
            width: 10px;
            height: 10px;
        }

        /* ── MENSAGENS ── */
        .messages-area {
            flex: 1;
            overflow-y: auto;
            padding: 20px 20px 8px;
            display: flex;
            flex-direction: column;
            gap: 6px;
        }

        .messages-area::-webkit-scrollbar {
            width: 4px;
        }

        .messages-area::-webkit-scrollbar-track {
            background: transparent;
        }

        .messages-area::-webkit-scrollbar-thumb {
            background: var(--surface3);
            border-radius: 2px;
        }

        .date-divider {
            text-align: center;
            font-size: .7rem;
            color: var(--text-muted);
            padding: 8px 0;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .date-divider::before,
        .date-divider::after {
            content: '';
            flex: 1;
            height: 1px;
            background: var(--border);
        }

        .msg-row {
            display: flex;
            align-items: flex-end;
            gap: 8px;
            animation: msg-in .2s ease;
        }

        @keyframes msg-in {
            from {
                opacity: 0;
                transform: translateY(8px);
            }

            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .msg-row.sent {
            flex-direction: row-reverse;
        }

        .msg-avatar-small {
            width: 28px;
            height: 28px;
            border-radius: 50%;
            background: linear-gradient(135deg, var(--gold), #7B5C1A);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: .65rem;
            font-weight: 700;
            flex-shrink: 0;
            margin-bottom: 18px;
        }

        .msg-avatar-small img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            border-radius: 50%;
        }

        .msg-bubble-wrap {
            max-width: 68%;
            display: flex;
            flex-direction: column;
            gap: 3px;
        }

        .msg-row.sent .msg-bubble-wrap {
            align-items: flex-end;
        }

        .msg-bubble {
            padding: 10px 14px;
            border-radius: 16px;
            font-size: .875rem;
            line-height: 1.5;
            word-break: break-word;
            position: relative;
        }

        .msg-row.received .msg-bubble {
            background: var(--surface2);
            border-bottom-left-radius: 4px;
        }

        .msg-row.sent .msg-bubble {
            background: linear-gradient(135deg, #8B6914, var(--gold));
            color: #1a1000;
            font-weight: 500;
            border-bottom-right-radius: 4px;
        }

        /* Selos de status */
        .msg-meta {
            display: flex;
            align-items: center;
            gap: 4px;
            font-size: .68rem;
            color: var(--text-muted);
        }

        .msg-row.sent .msg-meta {
            justify-content: flex-end;
        }

        .msg-status {
            display: inline-flex;
            align-items: center;
            gap: 2px;
        }

        /* Enviando */
        .status-sending svg {
            color: var(--text-muted);
            opacity: .5;
        }

        /* Enviado (1 check) */
        .status-sent svg {
            color: var(--text-muted);
        }

        /* Entregue (2 checks) */
        .status-delivered svg {
            color: var(--text-muted);
        }

        /* Lido (2 checks azul) */
        .status-read svg {
            color: var(--blue);
        }

        /* Selo de autenticação */
        .auth-seal {
            display: inline-flex;
            align-items: center;
            gap: 3px;
            font-size: .65rem;
            color: var(--gold);
            background: var(--gold-dim);
            border: 1px solid rgba(201, 168, 76, .2);
            padding: 1px 6px;
            border-radius: 10px;
            font-weight: 600;
            flex-shrink: 0;
        }

        /* ── EMPTY STATE ── */
        .empty-chat {
            flex: 1;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            gap: 12px;
            color: var(--text-muted);
        }

        .empty-icon {
            font-size: 3rem;
            opacity: .3;
        }

        .empty-title {
            font-size: 1rem;
            font-weight: 600;
            opacity: .5;
        }

        .empty-sub {
            font-size: .8rem;
            opacity: .4;
            text-align: center;
            max-width: 260px;
            line-height: 1.5;
        }

        /* ── INPUT AREA ── */
        .input-area {
            padding: 14px 16px;
            background: var(--surface);
            border-top: 1px solid var(--border);
            display: flex;
            align-items: flex-end;
            gap: 10px;
            flex-shrink: 0;
        }

        .input-area.disabled {
            opacity: .5;
            pointer-events: none;
        }

        .msg-input {
            flex: 1;
            background: var(--surface2);
            border: 1px solid var(--border);
            border-radius: 22px;
            padding: 10px 16px;
            color: var(--text);
            font-size: .88rem;
            font-family: inherit;
            resize: none;
            max-height: 120px;
            line-height: 1.4;
            outline: none;
            transition: border-color .2s;
        }

        .msg-input:focus {
            border-color: rgba(201, 168, 76, .4);
        }

        .msg-input::placeholder {
            color: var(--text-muted);
        }

        .send-btn {
            width: 42px;
            height: 42px;
            border-radius: 50%;
            background: var(--gold);
            border: none;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            flex-shrink: 0;
            transition: transform .15s, background .2s;
        }

        .send-btn:hover {
            background: var(--gold-light);
            transform: scale(1.05);
        }

        .send-btn:active {
            transform: scale(.95);
        }

        .send-btn svg {
            width: 18px;
            height: 18px;
            color: #1a1000;
        }

        /* ── LOADING ── */
        .loading-screen {
            position: fixed;
            inset: 0;
            background: var(--bg);
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 999;
            transition: opacity .3s;
        }

        .loading-screen.hidden {
            opacity: 0;
            pointer-events: none;
        }

        .loading-spin {
            width: 36px;
            height: 36px;
            border: 3px solid var(--surface3);
            border-top-color: var(--gold);
            border-radius: 50%;
            animation: spin .8s linear infinite;
        }

        @keyframes spin {
            to {
                transform: rotate(360deg);
            }
        }

        /* ── TOAST ── */
        #toast {
            position: fixed;
            bottom: 24px;
            left: 50%;
            transform: translateX(-50%);
            background: var(--surface3);
            color: var(--text);
            padding: 10px 18px;
            border-radius: 22px;
            font-size: .82rem;
            z-index: 1000;
            opacity: 0;
            transition: opacity .3s;
            border: 1px solid var(--border);
            pointer-events: none;
        }

        #toast.show {
            opacity: 1;
        }

        /* ── EXPIRED BANNER ── */
        .expired-banner {
            background: rgba(248, 113, 113, .1);
            border: 1px solid rgba(248, 113, 113, .25);
            color: #F87171;
            text-align: center;
            padding: 10px 16px;
            font-size: .8rem;
            border-radius: 10px;
            margin: 12px 16px;
        }

        /* No conversation selected */
        .no-conv {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            flex: 1;
            gap: 16px;
            color: var(--text-muted);
        }

        .no-conv-icon {
            font-size: 4rem;
            opacity: .2;
        }

        @media (max-width: 640px) {
            body {
                height: 100dvh;
            }

            .topbar {
                height: 56px;
                padding: 0 12px;
                gap: 8px;
            }

            .topbar-logo {
                font-size: 1.12rem;
            }

            .topbar-title {
                font-size: 0.84rem;
            }

            .topbar-timer {
                max-width: 120px;
                padding: 4px 8px;
                font-size: 0.68rem;
            }

            .conv-sidebar {
                width: 100%;
                min-width: unset;
                border-right: 0;
            }

            .chat-main {
                display: none;
                width: 100%;
                min-width: 0;
            }

            .chat-main.mobile-show {
                display: flex;
            }

            .conv-sidebar.mobile-hide {
                display: none;
            }

            .chat-header {
                height: auto;
                min-height: 58px;
                padding: 10px 12px;
                gap: 8px;
            }

            .chat-header-badge {
                display: none;
            }

            .chat-header .send-btn[title] {
                width: 40px !important;
                min-width: 40px;
                padding: 0 !important;
            }

            .chat-header .send-btn[title] span {
                display: none;
            }

            .messages-area {
                padding: 14px 12px 8px;
            }

            .msg-bubble-wrap {
                max-width: 82%;
            }

            .msg-avatar-small {
                display: none;
            }

            .msg-bubble {
                font-size: 0.86rem;
                padding: 9px 12px;
            }

            .input-area {
                padding: 10px 10px calc(10px + env(safe-area-inset-bottom));
                gap: 8px;
            }

            .msg-input {
                min-height: 42px;
                border-radius: 16px;
            }
        }
    </style>
</head>

<body>

    <div class="loading-screen" id="loadingScreen">
        <div class="loading-spin"></div>
    </div>

    <!-- TOPBAR -->
    <div class="topbar">
        <button class="topbar-back" onclick="chatBack()">←</button>
        <span class="topbar-logo">Vênus</span>
        <span class="topbar-title">Mensagens</span>
        <div class="topbar-spacer"></div>
        <div class="topbar-timer" id="convTimer" style="display:none">
            <div class="timer-dot"></div>
            <span id="timerText">–</span>
        </div>
    </div>

    <!-- LAYOUT -->
    <div class="chat-layout">

        <!-- LISTA DE CONVERSAS -->
        <div class="conv-sidebar" id="convSidebar">
            <div class="conv-header">Conversas</div>
            <div class="conv-list" id="convList">
                <div style="padding:20px;text-align:center;color:var(--text-muted);font-size:.8rem;">Carregando...</div>
            </div>
        </div>

        <!-- ÁREA DO CHAT -->
        <div class="chat-main" id="chatMain">
            <!-- Estado: nenhuma conversa selecionada -->
            <div class="no-conv" id="noConvState">
                <div class="no-conv-icon">💬</div>
                <div style="font-size:.9rem;font-weight:600;opacity:.5">Selecione uma conversa</div>
                <div style="font-size:.78rem;opacity:.35;text-align:center;max-width:200px">Suas mensagens com clientes
                    aparecerão aqui</div>
            </div>

            <!-- Chat ativo (inicialmente oculto) -->
            <div id="chatActive" style="display:none;flex:1;display:none;flex-direction:column;overflow:hidden">

                <div class="chat-header" id="chatHeader">
                    <div class="chat-header-avatar" id="chatAvatar">?</div>
                    <div class="chat-header-info">
                        <div class="chat-header-name" id="chatName">–</div>
                        <div class="chat-header-status" id="chatStatus">–</div>
                    </div>
                    <div class="chat-header-badge">
                        <svg viewBox="0 0 12 12" fill="none" stroke="currentColor" stroke-width="2">
                            <path d="M2 6l3 3 5-5" />
                        </svg>
                        Autenticado
                    <button class="send-btn" style="width:auto;height:38px;padding:0 12px;gap:6px;background:#2a2020;color:#ffb4a8;border:1px solid rgba(248,113,113,.35)" title="Denunciar ou bloquear" onclick="reportChatSafety()"><i class="ti ti-shield-exclamation"></i><span style="font-size:.78rem;font-weight:800">Seguranca</span></button>
                    </div>
                </div>

                <div class="messages-area" id="messagesArea">
                    <!-- mensagens inseridas aqui -->
                </div>

                <div class="input-area" id="inputArea">
                    <textarea class="msg-input" id="msgInput" placeholder="Escreva uma mensagem..." rows="1"
                        onkeydown="handleKey(event)" oninput="autoResize(this)"></textarea>
                    <button class="send-btn" onclick="sendMessage()">
                        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"
                            stroke-linecap="round" stroke-linejoin="round">
                            <line x1="22" y1="2" x2="11" y2="13" />
                            <polygon points="22 2 15 22 11 13 2 9 22 2" />
                        </svg>
                    </button>
                </div>

            </div>
        </div>

    </div>

    <div id="toast"></div>

    <script>
        // ── CONFIG ──
        const SUPABASE_URL = 'https://wykmukfohehtpoezojwg.supabase.co';
        const SUPABASE_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Ind5a211a2ZvaGVodHBvZXpvandnIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODAxNTc0NjcsImV4cCI6MjA5NTczMzQ2N30.mlfxsXSirX-0MXOreyShuS2kn5JDh_nMEp1onsBL9-0';

        const { createClient } = supabase;
        const sb = createClient(SUPABASE_URL, SUPABASE_ANON_KEY, {
            auth: { storageKey: 'venus-user-session' }
        });

        let currentUser = null;
        let currentConvId = null;
        let currentConvData = null;
        let realtimeSub = null;
        let timerInterval = null;
        let conversations = [];
        let currentOther = null;

        // ── INIT ──
        async function init() {
            const { data: { session } } = await sb.auth.getSession();
            if (!session) { window.location.href = 'login.html'; return; }
            currentUser = session.user;
            await loadConversations();
            document.getElementById('loadingScreen').classList.add('hidden');
        }

        // ── CONVERSAS ──
        async function loadConversations() {
            const { data, error } = await sb
                .from('chat_conversations')
                .select(`
      id, client_id, professional_id, created_at, expires_at,
      chat_messages ( id, content, sender_id, created_at, read_at )
    `)
                .or(`professional_id.eq.${currentUser.id},client_id.eq.${currentUser.id}`)
                .order('created_at', { ascending: false });

            if (error) { showToast('Erro ao carregar conversas'); return; }
            conversations = data || [];
            renderConvList();
        }

        async function renderConvList() {
            const list = document.getElementById('convList');
            if (!conversations.length) {
                list.innerHTML = `<div style="padding:24px;text-align:center;color:var(--text-muted);font-size:.8rem;">Nenhuma conversa ainda</div>`;
                return;
            }

            const otherIds = conversations.map(c =>
                c.professional_id === currentUser.id ? c.client_id : c.professional_id
            );
            const profileMap = await loadParticipants(otherIds);

            list.innerHTML = conversations.map(conv => {
                const otherId = conv.professional_id === currentUser.id ? conv.client_id : conv.professional_id;
                const other = profileMap[otherId] || {};
                const msgs = conv.chat_messages || [];
                const lastMsg = msgs[msgs.length - 1];
                const unread = msgs.filter(m => m.sender_id !== currentUser.id && !m.read_at).length;
                const expired = new Date(conv.expires_at) < new Date();
                const initials = (other.name || '?').slice(0, 2).toUpperCase();

                return `
      <div class="conv-item ${conv.id === currentConvId ? 'active' : ''} ${expired ? 'conv-expired' : ''}"
           onclick="openConversation('${conv.id}')">
        <div class="conv-avatar">
          ${other.avatar_url
                        ? `<img src="${other.avatar_url}" alt="">`
                        : initials}
        </div>
        <div class="conv-info">
          <div class="conv-name">${escHTML(other.name || 'Cliente')}</div>
          <div class="conv-preview">${lastMsg ? lastMsg.content.slice(0, 40) : 'Nenhuma mensagem'}</div>
        </div>
        <div class="conv-meta">
          <span class="conv-time">${lastMsg ? fmtTime(lastMsg.created_at) : ''}</span>
          ${expired
                        ? `<span class="conv-expired-label">Expirada</span>`
                        : unread > 0 ? `<span class="conv-badge">${unread}</span>` : ''}
        </div>
      </div>
    `;
            }).join('');
        }

        // ── ABRIR CONVERSA ──
        async function openConversation(convId) {
            currentConvId = convId;
            currentConvData = conversations.find(c => c.id === convId);

            // Atualiza sidebar
            renderConvList();

            // Mostra chat ativo
            document.getElementById('noConvState').style.display = 'none';
            const chatActive = document.getElementById('chatActive');
            chatActive.style.display = 'flex';
            chatActive.style.flexDirection = 'column';
            chatActive.style.overflow = 'hidden';
            chatActive.style.flex = '1';
            document.getElementById('chatMain')?.classList.add('mobile-show');
            document.getElementById('convSidebar')?.classList.add('mobile-hide');

            // Header
            const otherId = currentConvData.professional_id === currentUser.id
                ? currentConvData.client_id
                : currentConvData.professional_id;

            const other = (await loadParticipants([otherId]))[otherId] || {};
            currentOther = other;
            const otherName = other?.name || 'Usuário';
            const initials = otherName.slice(0, 2).toUpperCase();

            document.getElementById('chatName').textContent = otherName;
            document.getElementById('chatStatus').textContent = currentConvData.professional_id === currentUser.id
                ? '👤 Cliente' : '💼 Profissional';

            const avatarEl = document.getElementById('chatAvatar');
            avatarEl.innerHTML = other?.avatar_url ? `<img src="${other.avatar_url}" alt="">` : initials;

            // Timer de expiração
            startExpiryTimer(currentConvData.expires_at);

            // Mensagens
            await loadMessages();

            // Marca como lido
            await sb.rpc('mark_messages_read', { p_conversation_id: convId });

            // Realtime
            subscribeToMessages();

            // Input
            const expired = new Date(currentConvData.expires_at) < new Date();
            document.getElementById('inputArea').classList.toggle('disabled', expired);
        }

        // ── CARREGAR MENSAGENS ──
        async function loadMessages() {
            const { data, error } = await sb
                .from('chat_messages')
                .select('*')
                .eq('conversation_id', currentConvId)
                .order('created_at', { ascending: true });

            if (error) { showToast('Erro ao carregar mensagens'); return; }
            renderMessages(data || []);
        }

        function renderMessages(msgs) {
            const area = document.getElementById('messagesArea');
            if (!msgs.length) {
                area.innerHTML = `
      <div class="empty-chat">
        <div class="empty-icon">✉️</div>
        <div class="empty-title">Nenhuma mensagem ainda</div>
        <div class="empty-sub">Envie a primeira mensagem para iniciar a conversa</div>
      </div>`;
                return;
            }

            let html = '';
            let lastDate = '';
            msgs.forEach(msg => {
                const d = new Date(msg.created_at);
                const dateStr = d.toLocaleDateString('pt-BR', { day: '2-digit', month: 'long' });
                if (dateStr !== lastDate) {
                    html += `<div class="date-divider">${dateStr}</div>`;
                    lastDate = dateStr;
                }
                html += renderMsgHTML(msg);
            });
            area.innerHTML = html;
            area.scrollTop = area.scrollHeight;
        }

        function renderMsgHTML(msg) {
            const isSent = msg.sender_id === currentUser.id;
            const time = fmtTime(msg.created_at);

            // Selo de status
            let statusHTML = '';
            if (isSent) {
                if (!msg.sent_at) {
                    statusHTML = `<span class="msg-status status-sending" title="Enviando">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <circle cx="12" cy="12" r="10" stroke-dasharray="40" stroke-dashoffset="40">
            <animate attributeName="stroke-dashoffset" values="40;0" dur="1s" repeatCount="indefinite"/>
          </circle>
        </svg>
      </span>`;
                } else if (msg.read_at) {
                    statusHTML = `<span class="msg-status status-read" title="Lido">
        ${doubleCheck()}
      </span>`;
                } else if (msg.delivered_at) {
                    statusHTML = `<span class="msg-status status-delivered" title="Entregue">
        ${doubleCheck()}
      </span>`;
                } else {
                    statusHTML = `<span class="msg-status status-sent" title="Enviado">
        ${singleCheck()}
      </span>`;
                }
            }

            // Selo de autenticação (apenas no 1º msg de cada lado ou sempre — aqui mostramos sempre)
            const sealHTML = `<span class="auth-seal">✓ Autenticado</span>`;

            return `
    <div class="msg-row ${isSent ? 'sent' : 'received'}" id="msg-${msg.id}">
      ${!isSent ? `<div class="msg-avatar-small">${getInitials(currentConvData)}</div>` : ''}
      <div class="msg-bubble-wrap">
        <div class="msg-bubble">${escHTML(msg.content)}</div>
        <div class="msg-meta">
          ${sealHTML}
          <span>${time}</span>
          ${statusHTML}
        </div>
      </div>
    </div>
  `;
        }

        function singleCheck() {
            return `<svg width="14" height="10" viewBox="0 0 14 10" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round">
    <polyline points="1 5 5 9 13 1"/>
  </svg>`;
        }
        function doubleCheck() {
            return `<svg width="18" height="10" viewBox="0 0 18 10" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round">
    <polyline points="1 5 5 9 13 1"/>
    <polyline points="5 5 9 9 17 1"/>
  </svg>`;
        }

        function getInitials(conv) {
            const name = currentOther?.name || '?';
            return name.slice(0, 2).toUpperCase();
        }

        async function loadParticipants(ids) {
            const uniqueIds = [...new Set((ids || []).filter(Boolean))];
            if (!uniqueIds.length) return {};

            const { data: participants } = await sb.rpc('get_chat_participants', { p_ids: uniqueIds });
            if (participants?.length) {
                const participantMap = {};
                participants.forEach(p => {
                    participantMap[p.id] = { name: p.name, avatar_url: p.avatar_url };
                });
                return participantMap;
            }

            const [{ data: customers }, { data: profiles }, { data: legacyUsers }] = await Promise.all([
                sb.from('customers').select('id,nome,avatar_url').in('id', uniqueIds),
                sb.from('profiles').select('id,nome_artistico').in('id', uniqueIds),
                sb.from('users').select('id,name,avatar_url').in('id', uniqueIds)
            ]);

            const map = {};
            (legacyUsers || []).forEach(u => {
                map[u.id] = { name: u.name, avatar_url: u.avatar_url };
            });
            (profiles || []).forEach(p => {
                map[p.id] = { ...(map[p.id] || {}), name: p.nome_artistico || map[p.id]?.name };
            });
            (customers || []).forEach(c => {
                map[c.id] = {
                    ...(map[c.id] || {}),
                    name: c.nome || map[c.id]?.name,
                    avatar_url: c.avatar_url || map[c.id]?.avatar_url
                };
            });
            return map;
        }

        // ── ENVIAR MENSAGEM ──
        async function sendMessage() {
            const input = document.getElementById('msgInput');
            const content = input.value.trim();
            if (!content || !currentConvId) return;

            // Verifica expiração
            if (currentConvData && new Date(currentConvData.expires_at) < new Date()) {
                showToast('Esta conversa expirou (24h)');
                return;
            }

            input.value = '';
            input.style.height = '';

            // Mensagem otimista (aparece imediatamente)
            const tempId = 'temp-' + Date.now();
            const tempMsg = {
                id: tempId,
                sender_id: currentUser.id,
                content,
                created_at: new Date().toISOString(),
                sent_at: null,
                delivered_at: null,
                read_at: null
            };
            appendMessage(tempMsg);

            const { data, error } = await sb.from('chat_messages').insert({
                conversation_id: currentConvId,
                sender_id: currentUser.id,
                content,
                sent_at: new Date().toISOString(),
                delivered_at: new Date().toISOString()
            }).select().single();

            if (error) {
                document.getElementById('msg-' + tempId)?.remove();
                showToast('Erro ao enviar mensagem');
                return;
            }

            // Substitui otimista pelo real
            const tempEl = document.getElementById('msg-' + tempId);
            if (tempEl) tempEl.outerHTML = renderMsgHTML(data);
        }

        function appendMessage(msg) {
            const area = document.getElementById('messagesArea');
            const emptyState = area.querySelector('.empty-chat');
            if (emptyState) emptyState.remove();
            area.insertAdjacentHTML('beforeend', renderMsgHTML(msg));
            area.scrollTop = area.scrollHeight;
        }

        // ── REALTIME ──
        function subscribeToMessages() {
            if (realtimeSub) realtimeSub.unsubscribe();

            realtimeSub = sb.channel('chat-' + currentConvId)
                .on('postgres_changes', {
                    event: 'INSERT',
                    schema: 'public',
                    table: 'chat_messages',
                    filter: `conversation_id=eq.${currentConvId}`
                }, async (payload) => {
                    const msg = payload.new;
                    if (msg.sender_id === currentUser.id) return; // já foi inserida
                    appendMessage(msg);
                    // Marcar como lido
                    await sb.from('chat_messages')
                        .update({ read_at: new Date().toISOString() })
                        .eq('id', msg.id);
                })
                .on('postgres_changes', {
                    event: 'UPDATE',
                    schema: 'public',
                    table: 'chat_messages',
                    filter: `conversation_id=eq.${currentConvId}`
                }, (payload) => {
                    const el = document.getElementById('msg-' + payload.new.id);
                    if (el) el.outerHTML = renderMsgHTML(payload.new);
                })
                .subscribe();
        }

        // ── TIMER DE EXPIRAÇÃO ──
        async function reportChatSafety() {
            if (!currentConvData) return;
            const otherId = currentConvData.professional_id === currentUser.id ? currentConvData.client_id : currentConvData.professional_id;
            const report = await VenusSafety.openReport({
                title: 'Seguranca da conversa',
                subtitle: 'Sua denuncia sera enviada ao administrador. Se bloquear, o chat trava para os dois lados.'
            });
            if (!report) return;
            const { error } = await sb.rpc('submit_safety_report', {
                p_reported_user_id: otherId,
                p_reason: report.reason,
                p_details: report.details,
                p_profile_id: currentConvData.professional_id,
                p_conversation_id: currentConvId,
                p_block_user: report.blockUser
            });
            if (error) { await VenusSafety.notice('Erro ao enviar denuncia: ' + error.message, 'Erro', 'error'); return; }
            showToast(report.blockUser ? 'Denuncia enviada e contato bloqueado' : 'Denuncia enviada');
            if (report.blockUser) {
                document.getElementById('inputArea').classList.add('disabled');
                conversations = conversations.filter(c => c.id !== currentConvId);
                currentConvId = null;
                currentConvData = null;
                await renderConvList();
                document.getElementById('chatActive').style.display = 'none';
                document.getElementById('noConvState').style.display = 'flex';
                document.getElementById('chatMain')?.classList.remove('mobile-show');
                document.getElementById('convSidebar')?.classList.remove('mobile-hide');
            }
            await VenusSafety.notice(report.blockUser ? 'Denuncia enviada e contato bloqueado.' : 'Denuncia enviada para analise.', 'Denuncia enviada');
        }

        function startExpiryTimer(expiresAt) {
            clearInterval(timerInterval);
            const timerEl = document.getElementById('convTimer');
            const timerText = document.getElementById('timerText');
            timerEl.style.display = 'flex';

            function update() {
                const diff = new Date(expiresAt) - new Date();
                if (diff <= 0) {
                    timerEl.classList.add('warning');
                    timerText.textContent = 'Expirada';
                    document.getElementById('inputArea').classList.add('disabled');
                    clearInterval(timerInterval);
                    return;
                }
                timerEl.classList.toggle('warning', diff < 3600000); // < 1h
                const h = Math.floor(diff / 3600000);
                const m = Math.floor((diff % 3600000) / 60000);
                const s = Math.floor((diff % 60000) / 1000);
                if (h > 0) {
                    timerText.textContent = `Expira em ${h}h ${m}m`;
                } else {
                    timerText.textContent = `Expira em ${m}m ${s}s`;
                }
            }

            update();
            timerInterval = setInterval(update, 1000);
        }

        // ── HELPERS ──
        function chatBack() {
            if (window.matchMedia('(max-width: 640px)').matches && currentConvId) {
                document.getElementById('chatMain')?.classList.remove('mobile-show');
                document.getElementById('convSidebar')?.classList.remove('mobile-hide');
                return;
            }
            history.back();
        }

        function handleKey(e) {
            if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); sendMessage(); }
        }

        function autoResize(el) {
            el.style.height = 'auto';
            el.style.height = Math.min(el.scrollHeight, 120) + 'px';
        }

        function fmtTime(iso) {
            return new Date(iso).toLocaleTimeString('pt-BR', { hour: '2-digit', minute: '2-digit' });
        }

        function escHTML(str) {
            return str.replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;').replace(/\n/g, '<br>');
        }

        function showToast(msg, type = 'info') {
            const t = document.getElementById('toast');
            t.textContent = msg;
            t.classList.add('show');
            setTimeout(() => t.classList.remove('show'), 3000);
        }

        init();
    </script>
    <script src="js/site.js" defer></script>
</body>

</html>
